<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Castwright — Any book, performed by a full cast">
  <title>Castwright — social / OG share image (1200x630)</title>
  <defs>
    <linearGradient id="sig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#0F0E0D"/>
      <stop offset="0.42" stop-color="#3C194F"/>
      <stop offset="0.74" stop-color="#A43C6C"/>
      <stop offset="1"    stop-color="#F79A83"/>
    </linearGradient>
  </defs>
  <!-- signature 4-stop gradient field -->
  <rect width="1200" height="630" fill="url(#sig)"/>

  <!-- top-left lockup: mark + wordmark -->
  <g transform="translate(64,52) scale(0.18)" fill="#FFFDFB">
    <rect x="104" y="210" width="30" height="92"  rx="15"/>
    <rect x="158" y="116" width="30" height="256" rx="15"/>
    <rect x="212" y="160" width="30" height="160" rx="15" fill="#F79A83"/>
    <rect x="266" y="92"  width="30" height="284" rx="15" fill="#F79A83"/>
    <rect x="320" y="146" width="30" height="202" rx="15"/>
    <rect x="374" y="200" width="30" height="108" rx="15"/>
    <path d="M110 416 C 170 392, 226 392, 256 412 C 286 392, 342 392, 402 416"
          fill="none" stroke="#FFFDFB" stroke-width="15" stroke-linecap="round"/>
  </g>
  <text x="166" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="46" letter-spacing="-1" fill="#FFFDFB">Castwright<tspan font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" fill="#F79A83" dx="6">.ai</tspan></text>

  <!-- headline: medium sentence, one bold word -->
  <text x="64" y="318" font-family="Georgia, 'Times New Roman', serif" font-size="74" fill="#FFFDFB">Every character.</text>
  <text x="64" y="404" font-family="Georgia, 'Times New Roman', serif" font-size="74" fill="#FFFDFB">Their <tspan font-weight="bold">own voice</tspan>.</text>

  <!-- tagline -->
  <text x="66" y="476" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="29" fill="#FFFDFB" opacity="0.92">Any book, performed by a full cast — effortlessly.</text>
  <text x="66" y="516" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="29" fill="#FFFDFB" opacity="0.92">Even in your own voice.</text>
</svg>
