function shade(hex, amt) {
  const n = parseInt(hex.replace("#",""), 16);
  let r = (n>>16)+amt, g = ((n>>8)&0xFF)+amt, b = (n&0xFF)+amt;
  r = Math.max(0,Math.min(255,r)); g = Math.max(0,Math.min(255,g)); b = Math.max(0,Math.min(255,b));
  return "#"+((r<<16)|(g<<8)|b).toString(16).padStart(6,"0");
}

function PrimaryButton({ children, variant = "dark", onClick, icon = true, size = "md" }) {
  const styles = {
    dark:  "bg-ink text-canvas hover:bg-ink-soft",
    light: "bg-canvas text-ink hover:bg-white",
    ghost: "bg-transparent text-ink border border-ink/15 hover:bg-ink/5",
    danger:"bg-magenta text-white hover:opacity-90",
    peach: "bg-peach text-ink hover:bg-peach/90",
  };
  const sizing = size === "sm" ? "pl-3.5 pr-1 py-1 text-xs" : "pl-5 pr-1.5 py-1.5 text-sm";
  const dot = size === "sm" ? "w-5 h-5" : "w-7 h-7";
  return (
    <button onClick={onClick} className={`inline-flex items-center gap-2 rounded-full font-medium transition-colors ${sizing} ${styles[variant]}`}>
      <span>{children}</span>
      {icon && <span className={`grid place-items-center rounded-full bg-white/15 ${dot}`}><IconArrow className="w-3.5 h-3.5"/></span>}
    </button>
  );
}
function SectionLabel({ children }) {
  return <span className="inline-block px-3 py-1 rounded-full border border-ink/10 text-xs font-medium text-ink/80 bg-white">{children}</span>;
}
function MixedHeading({ regular, bold, level="h2", className="" }) {
  const sizing = level === "h1" ? "text-3xl md:text-4xl lg:text-5xl" : "text-2xl md:text-3xl";
  return React.createElement(level, { className: `${sizing} font-medium leading-[1.1] tracking-tight text-ink ${className}` }, regular, " ", bold && <span className="font-bold">{bold}</span>);
}
function Avatar({ name, color = "narrator", size = 36 }) {
  const initials = name.split(" ").map(s => s[0]).slice(0,2).join("").toUpperCase();
  const c = CHAR_COLORS[color] ?? CHAR_COLORS.narrator;
  return <div className="rounded-full grid place-items-center text-white font-semibold shrink-0" style={{ width: size, height: size, background: `linear-gradient(135deg, ${c.hex}, ${shade(c.hex,-25)})`, fontSize: size * 0.36 }}>{initials}</div>;
}
function ColorDot({ color, size = 10 }) {
  const c = CHAR_COLORS[color] ?? CHAR_COLORS.narrator;
  return <span className="inline-block rounded-full shrink-0" style={{ width: size, height: size, background: c.hex }} />;
}
function VoiceSwatch({ voice, size = "md", selected = false, showLabel = true, onSelect }) {
  const [hovered, setHovered] = useState(false);
  const dim = { sm: 36, md: 64, lg: 96 }[size];
  const ringSize = dim + 10;
  const [from, to] = voice?.gradient ?? ["#A43C6C","#3C194F"];
  return (
    <div className="inline-flex flex-col items-start">
      <button type="button" onClick={() => onSelect?.(voice?.id)} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)} className="relative inline-grid place-items-center transition-transform hover:scale-[1.02]" style={{ width: ringSize, height: ringSize }}>
        <span className={`absolute inset-0 rounded-full transition-opacity ${selected ? "opacity-100" : "opacity-0"}`} style={{ boxShadow: "0 0 0 2px #F79A83" }}/>
        <span className="rounded-full shadow-[0_8px_24px_rgba(15,14,13,0.12)] relative overflow-hidden" style={{ width: dim, height: dim, background: `radial-gradient(circle at 30% 30%, ${from}, ${to})` }}>
          <svg viewBox="0 0 100 100" className="absolute inset-0 w-full h-full opacity-40"><circle cx="50" cy="50" r="44" fill="none" stroke="white" strokeWidth="1" strokeDasharray="2 4"/></svg>
          <span className={`absolute inset-0 grid place-items-center bg-ink/35 transition-opacity ${hovered ? "opacity-100" : "opacity-0"}`}><IconPlay className="w-5 h-5 text-white"/></span>
        </span>
      </button>
      {showLabel && voice && <div className="mt-2"><p className="text-sm font-semibold text-ink leading-tight">{voice.character || voice.name}</p></div>}
    </div>
  );
}
function Pill({ children, color = "neutral" }) {
  const map = {
    neutral: "bg-ink/[0.04] text-ink/70 border-ink/10",
    success: "bg-emerald-50 text-emerald-700 border-emerald-200",
    warning: "bg-amber-50 text-amber-700 border-amber-200",
    danger:  "bg-rose-50 text-rose-700 border-rose-200",
    peach:   "bg-peach/15 text-magenta border-peach/30",
    library: "bg-purple-deep/[0.06] text-purple-deep border-purple-deep/15",
  };
  return <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-medium border ${map[color]}`}>{children}</span>;
}

const ANALYSIS_PHASES = [
  { id: 0, label: "Reading manuscript",   detail: "Parsing markdown, mapping chapters and scenes.",                            duration: 1500 },
  { id: 1, label: "Detecting characters", detail: "Named-entity extraction, dialogue attribution, speaker resolution.",        duration: 2200 },
  { id: 2, label: "Profiling voices",     detail: "Inferring age, register, regional cues, sentence rhythm from each speaker.", duration: 2400 },
  { id: 3, label: "Matching library",     detail: "Reconciling against voices from your previous books.",                       duration: 1500 },
];

function AnalysingView({ onComplete }) {
  const [phase, setPhase]   = useState(0);
  const [phaseProgress, setPhaseProgress] = useState(0);
  const [snippets, setSnippets] = useState([]);

  useEffect(() => {
    if (phase >= ANALYSIS_PHASES.length) { onComplete(); return; }
    const dur = ANALYSIS_PHASES[phase].duration;
    const start = Date.now();
    const t = setInterval(() => {
      const p = Math.min(1, (Date.now() - start) / dur);
      setPhaseProgress(p);
      if (p >= 1) {
        clearInterval(t);
        setPhase(phase + 1);
        setPhaseProgress(0);
      }
    }, 60);
    return () => clearInterval(t);
  }, [phase]);

  /* Demo snippets that appear during phases */
  useEffect(() => {
    const demos = {
      1: ["Resolved attribution: Captain Halloran (88% confidence)", "New character: Eliza Gray", "New character: Marcus the Cook", "Resolved attribution: Narrator"],
      2: ['Halloran: "thirty winters at sea" → age inference 50–60s', "Eliza: high frequency of imperatives → defiant", "Marcus: self-directed speech mode detected", "Narrator: long subordinate clauses, restrained register"],
      3: ["Possible match: Narrator ↔ Anders Vale (Solway Bay) — 94%", "No match: Captain Halloran", "No match: Eliza Gray"],
    };
    const list = demos[phase];
    if (!list) return;
    setSnippets([]);
    const t = setInterval(() => {
      setSnippets(s => s.length < list.length ? [...s, list[s.length]] : s);
    }, ANALYSIS_PHASES[phase].duration / (list.length + 1));
    return () => clearInterval(t);
  }, [phase]);

  const overall = (phase + phaseProgress) / ANALYSIS_PHASES.length;

  return (
    <div className="relative min-h-[calc(100vh-64px)] flex items-center justify-center px-6 py-16">
      <div className="absolute inset-0 bg-gradient-hero-wash opacity-60 pointer-events-none"/>
      <div className="relative max-w-2xl w-full">
        <div className="text-center mb-10">
          <SectionLabel>Analysing</SectionLabel>
          <div className="mt-5">
            <MixedHeading level="h1" regular="Reading" bold="The Northern Star"/>
          </div>
          <p className="mt-4 text-ink/70">This usually takes 60 to 90 seconds.</p>
        </div>

        {/* Overall progress */}
        <div className="mb-8">
          <div className="flex items-center justify-between text-xs text-ink/60 mb-2">
            <span>Overall</span><span className="tabular-nums font-semibold text-ink">{Math.round(overall*100)}%</span>
          </div>
          <div className="relative h-2 rounded-full bg-ink/[0.06] overflow-hidden">
            <div className="absolute inset-y-0 left-0 bg-gradient-progress rounded-full" style={{ width: `${overall*100}%` }}>
              <div className="absolute inset-0 stripe-travel"/>
            </div>
          </div>
        </div>

        {/* Phase list */}
        <div className="bg-white rounded-3xl border border-ink/10 shadow-card divide-y divide-ink/5">
          {ANALYSIS_PHASES.map(p => {
            const isActive = phase === p.id;
            const isDone   = phase > p.id;
            return (
              <div key={p.id} className="px-6 py-4 flex items-start gap-4">
                <div className="mt-1 shrink-0">
                  {isDone   && <span className="w-7 h-7 rounded-full bg-emerald-100 grid place-items-center"><IconCheck className="w-4 h-4 text-emerald-700"/></span>}
                  {isActive && <span className="w-7 h-7 rounded-full bg-peach/20 grid place-items-center"><IconSpinner className="w-4 h-4 text-magenta"/></span>}
                  {!isDone && !isActive && <span className="w-7 h-7 rounded-full border border-ink/15"/>}
                </div>
                <div className="flex-1 min-w-0">
                  <p className={`font-semibold ${isDone || isActive ? "text-ink" : "text-ink/40"}`}>{p.label}</p>
                  <p className={`text-sm mt-0.5 ${isDone || isActive ? "text-ink/60" : "text-ink/30"}`}>{p.detail}</p>
                  {isActive && (
                    <>
                      <div className="mt-3 h-1 rounded-full bg-ink/[0.06] overflow-hidden">
                        <div className="h-full bg-gradient-progress rounded-full" style={{ width: `${phaseProgress*100}%` }}/>
                      </div>
                      {snippets.length > 0 && (
                        <ul className="mt-3 space-y-1.5 text-xs font-mono text-ink/60">
                          {snippets.map((s, i) => <li key={i} className="tick-up">{s}</li>)}
                        </ul>
                      )}
                    </>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        <button onClick={onComplete} className="mt-6 mx-auto block text-xs text-ink/40 hover:text-ink/70">Skip ahead (demo)</button>
      </div>
    </div>
  );
}

/* =====================================================================
   MANUSCRIPT VIEW (with draggable boundaries)
   ===================================================================== */

function ManuscriptView({ characters, chapters, currentChapterId, setCurrentChapterId }) {
  const [sentences, setSentences] = useState(initialSentences);
  const [selectedSeg, setSelectedSeg] = useState(null);
  const [filterChar, setFilterChar] = useState(null);
  const [drag, setDrag] = useState(null);
  const currentChapter = chapters.find(c => c.id === currentChapterId) || chapters[0];
  const currentIdx = chapters.findIndex(c => c.id === currentChapterId);
  const prevChapter = chapters[currentIdx - 1];
  const nextChapter = chapters[currentIdx + 1];
  /* drag = { boundaryIdx, anchorY, candidateSentenceIdx, direction }
     boundaryIdx is the index in the segments array; candidateSentenceIdx is
     the absolute sentence index in `sentences` to which we're moving the boundary. */
  const containerRef = useRef(null);

  /* Group consecutive same-char sentences into segments */
  const segments = useMemo(() => {
    const segs = [];
    for (let i = 0; i < sentences.length; i++) {
      const s = sentences[i];
      const last = segs[segs.length - 1];
      if (last && last.charId === s.charId) last.sentences.push({ ...s, absIdx: i });
      else segs.push({ id: `seg_${segs.length}`, charId: s.charId, sentences: [{ ...s, absIdx: i }] });
    }
    return segs;
  }, [sentences]);

  const counts = useMemo(() => {
    const m = {};
    for (const s of sentences) m[s.charId] = (m[s.charId] || 0) + 1;
    return m;
  }, [sentences]);

  const findChar = useCallback((id) => characters.find(c => c.id === id), [characters]);

  /* === Boundary drag === */
  const onBoundaryMouseDown = (boundaryIdx, e) => {
    e.preventDefault();
    setDrag({ boundaryIdx, anchorY: e.clientY, candidateSentenceIdx: null });
    document.body.classList.add("dragging-boundary");
  };

  useEffect(() => {
    if (!drag) return;
    const onMove = (e) => {
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const sentenceEl = el?.closest?.("[data-sentence-idx]");
      if (sentenceEl) {
        const idx = Number(sentenceEl.dataset.sentenceIdx);
        setDrag(d => d && d.candidateSentenceIdx !== idx ? { ...d, candidateSentenceIdx: idx } : d);
      }
    };
    const onUp = () => {
      setDrag(d => {
        if (d && d.candidateSentenceIdx != null) commitBoundaryMove(d);
        return null;
      });
      document.body.classList.remove("dragging-boundary");
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, [drag?.boundaryIdx]);

  function commitBoundaryMove(d) {
    /* Find the sentence index of the original boundary. The boundary at index B is
       between segments[B-1] and segments[B]. The first sentence of segments[B] is the
       boundary's "anchor sentence". Moving boundary up = relabel sentences from the
       new candidate to the anchor (exclusive) with the previous segment's charId.
       Moving down = relabel from the anchor forward to the candidate (inclusive)
       with the previous segment's charId.  */
    const segAbove = segments[d.boundaryIdx - 1];
    const segBelow = segments[d.boundaryIdx];
    if (!segAbove || !segBelow) return;
    const anchorIdx = segBelow.sentences[0].absIdx;
    const candIdx = d.candidateSentenceIdx;

    setSentences(prev => prev.map((s, i) => {
      if (candIdx < anchorIdx) {
        /* boundary moves up — sentences candIdx..anchorIdx-1 take segBelow.charId */
        if (i >= candIdx && i < anchorIdx) return { ...s, charId: segBelow.charId };
      } else if (candIdx >= anchorIdx) {
        /* boundary moves down — sentences anchorIdx..candIdx take segAbove.charId */
        if (i >= anchorIdx && i <= candIdx) return { ...s, charId: segAbove.charId };
      }
      return s;
    }));
  }

  /* Reassign a single sentence to a different character */
  function reassignSentence(absIdx, newCharId) {
    setSentences(prev => prev.map((s, i) => i === absIdx ? { ...s, charId: newCharId } : s));
  }

  return (
    <div className="max-w-[1500px] mx-auto px-6 py-8 grid grid-cols-[280px_1fr_360px] gap-6" ref={containerRef}>

      {/* LEFT — CHAPTERS + DETECTED CHARACTERS */}
      <div className="self-start sticky top-24 space-y-4 max-h-[calc(100vh-100px)] overflow-y-auto pr-1">

        {/* Chapters */}
        <aside className="bg-white rounded-3xl border border-ink/10 p-5 shadow-card">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-ink">Chapters</h2>
            <span className="text-xs text-ink/50">{chapters.length}</span>
          </div>
          <ul className="space-y-0.5">
            {chapters.map(ch => {
              const active = currentChapterId === ch.id;
              return (
                <li key={ch.id}>
                  <button onClick={() => setCurrentChapterId(ch.id)}
                    className={`w-full flex items-center gap-3 px-3 py-2 rounded-xl text-left transition-colors relative ${active ? "bg-ink/[0.05]" : "hover:bg-ink/[0.03]"}`}>
                    {active && <span className="absolute left-0 top-2 bottom-2 w-[3px] rounded-full bg-peach"/>}
                    <span className={`text-[11px] font-bold tabular-nums w-7 ${active ? "text-magenta" : "text-ink/40"}`}>CH {String(ch.id).padStart(2,"0")}</span>
                    <span className="flex-1 min-w-0">
                      <span className={`block text-sm truncate ${active ? "font-semibold text-ink" : "font-medium text-ink/80"}`}>{ch.title}</span>
                      <span className="block text-[11px] text-ink/50 tabular-nums">{ch.duration}</span>
                    </span>
                    {ch.state === "in_progress" && <IconSpinner className="w-3 h-3 text-magenta shrink-0"/>}
                    {ch.state === "done"        && <IconCheck    className="w-3 h-3 text-emerald-600 shrink-0"/>}
                    {ch.state === "failed"      && <IconWarning  className="w-3 h-3 text-rose-600 shrink-0"/>}
                  </button>
                </li>
              );
            })}
          </ul>
        </aside>

        {/* Characters */}
        <aside className="bg-white rounded-3xl border border-ink/10 p-5 shadow-card">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-bold text-ink">Detected</h2>
            <span className="text-xs text-ink/50">{characters.length}</span>
          </div>
          <ul className="space-y-1">
            {characters.map(c => {
              const active = filterChar === c.id;
              return (
                <li key={c.id}>
                  <button onClick={() => setFilterChar(active ? null : c.id)}
                    className={`w-full flex items-center gap-3 px-3 py-2 rounded-xl text-left transition-colors ${active ? "bg-ink/[0.05]" : "hover:bg-ink/[0.03]"}`}>
                    <ColorDot color={c.color} size={10}/>
                    <span className="flex-1 min-w-0">
                      <span className="block text-sm font-medium text-ink truncate">{c.name}</span>
                      <span className="block text-xs text-ink/50 truncate">{c.role}</span>
                    </span>
                    <span className="text-xs text-ink/50 tabular-nums">{counts[c.id] || 0}</span>
                  </button>
                </li>
              );
            })}
          </ul>
          <button className="mt-4 w-full flex items-center justify-center gap-2 px-3 py-2 rounded-xl border border-dashed border-ink/20 text-sm text-ink/60 hover:border-peach hover:text-peach transition-colors">
            <IconPlus className="w-4 h-4"/> Add character
          </button>
          <hr className="my-5 border-ink/10"/>
          <div className="text-xs text-ink/50 leading-relaxed space-y-2">
            <p><span className="font-semibold text-ink/70">Move a boundary:</span> drag the line between paragraphs and drop onto any sentence.</p>
            <p><span className="font-semibold text-ink/70">Reassign:</span> hover any paragraph and use the dropdown.</p>
          </div>
        </aside>
      </div>

      {/* CENTRE — MANUSCRIPT */}
      <main>
        <div className="mb-6">
          <SectionLabel>Manuscript analysis</SectionLabel>
          <h1 className="mt-4 text-3xl md:text-4xl font-medium leading-[1.1] tracking-tight">
            Chapter {currentChapter.id} — <span className="font-bold">{currentChapter.title}</span>
          </h1>
          <div className="mt-3 flex items-center gap-4 text-sm text-ink/60">
            <span>{segments.length} segments</span><span>·</span>
            <span>{Object.keys(counts).length} speakers</span><span>·</span>
            <span className="text-amber-700">{sentences.filter(s => s.confidence && s.confidence < 0.75).length} low-confidence</span>
            <span className="ml-auto flex items-center gap-1">
              <button onClick={() => prevChapter && setCurrentChapterId(prevChapter.id)} disabled={!prevChapter}
                className="px-2 py-1 rounded-lg border border-ink/10 bg-white text-ink/70 hover:text-ink disabled:opacity-30 disabled:cursor-not-allowed inline-flex items-center gap-1 text-xs font-medium">
                <IconChevL className="w-3.5 h-3.5"/> Prev
              </button>
              <button onClick={() => nextChapter && setCurrentChapterId(nextChapter.id)} disabled={!nextChapter}
                className="px-2 py-1 rounded-lg border border-ink/10 bg-white text-ink/70 hover:text-ink disabled:opacity-30 disabled:cursor-not-allowed inline-flex items-center gap-1 text-xs font-medium">
                Next <IconChevR className="w-3.5 h-3.5"/>
              </button>
            </span>
          </div>
        </div>

        <div className="bg-white rounded-3xl border border-ink/10 shadow-card p-10">
          <article className="font-serif text-[17px] leading-[1.8] text-ink/90">
            {segments.map((seg, segIdx) => (
              <React.Fragment key={seg.id}>
                <Segment
                  seg={seg}
                  characters={characters}
                  selected={selectedSeg === seg.id}
                  dimmed={filterChar && filterChar !== seg.charId}
                  drag={drag}
                  onSelect={() => setSelectedSeg(seg.id)}
                  onReassign={(absIdx, newCharId) => reassignSentence(absIdx, newCharId)}
                  findChar={findChar}
                />
                {segIdx < segments.length - 1 && (
                  <BoundaryHandle boundaryIdx={segIdx + 1} drag={drag} onMouseDown={onBoundaryMouseDown}/>
                )}
              </React.Fragment>
            ))}
          </article>
        </div>
      </main>

      {/* RIGHT — INSPECTOR */}
      <aside className="self-start sticky top-24">
        <SegmentInspector
          seg={segments.find(s => s.id === selectedSeg)}
          characters={characters}
          findChar={findChar}
          onClose={() => setSelectedSeg(null)}
          onReassignSegment={(seg, newCharId) => {
            setSentences(prev => prev.map((s, i) => seg.sentences.some(ss => ss.absIdx === i) ? { ...s, charId: newCharId } : s));
            setSelectedSeg(null);
          }}
        />
      </aside>
    </div>
  );
}

function Segment({ seg, characters, selected, dimmed, drag, onSelect, onReassign, findChar }) {
  const [hovered, setHovered] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const c = CHAR_COLORS[findChar(seg.charId)?.color || "narrator"];

  return (
    <div className={`group relative -mx-4 px-4 py-2 rounded-xl transition-all cursor-pointer ${dimmed ? "opacity-40" : ""} ${selected ? "ring-1 ring-peach/40" : "hover:bg-ink/[0.02]"}`}
         onMouseEnter={() => setHovered(true)}
         onMouseLeave={() => { setHovered(false); setMenuOpen(false); }}
         onClick={onSelect}>
      <span className="absolute left-0 top-2 bottom-2 w-[3px] rounded-full" style={{ background: c.hex }}/>
      <span className="absolute inset-0 rounded-xl pointer-events-none" style={{ background: c.tint }}/>
      <div className="relative">
        <div className="flex items-center gap-2 mb-1">
          <span className="text-[11px] uppercase tracking-wider font-semibold" style={{ color: c.hex }}>
            {findChar(seg.charId)?.name}
          </span>
          {seg.sentences.some(s => s.confidence && s.confidence < 0.75) && (
            <Pill color="warning">Low confidence</Pill>
          )}
          <span className={`ml-auto flex items-center gap-1 transition-opacity ${hovered || selected ? "opacity-100" : "opacity-0"}`}>
            <div className="relative">
              <button onClick={(e)=>{e.stopPropagation(); setMenuOpen(!menuOpen);}} className="px-2 py-1 rounded-md bg-white border border-ink/10 text-[11px] font-medium text-ink/70 hover:text-ink hover:border-ink/30 inline-flex items-center gap-1">
                Reassign <IconArrowDn className="w-3 h-3"/>
              </button>
              {menuOpen && (
                <div className="absolute right-0 top-full mt-1 w-44 bg-white border border-ink/10 rounded-xl shadow-card py-1 z-10" onClick={(e)=>e.stopPropagation()}>
                  {characters.map(cc => (
                    <button key={cc.id} onClick={()=>{ onReassign(seg.sentences[0].absIdx, cc.id); setMenuOpen(false); }} className="w-full flex items-center gap-2 px-3 py-1.5 hover:bg-ink/[0.04] text-left text-sm">
                      <ColorDot color={cc.color}/><span className="flex-1">{cc.name}</span>
                      {cc.id === seg.charId && <IconCheck className="w-3.5 h-3.5 text-ink/60"/>}
                    </button>
                  ))}
                </div>
              )}
            </div>
          </span>
        </div>
        <div>
          {seg.sentences.map(s => {
            const isCandidate = drag && drag.candidateSentenceIdx === s.absIdx;
            return (
              <span key={s.id}
                data-sentence-idx={s.absIdx}
                className={`inline transition-colors ${isCandidate ? "sentence-candidate" : ""}`}>
                {s.text}{" "}
              </span>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function BoundaryHandle({ boundaryIdx, drag, onMouseDown }) {
  const isThisDragging = drag?.boundaryIdx === boundaryIdx;
  return (
    <div className="relative h-3 -my-1 group">
      <span
        onMouseDown={(e)=>onMouseDown(boundaryIdx, e)}
        className={`absolute left-0 right-0 top-1/2 -translate-y-1/2 h-[2px] cursor-ns-resize transition-colors ${isThisDragging ? "bg-peach" : "bg-transparent group-hover:bg-peach/40"}`}/>
      <span className={`absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 px-2 py-0.5 rounded-full bg-white border text-[10px] font-medium uppercase tracking-wider transition-opacity ${isThisDragging ? "opacity-100 border-peach text-magenta pulse-ring" : "opacity-0 group-hover:opacity-100 border-ink/15 text-ink/50"}`}>
        {isThisDragging ? "drop on a sentence" : "drag to move"}
      </span>
    </div>
  );
}

function SegmentInspector({ seg, characters, findChar, onClose, onReassignSegment }) {
  if (!seg) return (
    <div className="bg-white rounded-3xl border border-dashed border-ink/15 p-6 text-sm text-ink/50">
      Select a paragraph to inspect or reassign all of it at once.
    </div>
  );
  const c  = findChar(seg.charId);
  const cc = CHAR_COLORS[c.color];
  const minConf = Math.min(...seg.sentences.map(s => s.confidence ?? 1));
  return (
    <div className="bg-white rounded-3xl border border-ink/10 shadow-card overflow-hidden">
      <div className="p-5 pb-0 flex items-center gap-3">
        <span className="w-1 h-8 rounded-full" style={{ background: cc.hex }}/>
        <div className="flex-1 min-w-0">
          <p className="text-[11px] uppercase tracking-wider text-ink/50 font-semibold">Selected segment</p>
          <h3 className="text-base font-bold text-ink truncate">{c.name}</h3>
        </div>
        <button onClick={onClose} className="p-1.5 rounded-full hover:bg-ink/5 text-ink/60"><IconClose className="w-4 h-4"/></button>
      </div>
      <div className="px-5 mt-4">
        <p className="text-[11px] uppercase tracking-wider text-ink/50 font-semibold mb-2">Confidence</p>
        <div className="flex items-center gap-3">
          <div className="flex-1 h-1.5 rounded-full bg-ink/10 overflow-hidden">
            <div className="h-full rounded-full" style={{ width: `${minConf*100}%`, background: minConf < 0.75 ? "#C58B2B" : cc.hex }}/>
          </div>
          <span className="text-sm font-semibold text-ink tabular-nums">{Math.round(minConf*100)}%</span>
        </div>
      </div>
      <div className="px-5 mt-5">
        <p className="text-[11px] uppercase tracking-wider text-ink/50 font-semibold mb-2">Reassign whole segment to</p>
        <div className="flex flex-col gap-1">
          {characters.map(cand => (
            <button key={cand.id} onClick={()=>onReassignSegment(seg, cand.id)} className={`w-full flex items-center gap-3 px-3 py-2 rounded-xl text-left transition-colors ${cand.id === seg.charId ? "bg-ink/[0.04]" : "hover:bg-ink/[0.03]"}`}>
              <ColorDot color={cand.color}/>
              <span className="text-sm text-ink flex-1">{cand.name}</span>
              {cand.id === seg.charId && <IconCheck className="w-4 h-4 text-ink/70"/>}
            </button>
          ))}
        </div>
      </div>
      <div className="p-5 mt-4 border-t border-ink/10 text-xs text-ink/50 leading-relaxed">
        Tip: to split this segment further, drag the boundary line above or below it onto a sentence inside.
      </div>
    </div>
  );
}

/* =====================================================================
   CAST VIEW (voices generated, not selected; drag-drop reuse from library)
   ===================================================================== */

function CastView({ characters, setCharacters, library, onOpenProfile, openProfileId, onShowMatchDetail, onRegenerateCharacter, onBatchRegenerate, driftEvents, onShowDrift }) {
  const [query, setQuery] = useState("");
  const [showLibrary, setShowLibrary] = useState(true);
  const [draggingVoiceId, setDraggingVoiceId] = useState(null);
  const [dropTargetCharId, setDropTargetCharId] = useState(null);

  const filtered = characters.filter(c => c.name.toLowerCase().includes(query.toLowerCase()));
  const [selectedCharIds, setSelectedCharIds] = useState([]);
  const toggleSelect = (id) => setSelectedCharIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  const driftByChar = (id) => driftEvents.filter(d => d.characterId === id);
  const totalDriftEvents = driftEvents.length;
  const findVoice = (id) => library.find(v => v.id === id);

  function handleDrop(charId) {
    if (!draggingVoiceId) return;
    const voice = findVoice(draggingVoiceId);
    if (!voice) return;
    setCharacters(prev => prev.map(c => c.id === charId ? {
      ...c,
      voiceId: voice.id,
      voiceState: voice.source === "library" ? "reused" : "tuned",
      attributes: voice.attributes,
      matchedFrom: voice.source === "library" ? { bookTitle: voice.bookTitle, confidence: 0.92 } : undefined,
    } : c));
    setDraggingVoiceId(null);
    setDropTargetCharId(null);
  }

  return (
    <div className={`max-w-[1500px] mx-auto px-6 py-10 grid ${showLibrary ? "grid-cols-[1fr_360px]" : "grid-cols-1"} gap-6 relative ${draggingVoiceId ? "dragging-voice" : ""}`}>
      <div>
        <div className="mb-8 flex items-end justify-between gap-6 flex-wrap">
          <div>
            <SectionLabel>Your cast</SectionLabel>
            <div className="mt-4">
              <MixedHeading regular="Voices generated from" bold="The Northern Star" level="h1"/>
            </div>
            <p className="mt-3 text-ink/60 max-w-xl">Each voice is synthesised from how the character actually speaks in the book. Tune the profile, regenerate, or drop in a voice from your library to keep continuity across a series.</p>
          </div>
          <button onClick={()=>setShowLibrary(!showLibrary)} className="px-4 py-2.5 rounded-full border border-ink/10 bg-white text-sm font-medium text-ink/70 hover:text-ink inline-flex items-center gap-2">
            <IconLink className="w-4 h-4"/>{showLibrary ? "Hide" : "Show"} library
          </button>
        </div>

        {/* Drift detector banner */}
        {totalDriftEvents > 0 && (
          <button onClick={onShowDrift} className="w-full mb-4 p-4 rounded-3xl border border-amber-200 bg-amber-50/60 hover:bg-amber-50 transition-colors flex items-center gap-4 text-left">
            <span className="w-10 h-10 rounded-full bg-amber-100 grid place-items-center text-amber-700 shrink-0"><IconAlertTri className="w-5 h-5"/></span>
            <div className="flex-1 min-w-0">
              <p className="text-sm font-bold text-ink">Voice drift detected in {totalDriftEvents} chapter{totalDriftEvents === 1 ? "" : "s"}</p>
              <p className="text-xs text-ink/65 mt-0.5">Some chapters have voices that don't match their established profiles. Click to review and decide what to regenerate.</p>
            </div>
            <span className="inline-flex items-center gap-1.5 text-xs font-semibold text-amber-700 shrink-0">
              See report <IconChevR className="w-3.5 h-3.5"/>
            </span>
          </button>
        )}

        {/* Toolbar */}
        <div className="flex items-center gap-3 mb-4">
          <div className="flex-1 relative">
            <IconSearch className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-ink/40"/>
            <input type="text" value={query} onChange={(e)=>setQuery(e.target.value)} placeholder="Search characters" className="w-full pl-11 pr-4 py-2.5 rounded-full bg-white border border-ink/10 text-sm focus:outline-none focus:border-ink/30"/>
          </div>
          <button className="px-4 py-2.5 rounded-full border border-ink/10 bg-white text-sm font-medium text-ink/70 hover:text-ink inline-flex items-center gap-2"><IconFilter className="w-4 h-4"/>Filter</button>
        </div>

        {/* Table */}
        <div className="bg-white rounded-3xl border border-ink/10 shadow-card overflow-hidden">
          <div className="grid grid-cols-[40px_1.5fr_1.2fr_1.6fr_0.6fr_1.2fr_1fr_60px] px-6 py-3 text-[11px] uppercase tracking-wider font-semibold text-ink/50 border-b border-ink/10">
            <span></span>
            <span>Character</span><span>Role</span><span>Voice</span>
            <span className="text-right tabular-nums">Lines</span>
            <span>Tone</span><span>Status</span><span></span>
          </div>
          {filtered.map((c, i) => {
            const voice = findVoice(c.voiceId);
            const isDropTarget = dropTargetCharId === c.id;
            return (
              <div key={c.id}
                onDragOver={(e)=>{ if(draggingVoiceId){ e.preventDefault(); setDropTargetCharId(c.id); } }}
                onDragLeave={()=>setDropTargetCharId(t => t === c.id ? null : t)}
                onDrop={(e)=>{ e.preventDefault(); handleDrop(c.id); }}
                onClick={()=>onOpenProfile(c.id)}
                className={`w-full grid grid-cols-[40px_1.5fr_1.2fr_1.6fr_0.6fr_1.2fr_1fr_60px] px-6 py-4 items-center text-left text-sm hover:bg-ink/[0.02] transition-colors cursor-pointer ${i < filtered.length-1 ? "border-b border-ink/5" : ""} ${isDropTarget ? "drop-active" : ""} ${selectedCharIds.includes(c.id) ? "bg-peach/[0.04]" : ""}`}>
                <span onClick={(e)=>{ e.stopPropagation(); toggleSelect(c.id); }} className="grid place-items-center">
                  <span className={`w-5 h-5 rounded-md grid place-items-center transition-colors ${selectedCharIds.includes(c.id) ? "bg-peach" : "bg-white border border-ink/20 hover:border-ink/40"}`}>
                    {selectedCharIds.includes(c.id) && <IconCheck className="w-3 h-3 text-white"/>}
                  </span>
                </span>
                <span className="flex items-center gap-3 min-w-0">
                  <Avatar name={c.name} color={c.color} size={36}/>
                  <span className="min-w-0">
                    <span className="flex items-center gap-1.5">
                      <span className="font-semibold text-ink truncate">{c.name}</span>
                      {driftByChar(c.id).length > 0 && (
                        <span title={`${driftByChar(c.id).length} chapter${driftByChar(c.id).length === 1 ? "" : "s"} with voice drift`}
                              onClick={(e)=>{ e.stopPropagation(); onShowDrift(); }}
                              className="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full bg-amber-100 text-amber-700 text-[10px] font-bold">
                          <IconAlertTri className="w-2.5 h-2.5"/>{driftByChar(c.id).length}
                        </span>
                      )}
                    </span>
                    <span className="block text-xs text-ink/50 truncate">{c.attributes.slice(0,2).join(" · ")}</span>
                  </span>
                </span>
                <span className="text-ink/70 truncate">{c.role}</span>
                <span className="flex items-center gap-3 min-w-0">
                  {voice ? (
                    <>
                      <VoiceSwatch voice={voice} size="sm" showLabel={false}/>
                      <span className="min-w-0">
                        <span className="block text-ink/80 truncate font-medium">{voice.character}</span>
                        {c.matchedFrom && (
                          <button onClick={(e)=>{ e.stopPropagation(); onShowMatchDetail?.(c.id); }} className="block text-[11px] text-purple-deep/70 hover:text-purple-deep truncate underline-offset-2 hover:underline">
                            From {c.matchedFrom.bookTitle} · {Math.round(c.matchedFrom.confidence*100)}%
                          </button>
                        )}
                      </span>
                    </>
                  ) : <span className="text-ink/40 italic">Generating…</span>}
                </span>
                <span className="text-right tabular-nums text-ink/80 font-medium">{c.lines}</span>
                <span className="flex flex-wrap gap-1">
                  {c.attributes.slice(2,4).map(a => <Pill key={a}>{a}</Pill>)}
                </span>
                <span>
                  {c.voiceState === "generated" && <Pill color="success">Generated</Pill>}
                  {c.voiceState === "tuned"     && <Pill color="warning">Tuned</Pill>}
                  {c.voiceState === "reused"    && <Pill color="library">Reused</Pill>}
                  {c.voiceState === "locked"    && <Pill>Locked</Pill>}
                </span>
                <span className="grid place-items-center text-ink/40"><IconMore className="w-4 h-4"/></span>
              </div>
            );
          })}
        </div>

        <p className="mt-4 text-xs text-ink/50 text-center">
          {draggingVoiceId ? "Drop the voice on any character row to reassign." : "Drag a voice from the library onto a character to reuse it across this book and others in the series."}
        </p>

        {/* Batch action bar */}
        {selectedCharIds.length > 0 && (
          <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-30 fade-in">
            <div className="bg-ink text-canvas rounded-full shadow-float px-4 py-2 flex items-center gap-3">
              <span className="text-xs text-canvas/60">Selected</span>
              <span className="px-2 py-0.5 rounded-full bg-canvas/15 text-canvas font-bold text-sm tabular-nums">{selectedCharIds.length}</span>
              <span className="flex items-center -space-x-1.5">
                {selectedCharIds.slice(0, 4).map(id => {
                  const c = characters.find(x => x.id === id);
                  return c ? <Avatar key={id} name={c.name} color={c.color} size={24}/> : null;
                })}
              </span>
              <span className="w-px h-5 bg-canvas/20"/>
              <button onClick={()=>onBatchRegenerate(selectedCharIds)} className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-peach text-ink text-xs font-bold hover:bg-peach/90">
                <IconRefresh className="w-3.5 h-3.5"/> Regenerate
              </button>
              <button onClick={()=>setSelectedCharIds([])} className="text-xs text-canvas/70 hover:text-canvas font-medium">Clear</button>
            </div>
          </div>
        )}
      </div>

      {/* RIGHT — VOICE LIBRARY */}
      {showLibrary && (
        <aside className="self-start sticky top-24">
          <VoiceLibraryPanel library={library} draggingVoiceId={draggingVoiceId} setDraggingVoiceId={setDraggingVoiceId} compact/>
        </aside>
      )}

      {openProfileId && (
        <ProfileDrawer
          character={characters.find(c => c.id === openProfileId)}
          voice={findVoice(characters.find(c => c.id === openProfileId)?.voiceId)}
          onClose={()=>onOpenProfile(null)}
          onSave={(updated)=>{
            setCharacters(prev => prev.map(c => c.id === updated.id ? updated : c));
            onOpenProfile(null);
          }}
          onShowMatchDetail={onShowMatchDetail}
          onRegenerateCharacter={onRegenerateCharacter}
        />
      )}
    </div>
  );
}

function VoiceLibraryPanel({ library, draggingVoiceId, setDraggingVoiceId, compact = false }) {
  const [tab, setTab] = useState("all");
  const filtered = library.filter(v => tab === "all" || v.source === tab);
  return (
    <div className="bg-white rounded-3xl border border-ink/10 shadow-card overflow-hidden flex flex-col max-h-[calc(100vh-120px)]">
      <div className="p-5 pb-0">
        <div className="flex items-center justify-between mb-2">
          <h2 className="text-sm font-bold text-ink">Voice library</h2>
          <span className="text-xs text-ink/50">{library.length} voices · 3 books</span>
        </div>
        <p className="text-xs text-ink/50 mb-3">Drag onto a character to reuse.</p>
        <div className="flex items-center gap-1 bg-ink/[0.04] rounded-full p-0.5 text-xs">
          {[
            { id: "all",     label: "All" },
            { id: "current", label: "This book" },
            { id: "library", label: "Series" },
          ].map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)} className={`flex-1 px-2 py-1 rounded-full font-medium transition-colors ${tab===t.id ? "bg-white text-ink shadow-card" : "text-ink/60"}`}>{t.label}</button>
          ))}
        </div>
      </div>
      <div className="p-5 overflow-y-auto space-y-2">
        {filtered.map(v => (
          <VoiceCard key={v.id} voice={v} draggingVoiceId={draggingVoiceId} setDraggingVoiceId={setDraggingVoiceId} compact={compact}/>
        ))}
      </div>
    </div>
  );
}

function VoiceCard({ voice, draggingVoiceId, setDraggingVoiceId, compact = false }) {
  const isDragging = draggingVoiceId === voice.id;
  return (
    <div draggable
         onDragStart={(e)=>{ setDraggingVoiceId(voice.id); e.dataTransfer.effectAllowed = "copy"; }}
         onDragEnd={()=>setDraggingVoiceId(null)}
         className={`group flex items-start gap-3 p-3 rounded-2xl border bg-canvas hover:bg-white border-ink/10 cursor-grab active:cursor-grabbing transition-all ${isDragging ? "opacity-40 scale-[0.98]" : ""}`}>
      <VoiceSwatch voice={voice} size="sm" showLabel={false}/>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2">
          <p className="text-sm font-bold text-ink truncate">{voice.character}</p>
          {voice.source === "library" && voice.usedIn > 1 && <Pill color="library"><IconStar className="w-2.5 h-2.5 mr-0.5"/>×{voice.usedIn}</Pill>}
        </div>
        <p className="text-[11px] text-ink/60 truncate">{voice.bookTitle}</p>
        {!compact && (
          <div className="mt-1.5 flex flex-wrap gap-1">
            {voice.attributes.slice(0, 3).map(a => <Pill key={a}>{a}</Pill>)}
          </div>
        )}
      </div>
      <span className="text-ink/30 group-hover:text-ink/60 transition-colors mt-1"><IconDrag className="w-4 h-4"/></span>
    </div>
  );
}

function ProfileDrawer({ character, voice, onClose, onSave, onShowMatchDetail, onRegenerateCharacter }) {
  const [tone, setTone] = useState(character.tone);
  const [regenerating, setRegenerating] = useState(false);
  const c = CHAR_COLORS[character.color];

  function regenerate() {
    setRegenerating(true);
    setTimeout(() => {
      setRegenerating(false);
    }, 1800);
  }

  return (
    <>
      <div onClick={onClose} className="fixed inset-0 bg-ink/30 z-40 fade-in"/>

/* =====================================================================
   GENERATION VIEW with live tick
   ===================================================================== */

function GenerationView({ chapters, setChapters, characters, paused, setPaused, onRegenerate, onRegenerateCharacterInChapter }) {
  const [expanded, setExpanded] = useState({ 3: true });

  /* Live tick — advance the in-progress chapter */
  useEffect(() => {
    if (paused) return;
    const tick = setInterval(() => {
      setChapters(prev => {
        const next = [...prev];
        const idx = next.findIndex(c => c.state === "in_progress");
        if (idx === -1) {
          const queueIdx = next.findIndex(c => c.state === "queued");
          if (queueIdx !== -1) {
            next[queueIdx] = { ...next[queueIdx], state: "in_progress", progress: 0.02, currentLine: 1, totalLines: 600 };
          }
          return next;
        }
        const ch = next[idx];
        const newProgress = Math.min(1, ch.progress + 0.025 + Math.random() * 0.02);
        const newLine = Math.round((ch.totalLines || 661) * newProgress);
        const newCharacters = { ...ch.characters };
        /* As progress crosses thresholds, advance per-character status */
        if (newProgress > 0.55 && newCharacters.eliza === "queued") newCharacters.eliza = "in_progress";
        if (newProgress > 0.75 && newCharacters.eliza === "in_progress") newCharacters.eliza = "done";
        if (newProgress > 0.78 && newCharacters.marcus === "queued") newCharacters.marcus = "in_progress";
        if (newProgress > 0.93 && newCharacters.narrator === "in_progress") newCharacters.narrator = "done";
        if (newProgress >= 1) {
          for (const k of Object.keys(newCharacters)) if (newCharacters[k] === "in_progress" || newCharacters[k] === "queued") newCharacters[k] = newCharacters[k] === "queued" && ch.characters[k] === "skipped" ? "skipped" : "done";
        }
        next[idx] = {
          ...ch,
          progress: newProgress,
          currentLine: newLine,
          characters: newCharacters,
          state: newProgress >= 1 ? "done" : "in_progress",
        };
        return next;
      });
    }, 1400);
    return () => clearInterval(tick);
  }, [paused, setChapters]);

  const completed = chapters.filter(c => c.state === "done").length;
  const failed    = chapters.filter(c => c.state === "failed").length;
  const inProgress = chapters.find(c => c.state === "in_progress");
  const queued    = chapters.filter(c => c.state === "queued").length;
  const totalProgress = chapters.reduce((s,c) => s + c.progress, 0) / chapters.length;
  const minutesLeft = Math.max(1, Math.round((1 - totalProgress) * 45));

  return (
    <div className="max-w-[1100px] mx-auto px-6 py-10">
      <div className="mb-8 flex items-end justify-between gap-6 flex-wrap">
        <div>
          <SectionLabel>Audiobook generation</SectionLabel>
          <div className="mt-4">
            <MixedHeading regular="Generating" bold="The Northern Star" level="h1"/>
          </div>
          <p className="mt-3 text-ink/60">{completed} of {chapters.length} chapters complete · approx. {minutesLeft} min remaining</p>
        </div>
        <div className="flex items-center gap-3">
          <button onClick={()=>setPaused(!paused)} className="px-4 py-2.5 rounded-full border border-ink/10 bg-white text-sm font-medium text-ink/70 hover:text-ink inline-flex items-center gap-2">
            {paused ? <><IconPlay className="w-4 h-4"/> Resume</> : <><IconPause className="w-4 h-4"/> Pause</>}
          </button>
          <PrimaryButton variant="ghost" icon={false}>View partial output</PrimaryButton>
        </div>
      </div>

      {/* Overall progress */}
      <div className="bg-white rounded-3xl border border-ink/10 shadow-card p-6 mb-8">
        <div className="flex items-center justify-between mb-3">
          <p className="text-sm font-semibold text-ink">Overall progress</p>
          <span className="text-sm font-bold text-ink tabular-nums">{Math.round(totalProgress*100)}%</span>
        </div>
        <div className="relative h-3 rounded-full bg-ink/[0.06] overflow-hidden">
          <div className="absolute inset-y-0 left-0 bg-gradient-progress rounded-full transition-all" style={{ width: `${totalProgress*100}%` }}>
            {!paused && <div className="absolute inset-0 stripe-travel"/>}
          </div>
        </div>
        <div className="mt-4 grid grid-cols-4 gap-4 pt-4 border-t border-ink/10">
          <Stat label="Completed"   value={completed}/>
          <Stat label="In progress" value={inProgress ? 1 : 0}/>
          <Stat label="Queued"      value={queued}/>
          <Stat label="Failed"      value={failed} danger/>
        </div>
      </div>

      {/* Chapters */}
      <div className="space-y-3">
        {chapters.map(ch => (
          <ChapterRow key={ch.id} chapter={ch} characters={characters} expanded={!!expanded[ch.id]} onToggle={()=>setExpanded({ ...expanded, [ch.id]: !expanded[ch.id] })} paused={paused} onRegenerate={onRegenerate} onRegenerateCharacterInChapter={onRegenerateCharacterInChapter}/>
        ))}
      </div>

      <div className="mt-10 pt-6 border-t border-ink/10 flex items-center justify-between text-xs text-ink/50">
        <div className="flex items-center gap-6">
          <span>Output: 24-bit FLAC + MP3</span><span>·</span><span>Estimated runtime: 4h 38m</span><span>·</span><span>Format: m4b chaptered</span>
        </div>
        <button className="text-magenta font-medium hover:underline">Cancel generation</button>
      </div>
    </div>
  );
}

function Stat({ label, value, danger }) {
  return (
    <div>
      <p className="text-[11px] uppercase tracking-wider text-ink/50 font-semibold mb-1">{label}</p>
      <p className={`text-2xl font-bold tabular-nums ${danger && value > 0 ? "text-magenta" : "text-ink"}`}>{value}</p>
    </div>
  );
}

function ChapterRow({ chapter, characters, expanded, onToggle, paused, onRegenerate, onRegenerateCharacterInChapter }) {
  const stateConfig = {
    done:        { tint: "bg-emerald-50/50",  badge: <Pill color="success">Done</Pill>,        icon: <IconCheck   className="w-4 h-4 text-emerald-600"/> },
    in_progress: { tint: "bg-peach/[0.06]",   badge: <Pill color="peach">{paused ? "Paused" : "Generating"}</Pill>, icon: paused ? <IconPause className="w-4 h-4 text-magenta"/> : <IconSpinner className="w-4 h-4 text-magenta"/> },
    queued:      { tint: "bg-white",          badge: <Pill>Queued</Pill>,                      icon: <span className="w-4 h-4 rounded-full border border-ink/20"/> },
    failed:      { tint: "bg-rose-50/50",     badge: <Pill color="danger">Failed</Pill>,       icon: <IconWarning className="w-4 h-4 text-rose-600"/> },
  }[chapter.state];

  const findChar = (id) => characters.find(c => c.id === id) || { name: id, color: "narrator" };

  return (
    <div className={`rounded-3xl border border-ink/10 shadow-card overflow-hidden ${stateConfig.tint}`}>
      <button onClick={onToggle} className="w-full grid grid-cols-[40px_60px_1fr_180px_100px_120px_24px] items-center gap-4 px-5 py-4 text-left">
        <span className="grid place-items-center">{stateConfig.icon}</span>
        <span className="text-sm font-bold text-ink/50 tabular-nums">CH {String(chapter.id).padStart(2,"0")}</span>
        <span className="min-w-0">
          <span className="block font-semibold text-ink truncate">{chapter.title}</span>
          {chapter.errorReason && <span className="block text-xs text-rose-600 truncate mt-0.5">{chapter.errorReason}</span>}
        </span>
        <ChapterProgressBar progress={chapter.progress} state={chapter.state} paused={paused}/>
        <span className="text-sm tabular-nums text-ink/60 text-right">{chapter.duration}</span>
        <span>{stateConfig.badge}</span>
        <span className={`text-ink/40 transition-transform ${expanded ? "rotate-180" : ""}`}><IconArrowDn className="w-4 h-4"/></span>
      </button>
      {onRegenerate && (chapter.state === "done" || chapter.state === "failed") && (
        <div className="px-5 py-2 -mt-2 flex justify-end">
          <button onClick={(e)=>{ e.stopPropagation(); onRegenerate(chapter); }} className="inline-flex items-center gap-1.5 text-xs font-medium text-ink/60 hover:text-magenta transition-colors">
            <IconRefresh className="w-3.5 h-3.5"/> Regenerate this chapter
          </button>
        </div>
      )}
      {expanded && (
        <div className="px-5 pb-5 pt-1 fade-in">
          <div className="ml-[100px] pl-4 border-l border-ink/10 space-y-2">
            {Object.entries(chapter.characters).map(([cid, status]) => {
              const c = findChar(cid);
              return (
                <div key={cid} className="grid grid-cols-[20px_1fr_140px_100px_28px] items-center gap-4 py-1.5 text-sm group">
                  <ColorDot color={c.color} size={8}/>
                  <span className="font-medium text-ink/90">{c.name}</span>
                  <CharStatusBar status={status} paused={paused}/>
                  <span className="text-xs text-ink/50 capitalize text-right">
                    {status === "in_progress" && <span className="text-magenta font-medium">{paused ? "Paused" : "Generating…"}</span>}
                    {status === "done"        && <span className="text-emerald-700 font-medium">Done</span>}
                    {status === "queued"      && "Queued"}
                    {status === "skipped"     && "—"}
                    {status === "failed"      && <span className="text-rose-600 font-medium">Failed</span>}
                  </span>
                  {status !== "skipped" && onRegenerateCharacterInChapter && (
                    <button onClick={(e)=>{ e.stopPropagation(); onRegenerateCharacterInChapter(cid, chapter.id); }}
                      title={`Regenerate ${c.name} in this chapter`}
                      className="opacity-0 group-hover:opacity-100 text-ink/40 hover:text-magenta grid place-items-center w-7 h-7 rounded-full hover:bg-ink/[0.06] transition-all">
                      <IconRefresh className="w-3.5 h-3.5"/>
                    </button>
                  )}
                </div>
              );
            })}
          </div>
          {chapter.state === "failed" && (
            <div className="mt-4 ml-[100px] flex items-center gap-3">
              <PrimaryButton variant="dark" size="sm">Retry chapter</PrimaryButton>
              <button className="text-sm font-medium text-ink/60 hover:text-ink">View error log</button>
            </div>
          )}
          {chapter.state === "in_progress" && chapter.currentLine && (
            <div className="mt-4 ml-[100px] flex items-center gap-3 text-xs text-ink/60">
              <span>Active: <span className="font-semibold text-ink">{Object.entries(chapter.characters).find(([,s]) => s === "in_progress")?.[0] || "—"}</span> · line {chapter.currentLine.toLocaleString()} of {chapter.totalLines.toLocaleString()}</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function ChapterProgressBar({ progress, state, paused }) {
  if (state === "queued") return <div className="h-1.5 rounded-full bg-ink/[0.06]"/>;
  if (state === "done")   return <div className="h-1.5 rounded-full bg-emerald-200"><div className="h-full w-full rounded-full bg-emerald-500"/></div>;
  if (state === "failed") return <div className="h-1.5 rounded-full bg-rose-100"><div className="h-full rounded-full bg-rose-500" style={{ width: `${progress*100}%` }}/></div>;
  return (
    <div className="relative h-1.5 rounded-full bg-ink/[0.06] overflow-hidden">
      <div className={`absolute inset-y-0 left-0 bg-gradient-progress rounded-full transition-all duration-700 ${paused ? "" : "pulse-bar"}`} style={{ width: `${progress*100}%` }}>
        {!paused && <div className="absolute inset-0 stripe-travel"/>}
      </div>
    </div>
  );
}

function CharStatusBar({ status, paused }) {
  if (status === "done")        return <div className="h-1 rounded-full bg-emerald-400"/>;
  if (status === "skipped")     return <div className="h-1 rounded-full bg-ink/[0.04]"/>;
  if (status === "queued")      return <div className="h-1 rounded-full bg-ink/[0.08]"/>;
  if (status === "failed")      return <div className="h-1 rounded-full bg-rose-400"/>;
  if (status === "in_progress") return (
    <div className="relative h-1 rounded-full bg-ink/[0.06] overflow-hidden">
      <div className={`absolute inset-y-0 left-0 w-3/5 bg-gradient-progress rounded-full ${paused ? "" : "pulse-bar"}`}>
        {!paused && <div className="absolute inset-0 stripe-travel"/>}
      </div>
    </div>
  );
  return null;
}

/* =====================================================================
   LISTEN / DELIVERY VIEW
   ===================================================================== */

function parseDuration(s) { const [m, sec] = s.split(":").map(Number); return m*60 + sec; }
function formatTime(totalSec) { const m = Math.floor(totalSec/60); const s = Math.floor(totalSec%60); return `${m}:${String(s).padStart(2,"0")}`; }

function ListenView({ chapters, characters, library, currentTrack, setCurrentTrack, onSendApp, onRegenerate, onEnterPreview }) {
  const completed = chapters.filter(c => c.state === "done").length;
  const totalSec = chapters.reduce((s,c) => s + parseDuration(c.duration), 0);
  const findChar = (id) => characters.find(c => c.id === id);
  return (
    <div className="max-w-[1200px] mx-auto px-6 py-10">
      <section className="grid grid-cols-1 md:grid-cols-[320px_1fr] gap-10 items-end mb-12">

function ChapterListenRow({ chapter, charactersIn, isPlaying, onPlay, onRegenerate }) {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    if (!isPlaying) return;
    setProgress(0);
    const t = setInterval(() => setProgress(p => p >= 1 ? p : Math.min(1, p + 0.012)), 800);
    return () => clearInterval(t);
  }, [isPlaying]);
  const totalSec = parseDuration(chapter.duration);
  const elapsedSec = Math.floor(totalSec * progress);
  return (
    <div className={`grid grid-cols-[40px_60px_1fr_220px_100px_60px] items-center gap-4 px-5 py-4 transition-colors ${isPlaying ? "bg-peach/[0.06]" : "hover:bg-ink/[0.02]"}`}>
      <button onClick={onPlay} className={`w-9 h-9 rounded-full grid place-items-center transition-all ${isPlaying ? "bg-ink text-canvas" : "bg-canvas border border-ink/15 text-ink hover:bg-ink hover:text-canvas"}`}>
        {isPlaying ? <IconPause className="w-3.5 h-3.5"/> : <IconPlay className="w-3.5 h-3.5 ml-0.5"/>}
      </button>
      <span className="text-sm font-bold text-ink/50 tabular-nums">CH {String(chapter.id).padStart(2,"0")}</span>
      <span className="min-w-0">
        <span className="block font-semibold text-ink truncate">{chapter.title}</span>
        <span className="block text-xs text-ink/50 truncate mt-0.5">With {charactersIn.slice(0, 4).map(c => c.name).join(", ")}</span>
      </span>
      <Waveform progress={isPlaying ? progress : 0} active={isPlaying}/>
      <span className="text-sm tabular-nums text-ink/60 text-right">
        {isPlaying ? <span className="text-ink font-semibold">{formatTime(elapsedSec)} / {chapter.duration}</span> : chapter.duration}
      </span>
      <span className="flex items-center gap-1 justify-end">
        <button onClick={()=>onRegenerate?.(chapter)} title="Regenerate" className="text-ink/40 hover:text-magenta grid place-items-center w-8 h-8 rounded-full hover:bg-ink/[0.04]"><IconRefresh className="w-4 h-4"/></button>
        <button title="Download" className="text-ink/40 hover:text-ink grid place-items-center w-8 h-8 rounded-full hover:bg-ink/[0.04]"><IconDownload className="w-4 h-4"/></button>
      </span>
    </div>
  );
}

function Waveform({ progress, active }) {
  const bars = useMemo(() => {
    let s = 42; const out = [];
    for (let i = 0; i < 48; i++) { s = (s * 9301 + 49297) % 233280; out.push(0.25 + (s/233280) * 0.75); }
    return out;
  }, []);
  return (
    <div className="flex items-end gap-[2px] h-7">
      {bars.map((h, i) => {
        const filled = (i / bars.length) <= progress;
        return <span key={i} className={`w-[3px] rounded-sm transition-colors ${active && filled ? "bg-magenta" : active ? "bg-ink/15" : "bg-ink/20"}`} style={{ height: `${h*100}%` }}/>;
      })}
    </div>
  );
}

    all: items.length,
    done: items.filter(it => it.status === "done").length,
    in_progress: items.filter(it => it.status === "in_progress").length,

function MiniPlayer({ chapter, onClose, onPrev, onNext, prevAvailable, nextAvailable }) {
  const [progress, setProgress] = useState(0);
  const [playing, setPlaying]   = useState(true);
  useEffect(() => { setProgress(0); }, [chapter?.id]);
  useEffect(() => {
    if (!playing) return;
    const t = setInterval(() => setProgress(p => p >= 1 ? 1 : Math.min(1, p + 0.006)), 700);
    return () => clearInterval(t);
  }, [playing]);
  if (!chapter) return null;
  const totalSec = parseDuration(chapter.duration);
  const currentSec = Math.floor(totalSec * progress);
  return (
    <div className="fixed bottom-0 left-0 right-0 z-50 fade-in">
      <div className="bg-ink text-canvas border-t border-canvas/10 backdrop-blur-md">

function AppHandoffModal({ app, onClose, onComplete }) {
  const [step, setStep] = useState(0);
  if (!app) return null;
  const steps = WALKTHROUGH_STEPS[app.id] || [];
  if (steps.length === 0) return null;
  const current = steps[step];
  const isLast = step === steps.length - 1;
  const next = () => isLast ? (onComplete?.(app), onClose()) : setStep(step + 1);
  const prev = () => step > 0 && setStep(step - 1);
  return (
    <>
      <div onClick={onClose} className="fixed inset-0 bg-ink/40 z-50 fade-in"/>
      <div className="fixed inset-0 z-50 grid place-items-center p-6 pointer-events-none">
        <div className="bg-white rounded-3xl shadow-float w-full max-w-2xl pointer-events-auto fade-in overflow-hidden">
          {/* Header — app brand bar */}
          <div className="px-6 py-4 flex items-center gap-3 border-b border-ink/10" style={{ background: `linear-gradient(135deg, ${app.gradient[0]}, ${app.gradient[1]})` }}>
            <span className="w-10 h-10 rounded-xl bg-white/15 backdrop-blur-sm grid place-items-center text-white font-bold text-sm">{app.glyph}</span>
            <div className="flex-1 min-w-0">
              <p className="text-[10px] uppercase tracking-widest text-white/70 font-semibold">First listen on</p>
              <h3 className="text-lg font-bold text-white leading-tight truncate">{app.name}</h3>
            </div>
            <button onClick={onClose} className="p-2 rounded-full hover:bg-white/15 text-white/80"><IconClose className="w-4 h-4"/></button>
          </div>

          {/* Progress dots */}
          <div className="px-6 pt-5 flex items-center gap-2">
            {steps.map((s, i) => (
              <div key={i} className="flex-1 h-1 rounded-full bg-ink/[0.06] overflow-hidden">
                <div className={`h-full rounded-full transition-all ${i < step ? "bg-ink" : i === step ? "bg-gradient-progress" : "bg-transparent"}`} style={{ width: i <= step ? "100%" : "0%" }}/>
              </div>
            ))}
            <span className="text-[11px] tabular-nums text-ink/50 font-semibold ml-2">{step + 1}/{steps.length}</span>
          </div>

          {/* Step body */}
          <div className="p-6 fade-in" key={current.id}>
            <HandoffIllustration kind={current.illustration} app={app}/>
            <h4 className="mt-6 text-2xl font-bold text-ink leading-tight">{current.title}</h4>
            <p className="mt-2 text-ink/70 leading-relaxed">{current.description}</p>
            {current.detail && (
              <p className="mt-3 inline-block px-3 py-1 rounded-full bg-canvas border border-ink/10 text-xs text-ink/60 font-mono">{current.detail}</p>
            )}
            {current.input && (
              <div className="mt-4">
                <input type={current.input.type} defaultValue={current.input.value} placeholder={current.input.placeholder}
                  className="w-full px-4 py-3 rounded-xl bg-canvas border border-ink/10 text-sm font-mono text-ink focus:outline-none focus:border-peach"/>
              </div>
            )}
          </div>

          {/* Footer */}
          <div className="px-6 py-4 border-t border-ink/10 flex items-center justify-between gap-3">
            <button onClick={prev} disabled={step === 0} className="inline-flex items-center gap-1.5 text-sm font-medium text-ink/60 hover:text-ink disabled:opacity-30 disabled:cursor-not-allowed">
              <IconArrowLeft className="w-4 h-4"/> Back
            </button>
            <PrimaryButton variant="dark" onClick={next}>
              {isLast ? "Open in " + app.name : "Continue"}
            </PrimaryButton>
          </div>
        </div>
      </div>
    </>
  );
}

/* =====================================================================
   CHARACTER REGENERATE MODAL — regen one character's lines across chapters
   ===================================================================== */

function CharacterRegenerateModal({ character, chapters, defaultChapterId, onClose, onConfirm }) {
  /* scope: "this" | "selected" | "all" — controls which chapters are affected */
  const [scope, setScope] = useState(defaultChapterId ? "this" : "all");
  const [reason, setReason] = useState("voice");
  const [note, setNote] = useState("");

  if (!character) return null;
  const c = CHAR_COLORS[character.color];

  /* Chapters where this character has spoken lines (i.e. not "skipped") */
  const speakingChapters = chapters.filter(ch => ch.characters[character.id] && ch.characters[character.id] !== "skipped");

  /* Per-chapter selection state — defaults: all selected when scope=all,
     just defaultChapterId when scope=this */
  const [selected, setSelected] = useState(() => {
    const s = {};
    speakingChapters.forEach(ch => { s[ch.id] = true; });
    return s;
  });

  const targetChapterIds = (() => {
    if (scope === "this") return defaultChapterId ? [defaultChapterId] : [];
    if (scope === "selected") return Object.entries(selected).filter(([, v]) => v).map(([k]) => Number(k));
    return speakingChapters.map(ch => ch.id);
  })();

  /* Demo line counts per chapter for this character */
  const lineCount = (chId) => Math.round((character.lines / speakingChapters.length) * (0.7 + Math.random() * 0.6));
  const [lineCounts] = useState(() => {
    const m = {};
    let remaining = character.lines;
    speakingChapters.forEach((ch, i, arr) => {
      m[ch.id] = i === arr.length - 1 ? remaining : Math.round(character.lines / arr.length);
      remaining -= m[ch.id];
    });
    return m;
  });

  const totalLines = targetChapterIds.reduce((s, id) => s + (lineCounts[id] || 0), 0);
  const eta = totalLines > 0 ? `≈${Math.max(1, Math.round(totalLines / 60))} min` : "—";

  return (
    <>
      <div onClick={onClose} className="fixed inset-0 bg-ink/40 z-50 fade-in"/>
      <div className="fixed inset-0 z-50 grid place-items-center p-6 pointer-events-none">
        <div className="bg-white rounded-3xl shadow-float w-full max-w-xl pointer-events-auto fade-in overflow-hidden max-h-[90vh] flex flex-col">
          {/* Header */}
          <div className="px-6 py-4 border-b border-ink/10 flex items-center gap-3">
            <Avatar name={character.name} color={character.color} size={40}/>
            <div className="flex-1 min-w-0">
              <p className="text-[10px] uppercase tracking-widest text-ink/50 font-semibold">Regenerate character</p>
              <h3 className="text-base font-bold text-ink truncate">{character.name}'s lines</h3>
            </div>
            <button onClick={onClose} className="p-2 rounded-full hover:bg-ink/5 text-ink/60"><IconClose className="w-4 h-4"/></button>
          </div>

          {/* Body */}
          <div className="p-6 space-y-6 overflow-y-auto">

            {/* Scope */}
            <section>
              <p className="text-[11px] uppercase tracking-wider text-ink/50 font-semibold mb-3">Which chapters?</p>
              <div className="grid grid-cols-3 gap-2">
                {defaultChapterId && (
                  <button onClick={()=>setScope("this")} className={`text-left p-3 rounded-2xl border transition-all ${scope === "this" ? "border-peach bg-peach/[0.06]" : "border-ink/10 hover:border-ink/20"}`}>
                    <p className="text-sm font-semibold text-ink">Just CH {String(defaultChapterId).padStart(2,"0")}</p>
                    <p className="text-xs text-ink/55 mt-0.5">{lineCounts[defaultChapterId] || 0} lines</p>
                  </button>
                )}
                <button onClick={()=>setScope("selected")} className={`text-left p-3 rounded-2xl border transition-all ${scope === "selected" ? "border-peach bg-peach/[0.06]" : "border-ink/10 hover:border-ink/20"}`}>
                  <p className="text-sm font-semibold text-ink">Pick chapters</p>
                  <p className="text-xs text-ink/55 mt-0.5">{Object.values(selected).filter(Boolean).length} selected</p>
                </button>
                <button onClick={()=>setScope("all")} className={`text-left p-3 rounded-2xl border transition-all ${scope === "all" ? "border-peach bg-peach/[0.06]" : "border-ink/10 hover:border-ink/20"}`}>
                  <p className="text-sm font-semibold text-ink">All ({speakingChapters.length})</p>
                  <p className="text-xs text-ink/55 mt-0.5">{character.lines} lines</p>
                </button>
              </div>

              {scope === "selected" && (
                <div className="mt-3 p-3 rounded-2xl bg-canvas border border-ink/10 max-h-64 overflow-y-auto">
                  {speakingChapters.map(ch => {
                    const isOn = !!selected[ch.id];
                    return (
                      <button key={ch.id} onClick={()=>setSelected({ ...selected, [ch.id]: !isOn })}
                        className="w-full grid grid-cols-[20px_60px_1fr_60px] items-center gap-3 px-2 py-2 rounded-lg hover:bg-white text-left">

            <section>
              <p className="text-[11px] uppercase tracking-wider text-ink/50 font-semibold mb-3">What changed?</p>
              <div className="space-y-2">
                {REGEN_REASONS.map(r => (

                        <input value={note} onChange={(e)=>setNote(e.target.value)} placeholder="What changed?" className="mt-2 w-full px-3 py-2 rounded-xl bg-white border border-ink/10 text-sm focus:outline-none focus:border-peach"/>

                </div>
                <span className="text-right">
                  <p className="text-[10px] uppercase tracking-wider text-ink/50 font-semibold">ETA</p>
                  <p className="text-sm font-bold text-ink tabular-nums">{eta}</p>
                </span>
              </div>
              <p className="mt-3 text-xs text-ink/60 leading-relaxed">Other characters in these chapters keep their existing audio. Only {character.name}'s lines are re-voiced.</p>

function parseRuntime(s) {
  /* "11h 24m" → minutes */
  const m = s.match(/(?:(\d+)h)?\s*(?:(\d+)m)?/);
  if (!m) return 0;
  return (parseInt(m[1]||"0") * 60) + parseInt(m[2]||"0");
}
function formatHours(totalMin) {
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

}

function ChangeLogView({ events }) {
  const [filter, setFilter] = useState("all");
  const filterMap = {
    voice:      ["voice_tune","voice_reuse","voice_lock","library_add"],
    generation: ["regenerate","chapter_complete","generation_started"],
    manuscript: ["boundary_move","import"],
    cast:       ["cast_confirm","analysis_complete"],
  };
  const visible = filter === "all" ? events : events.filter(e => filterMap[filter]?.includes(e.type));
  const groups = visible.reduce((acc, e) => {
    if (!acc[e.date]) acc[e.date] = [];
    acc[e.date].push(e);
    return acc;
  }, {});
  const dateLabel = { today: "Today", yesterday: "Yesterday", earlier: "Earlier" };

  return (
    <div className="max-w-[1100px] mx-auto px-6 py-10">

          </div>
          <p className="mt-3 text-ink/60 max-w-xl">Every regeneration, voice change, and boundary move — recorded so you can audit what changed and roll back if something doesn't sound right.</p>

        <button className="px-4 py-2.5 rounded-full border border-ink/10 bg-white text-sm font-medium text-ink/70 hover:text-ink inline-flex items-center gap-2"><IconHistory className="w-4 h-4"/>Export log</button>

        {[
          { id: "all",        label: `All (${events.length})` },
          { id: "voice",      label: "Voice" },
          { id: "generation", label: "Generation" },
          { id: "manuscript", label: "Manuscript" },
          { id: "cast",       label: "Cast" },
        ].map(f => (
          <button key={f.id} onClick={()=>setFilter(f.id)} className={`px-4 py-2 rounded-full text-sm font-medium transition-colors ${filter === f.id ? "bg-ink text-canvas" : "text-ink/60 hover:text-ink hover:bg-ink/[0.04]"}`}>{f.label}</button>
        ))}

      {/* Timeline grouped by day */}

        {Object.entries(groups).map(([date, items]) => (
          <div key={date}>
            <div className="flex items-center gap-3 mb-4">
              <h2 className="text-sm font-bold text-ink uppercase tracking-wider">{dateLabel[date] || date}</h2>
              <span className="flex-1 h-px bg-ink/10"/>
              <span className="text-xs text-ink/50 tabular-nums">{items.length} events</span>

            <div className="bg-white rounded-3xl border border-ink/10 shadow-card divide-y divide-ink/5 overflow-hidden">
              {items.map(e => <ChangeLogEntry key={e.id} event={e}/>)}

          </div>
        ))}
        {visible.length === 0 && (
          <p className="text-center text-sm text-ink/50 py-12">No events match this filter.</p>
        )}
      </div>
    </div>
  );
}

function RevisionDiffPlayer({ revision, chapter, character, onClose, onAccept, onReject }) {
  const [selected, setSelected] = useState(() => {
    /* default: choose B (new) for every changed segment, A for unchanged */
    const m = {};
    revision.segments.forEach(s => { m[s.id] = s.changed ? "B" : "A"; });
    return m;
  });
  const [playing, setPlaying]   = useState(null); // { segId, version: "A"|"B" }
  const [autoCompare, setAutoCompare] = useState(false);

  if (!revision) return null;

  const c = CHAR_COLORS[character?.color || "narrator"];
  const totalChanged = revision.segments.filter(s => s.changed).length;
  const acceptedNew = revision.segments.filter(s => s.changed && selected[s.id] === "B").length;

  const acceptAllNew = () => setSelected(Object.fromEntries(revision.segments.map(s => [s.id, s.changed ? "B" : "A"])));
  const rejectAll    = () => setSelected(Object.fromEntries(revision.segments.map(s => [s.id, "A"])));

  return (
    <div className="fixed inset-0 z-50 bg-canvas overflow-y-auto fade-in">
      {/* Header */}
      <header className="sticky top-0 z-10 bg-canvas/90 backdrop-blur-md border-b border-ink/10">
        <div className="max-w-[1400px] mx-auto px-6 h-16 flex items-center gap-4">
          <button onClick={onClose} className="p-2 rounded-full hover:bg-ink/5 text-ink/60"><IconArrowLeft className="w-4 h-4"/></button>
          <span className="w-8 h-8 rounded-full bg-peach/20 grid place-items-center text-magenta"><IconAB className="w-4 h-4"/></span>
          <div className="flex-1 min-w-0">
            <p className="text-[11px] uppercase tracking-wider text-ink/50 font-semibold">Revision review · A/B</p>
            <h1 className="text-base font-bold text-ink leading-tight truncate">CH {String(chapter.id).padStart(2,"0")} · {chapter.title}{character ? ` · ${character.name}` : ""}</h1>
          </div>
          <span className="text-xs text-ink/55 hidden md:inline-flex items-center gap-1.5"><IconClock className="w-3.5 h-3.5"/>Triggered {revision.triggeredAgo}</span>
          <button onClick={onClose} className="p-2 rounded-full hover:bg-ink/5 text-ink/60"><IconClose className="w-4 h-4"/></button>
        </div>
      </header>

      <div className="max-w-[1400px] mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-[1fr_360px] gap-8">
        <main>

          {/* Top — A/B summary cards */}
          <section className="grid grid-cols-2 gap-4 mb-6">
            <ABCard label="A · Current" sub="Already in your audiobook" duration={revision.oldDuration} variant="current"/>
            <ABCard label="B · New draft" sub={revision.triggeredBy} duration={revision.newDuration} variant="new" character={character}/>
          </section>

          {/* Auto-compare toggle */}
          <section className="mb-6 flex items-center justify-between gap-3 p-4 rounded-2xl bg-white border border-ink/10">
            <div className="flex items-center gap-3">
              <span className="w-9 h-9 rounded-full bg-ink text-canvas grid place-items-center"><IconAB className="w-4 h-4"/></span>
              <div>
                <p className="text-sm font-bold text-ink">Auto-compare</p>
                <p className="text-xs text-ink/55">Plays each changed segment A then B in sequence.</p>
              </div>
            </div>
            <button onClick={()=>setAutoCompare(!autoCompare)} className={`px-4 py-2 rounded-full text-sm font-semibold transition-colors ${autoCompare ? "bg-peach text-ink" : "bg-ink/[0.04] text-ink hover:bg-ink/[0.08]"}`}>
              {autoCompare ? <><IconPause className="w-3.5 h-3.5 inline mr-1"/> Stop</> : <><IconPlay className="w-3.5 h-3.5 inline mr-1"/> Listen back-to-back</>}
            </button>
          </section>

          {/* Per-segment diff */}
          <section>
            <div className="flex items-center justify-between mb-3">
              <SectionLabel>Per-segment review</SectionLabel>
              <span className="text-xs text-ink/50">{totalChanged} segments changed · {acceptedNew} taking B</span>
            </div>
            <div className="space-y-2">
              {revision.segments.map(seg => (
                <SegmentDiffRow
                  key={seg.id}
                  seg={seg}
                  charColor={c}
                  selectedVersion={selected[seg.id]}
                  onSelect={(v) => setSelected({ ...selected, [seg.id]: v })}
                  playing={playing}
                  onPlay={(version) => setPlaying({ segId: seg.id, version })}
                />
              ))}
            </div>
          </section>
        </main>

        <aside className="self-start sticky top-24 space-y-4">

          {/* Confidence + summary */}
          <div className="bg-white rounded-3xl border border-ink/10 p-5 shadow-card">

            <p className="text-4xl font-bold text-ink tabular-nums leading-none">{Math.round(revision.confidence*100)}<span className="text-xl text-ink/50">%</span></p>

              <IconChecks className="w-4 h-4"/> Accept all changes

              <IconReject className="w-4 h-4"/> Reject all changes
            </button>
          </div>
        </aside>
      </div>

      {/* Bottom action bar */}
      <footer className="sticky bottom-0 bg-white border-t border-ink/10">
        <div className="max-w-[1400px] mx-auto px-6 py-4 flex items-center gap-3">
          <span className="text-sm">
            <span className="font-bold text-ink tabular-nums">{acceptedNew}</span> <span className="text-ink/60">of <span className="tabular-nums">{totalChanged}</span> changed segments taking the new take</span>
          </span>
          <span className="ml-auto flex items-center gap-3">
            <button onClick={onReject} className="px-4 py-2.5 text-sm font-medium text-ink/70 hover:text-ink">Reject draft</button>
            <PrimaryButton variant="dark" onClick={()=>onAccept(selected)}>Commit selection</PrimaryButton>
          </span>
        </div>
      </footer>
    </div>
  );
}

function SegmentDiffRow({ seg, charColor, selectedVersion, onSelect, playing, onPlay }) {
  const isPlayingA = playing?.segId === seg.id && playing?.version === "A";
  const isPlayingB = playing?.segId === seg.id && playing?.version === "B";
  const isSelectedB = selectedVersion === "B";
  return (
    <div className={`p-4 rounded-2xl border transition-all ${seg.changed ? (isSelectedB ? "border-peach bg-peach/[0.04]" : "border-ink/10 bg-white") : "border-ink/5 bg-canvas/60"}`}>
      <div className="flex items-start gap-3">
        <span className="mt-1.5 w-1 h-6 rounded-full shrink-0" style={{ background: seg.narratorOnly ? CHAR_COLORS.narrator.hex : charColor.hex }}/>

          <p className="font-serif text-[15px] text-ink/90 leading-relaxed mb-3">{seg.text}</p>

            <Pill>Narrator-only · unchanged</Pill>
