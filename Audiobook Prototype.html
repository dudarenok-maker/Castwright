            <div className="grid grid-cols-2 gap-2">
              {/* A version */}
              <button onClick={()=>{ onSelect("A"); onPlay("A"); }}
                className={`group flex items-center gap-2 p-2 rounded-xl transition-all border text-left ${selectedVersion === "A" ? "border-ink bg-ink/[0.04]" : "border-ink/10 hover:border-ink/20"}`}>
                <span className={`w-7 h-7 rounded-full grid place-items-center transition-colors ${isPlayingA ? "bg-ink text-canvas" : "bg-white border border-ink/15 text-ink/60 group-hover:text-ink"}`}>
                  {isPlayingA ? <IconPause className="w-3 h-3"/> : <IconPlay className="w-3 h-3 ml-0.5"/>}
                </span>
                <span className="flex-1 min-w-0">
                  <span className="block text-[11px] uppercase tracking-wider font-bold text-ink/50">A · current</span>
                  <span className="block text-[11px] tabular-nums text-ink/60">{seg.oldDuration}</span>
                </span>
                {selectedVersion === "A" && <span className="w-3.5 h-3.5 rounded-full bg-ink text-canvas grid place-items-center"><IconCheck className="w-2 h-2"/></span>}
              </button>

              {/* B version */}
              <button onClick={()=>{ onSelect("B"); onPlay("B"); }}
                className={`group flex items-center gap-2 p-2 rounded-xl transition-all border text-left ${selectedVersion === "B" ? "border-peach bg-peach/[0.10]" : "border-ink/10 hover:border-ink/20"}`}>
                <span className={`w-7 h-7 rounded-full grid place-items-center transition-colors ${isPlayingB ? "bg-magenta text-white" : "bg-white border border-ink/15 text-ink/60 group-hover:text-magenta"}`}>
                  {isPlayingB ? <IconPause className="w-3 h-3"/> : <IconPlay className="w-3 h-3 ml-0.5"/>}
                </span>
                <span className="flex-1 min-w-0">
                  <span className="block text-[11px] uppercase tracking-wider font-bold text-magenta">B · new</span>
                  <span className="block text-[11px] tabular-nums text-ink/60">{seg.newDuration}{seg.newDuration !== seg.oldDuration ? ` (${seg.newDuration > seg.oldDuration ? "+" : ""}${parseFloat(seg.newDuration) - parseFloat(seg.oldDuration)}s)` : ""}</span>
                </span>
                {selectedVersion === "B" && <span className="w-3.5 h-3.5 rounded-full bg-peach text-ink grid place-items-center"><IconCheck className="w-2 h-2"/></span>}
              </button>
            </div>
          ) : (
            <Pill>Unchanged</Pill>
          )}
        </div>
      </div>
    </div>
  );

              <div className="space-y-2">
                {REGEN_REASONS.map(r => (
                  <button key={r.id} onClick={()=>setReason(r.id)} className={`w-full text-left p-3 rounded-2xl border transition-all flex items-start gap-3 ${reason === r.id ? "border-peach bg-peach/[0.06]" : "border-ink/10 hover:border-ink/20"}`}>
                    <span className={`w-4 h-4 rounded-full border-2 grid place-items-center mt-0.5 shrink-0 ${reason === r.id ? "border-peach" : "border-ink/20"}`}>
                      {reason === r.id && <span className="w-1.5 h-1.5 rounded-full bg-peach"/>}
                    </span>
                    <span className="min-w-0">
                      <span className="block text-sm font-semibold text-ink">{r.label}</span>
                      <span className="block text-xs text-ink/60 mt-0.5 leading-relaxed">{r.description}</span>
                      {r.custom && reason === r.id && (
                        <input value={note} onChange={(e)=>setNote(e.target.value)} placeholder="What changed?" className="mt-2 w-full px-3 py-2 rounded-xl bg-white border border-ink/10 text-sm focus:outline-none focus:border-peach"/>
                      )}
                    </span>
                  </button>
                ))}
              </div>
            </section>

            {/* Summary */}
            <div className="p-4 rounded-2xl bg-canvas border border-ink/10 flex items-center gap-3">
              <span className="w-9 h-9 rounded-full bg-white border border-ink/10 grid place-items-center text-ink/70"><IconClock className="w-4 h-4"/></span>
              <div className="flex-1 min-w-0">
                <p className="text-xs uppercase tracking-wider text-ink/50 font-semibold">Will regenerate</p>
                <p className="text-sm font-bold text-ink"><span className="tabular-nums">{totalLines}</span> lines · <span className="tabular-nums">{chapterIds.length}</span> chapters · ETA <span className="tabular-nums">{eta}</span></p>
              </div>
            </div>
          </div>

          <div className="px-6 py-4 border-t border-ink/10 flex items-center justify-end gap-3">
            <button onClick={onClose} className="text-sm font-medium text-ink/60 hover:text-ink">Cancel</button>
            <PrimaryButton variant="dark" onClick={()=>onConfirm({ characterIds, chapterIds, reason, note })}>Regenerate {selectedChars.length} characters</PrimaryButton>
          </div>
        </div>
      </div>
    </>
  );
}

/* =====================================================================
   DRIFT REPORT MODAL — voice consistency findings
   ===================================================================== */

function DriftReportModal({ events, characters, onClose, onRegenerateChapter, onDismiss }) {
  const findChar = (id) => characters.find(c => c.id === id);
  const findChapter = (id) => initialChapters.find(c => c.id === id) || { id, title: `Chapter ${id}` };
  const grouped = events.reduce((acc, e) => { (acc[e.severity] ||= []).push(e); return acc; }, {});
  const severityOrder = ["severe", "moderate", "mild"];
  const severityLabel = { severe: "Severe", moderate: "Moderate", mild: "Mild" };
  const severityColor = { severe: "danger", moderate: "warning", mild: "neutral" };

  if (events.length === 0) return null;

  return (
    <>
      <div onClick={onClose} className="fixed inset-0 bg-ink/40 z-50 fade-in"/>
      <div className="fixed inset-0 z-50 grid place-items-center p-6 pointer-events-none">
        <div className="bg-white rounded-3xl shadow-float w-full max-w-2xl pointer-events-auto fade-in overflow-hidden max-h-[90vh] flex flex-col">

          <div className="px-6 py-4 border-b border-ink/10 flex items-center gap-3">
            <span className="w-10 h-10 rounded-full bg-amber-50 grid place-items-center text-amber-700"><IconAlertTri className="w-5 h-5"/></span>
            <div className="flex-1 min-w-0">
              <p className="text-[10px] uppercase tracking-widest text-ink/50 font-semibold">Voice drift detector</p>
              <h3 className="text-base font-bold text-ink leading-tight">{events.length} chapter{events.length === 1 ? "" : "s"} flagged</h3>
            </div>
            <button onClick={onClose} className="p-2 rounded-full hover:bg-ink/5 text-ink/60"><IconClose className="w-4 h-4"/></button>
          </div>

          <div className="p-6 space-y-6 overflow-y-auto">

            <p className="text-sm text-ink/70 leading-relaxed">
              We compared each chapter against the character's established voice profile. Severe and moderate findings are worth a listen — mild ones are usually within tolerance.
            </p>

            {severityOrder.map(sev => {
              const items = grouped[sev];
              if (!items || items.length === 0) return null;
              return (
                <section key={sev}>
                  <div className="flex items-center gap-3 mb-3">
                    <Pill color={severityColor[sev]}>{severityLabel[sev]}</Pill>
                    <span className="flex-1 h-px bg-ink/10"/>
                    <span className="text-xs text-ink/50 tabular-nums">{items.length}</span>
                  </div>
                  <div className="space-y-2">
                    {items.map(e => {
                      const char = findChar(e.characterId);
                      const chap = findChapter(e.chapterId);
                      return (
                        <article key={e.id} className="p-4 rounded-2xl border border-ink/10 bg-white">
                          <div className="flex items-start gap-3">
                            {char && <Avatar name={char.name} color={char.color} size={36}/>}
                            <div className="flex-1 min-w-0">
                              <div className="flex items-center gap-2 flex-wrap mb-1">
                                <h4 className="text-sm font-bold text-ink">{char?.name || e.characterId}</h4>
                                <span className="text-xs text-ink/50">in</span>
                                <span className="text-xs font-semibold text-ink">CH {String(e.chapterId).padStart(2,"0")} · {chap.title}</span>
                              </div>
                              <p className="text-[11px] uppercase tracking-wider font-bold mb-2" style={{ color: CHAR_COLORS[char?.color || "narrator"].hex }}>{e.factorLabel}</p>
                              <p className="text-xs text-ink/70 leading-relaxed mb-3">{e.description}</p>
                              {e.metrics && (
                                <div className="flex items-center gap-3 mb-3 text-xs">
                                  <span className="inline-flex items-center gap-1.5 px-2 py-1 rounded-md bg-canvas border border-ink/10">
                                    <span className="text-ink/50">Now:</span><span className="font-bold text-ink tabular-nums">{e.metrics.current}</span>
                                  </span>
                                  <span className="inline-flex items-center gap-1.5 px-2 py-1 rounded-md bg-canvas border border-ink/10">
                                    <span className="text-ink/50">Profile:</span><span className="font-bold text-ink tabular-nums">{e.metrics.expected}</span>
                                  </span>
                                  <span className="text-ink/45">{e.metrics.unit}</span>
                                </div>
                              )}
                              <div className="flex items-center gap-2">
                                <button onClick={()=>onRegenerateChapter(e.characterId, e.chapterId)} className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-ink text-canvas text-xs font-semibold hover:bg-ink-soft">
                                  <IconRefresh className="w-3.5 h-3.5"/> Regenerate this chapter
                                </button>
                                <button className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-canvas border border-ink/10 text-ink/70 hover:text-ink text-xs font-medium">
                                  <IconWaveform className="w-3.5 h-3.5"/> Listen
                                </button>
                                <button onClick={()=>onDismiss(e.id)} className="ml-auto text-xs font-medium text-ink/50 hover:text-ink/80">Dismiss</button>
                              </div>
                            </div>
                          </div>
                        </article>
                      );
                    })}
                  </div>
                </section>
              );
            })}

          </div>

          <div className="px-6 py-3 border-t border-ink/10 flex items-center justify-between text-xs text-ink/50">
            <span>Drift detection runs after every regeneration.</span>
            <span>Last check: 30 min ago</span>
          </div>
        </div>
      </div>
    </>
  );
}

/* =====================================================================
   APP
   ===================================================================== */

function App() {
  const [stage, setStage] = useState("books");
  const [view, setView]   = useState("cast");
  const [activeBookId, setActiveBookId] = useState(null);
  const [characters, setCharacters] = useState(initialCharacters);
  const [chapters, setChapters]     = useState(initialChapters);
  const [openProfileId, setOpenProfileId] = useState(null);
  const [paused, setPaused] = useState(false);
  const [currentChapterId, setCurrentChapterId] = useState(3);
  const [currentTrack, setCurrentTrack] = useState(null);
  const [matchDetailFor, setMatchDetailFor] = useState(null);
  const matchCharacter = matchDetailFor ? characters.find(c => c.id === matchDetailFor) : null;
  const matchVoice = matchCharacter ? VOICE_LIBRARY.find(v => v.id === matchCharacter.voiceId) : null;
  const [handoffApp, setHandoffApp] = useState(null);
  const [regenChapter, setRegenChapter] = useState(null);
  const [previewMode, setPreviewMode] = useState(false);
  const [regenCharacterCtx, setRegenCharacterCtx] = useState(null); // { characterId, defaultChapterId? }
  const regenCharacter = regenCharacterCtx ? characters.find(c => c.id === regenCharacterCtx.characterId) : null;
  const [batchRegenIds, setBatchRegenIds] = useState(null); // array of character ids when batch regen modal is open
  const [showRevisionPlayer, setShowRevisionPlayer] = useState(false);
  const [showDriftReport, setShowDriftReport] = useState(false);
  const [driftEvents, setDriftEvents] = useState(VOICE_DRIFT_EVENTS);
  const [pendingRevisions, setPendingRevisions] = useState(PENDING_REVISIONS);

  const startBatchRegenerate = ({ characterIds, chapterIds }) => {
    setChapters(prev => prev.map(ch => {
      if (!chapterIds.includes(ch.id)) return ch;
      let newChars = { ...ch.characters };
      characterIds.forEach(cid => {
        if (newChars[cid] && newChars[cid] !== "skipped") newChars[cid] = "queued";
      });
      const newState = ch.state === "done" ? "in_progress" : ch.state;
      const newProgress = ch.state === "done" ? 0.78 : ch.progress;
      return { ...ch, characters: newChars, state: newState, progress: newProgress };
    }));
    setBatchRegenIds(null);
    setView("generate");
  };

  const startRegenerateCharacter = ({ characterId, chapterIds, reason, note }) => {
    setChapters(prev => prev.map(ch => {
      if (!chapterIds.includes(ch.id)) return ch;
      const cur = ch.characters[characterId];
      if (cur === "skipped" || !cur) return ch;
      const newChars = { ...ch.characters, [characterId]: "queued" };
      // Mark chapter as in-progress if it was done, so the live tick picks it up
      const newState = ch.state === "done" ? "in_progress" : ch.state;
      const newProgress = ch.state === "done" ? 0.85 : ch.progress; // mostly done — only one character to redo
      return { ...ch, characters: newChars, state: newState, progress: newProgress };
    }));
    setRegenCharacterCtx(null);
    setView("generate");
  };

  const startRegenerate = ({ reason, scope, note }) => {
    if (!regenChapter) return;
    setChapters(prev => prev.map(c => {
      if (c.id === regenChapter.id || (scope === "forward" && c.id > regenChapter.id)) {
        return { ...c, state: c.id === regenChapter.id ? "in_progress" : "queued", progress: c.id === regenChapter.id ? 0.05 : 0, characters: Object.fromEntries(Object.entries(c.characters).map(([k,v]) => [k, v === "done" ? "queued" : v])) };
      }
      return c;
    }));
    setRegenChapter(null);
    setView("generate");
  };
  const activeBook = BOOKS.find(b => b.id === activeBookId);
  const projectTitle = (stage === "upload" || stage === "books") ? null : (activeBook?.title || "The Northern Star");
  const trackChapter = currentTrack != null ? chapters.find(c => c.id === currentTrack) : null;
  const trackIdx = trackChapter ? chapters.indexOf(trackChapter) : -1;
  const prevTrackAvailable = trackIdx > 0;
  const nextTrackAvailable = trackIdx >= 0 && trackIdx < chapters.length - 1;
  if (previewMode) {
    return <PreviewListenerView chapters={chapters} characters={characters} onExit={()=>setPreviewMode(false)} currentTrack={currentTrack} setCurrentTrack={setCurrentTrack}/>;
  }
  return (
    <div className={`min-h-screen ${trackChapter ? "pb-24" : "pb-20"}`}>
      <TopBar stage={stage} view={view} setView={setView} projectTitle={projectTitle} onHome={()=>{ setStage("books"); setActiveBookId(null); }} pendingRevisionsCount={pendingRevisions.length} onOpenRevisions={()=>setShowRevisionPlayer(true)}/>
      {stage === "books"     && <BookLibraryView books={BOOKS} activeBookId={activeBookId} onOpenBook={(b)=>{ setActiveBookId(b.id); if (b.status === "analysing") setStage("analysing"); else if (b.status === "cast_pending") setStage("confirm"); else { setStage("ready"); setView(b.status === "complete" ? "listen" : b.status === "generating" ? "generate" : "cast"); } }} onStartNew={()=>setStage("upload")}/>}
      {stage === "upload"    && <UploadView    onUpload={()=>setStage("analysing")}/>}
      {stage === "analysing" && <AnalysingView onComplete={()=>{ setActiveBookId(activeBookId || "ns"); setStage("confirm"); }}/>}
      {stage === "confirm"   && (
        <ConfirmCastView characters={characters} library={VOICE_LIBRARY}
          onConfirm={()=>{ setStage("ready"); setView("generate"); }}
          onReanalyse={()=>setStage("analysing")}/>
      )}
      {stage === "ready" && (
        <>
          {view === "manuscript" && <ManuscriptView characters={characters} chapters={chapters} currentChapterId={currentChapterId} setCurrentChapterId={setCurrentChapterId}/>}
          {view === "cast"       && <CastView characters={characters} setCharacters={setCharacters} library={VOICE_LIBRARY} onOpenProfile={setOpenProfileId} openProfileId={openProfileId} onShowMatchDetail={setMatchDetailFor} onRegenerateCharacter={(charId)=>setRegenCharacterCtx({ characterId: charId })} onBatchRegenerate={(ids)=>setBatchRegenIds(ids)} driftEvents={driftEvents} onShowDrift={()=>setShowDriftReport(true)}/>}
          {view === "library"    && <LibraryView library={VOICE_LIBRARY}/>}
          {view === "generate"   && <GenerationView chapters={chapters} setChapters={setChapters} characters={characters} paused={paused} setPaused={setPaused} onRegenerate={setRegenChapter} onRegenerateCharacterInChapter={(charId, chapterId)=>setRegenCharacterCtx({ characterId: charId, defaultChapterId: chapterId })}/>}
          {view === "listen"     && <ListenView chapters={chapters} characters={characters} library={VOICE_LIBRARY} currentTrack={currentTrack} setCurrentTrack={setCurrentTrack} onSendApp={setHandoffApp} onRegenerate={setRegenChapter} onEnterPreview={()=>setPreviewMode(true)}/>}
          {view === "log"        && <ChangeLogView events={CHANGE_LOG_EVENTS}/>}
        </>
      )}
      {stage === "ready" && (
        <MiniPlayer chapter={trackChapter}
          onClose={()=>setCurrentTrack(null)}
          onPrev={()=>prevTrackAvailable && setCurrentTrack(chapters[trackIdx - 1].id)}
          onNext={()=>nextTrackAvailable && setCurrentTrack(chapters[trackIdx + 1].id)}
          prevAvailable={prevTrackAvailable} nextAvailable={nextTrackAvailable}/>
      )}
      {matchDetailFor && (
        <MatchDetailDrawer
          character={matchCharacter}
          voice={matchVoice}
          onClose={()=>setMatchDetailFor(null)}
          onConfirm={()=>setMatchDetailFor(null)}
          onDecline={()=>{
            setCharacters(prev => prev.map(c => c.id === matchDetailFor ? { ...c, matchedFrom: undefined, voiceState: "generated" } : c));
            setMatchDetailFor(null);
          }}
        />
      )}
      {handoffApp && (
        <AppHandoffModal
          app={handoffApp}
          onClose={()=>setHandoffApp(null)}
          onComplete={(app)=>{ console.log("Handoff complete:", app.name); }}
        />
      )}
      {regenChapter && (
        <RegenerateModal
          chapter={regenChapter}
          onClose={()=>setRegenChapter(null)}
          onConfirm={startRegenerate}
        />
      )}
      {regenCharacterCtx && (
        <CharacterRegenerateModal
          character={regenCharacter}
          chapters={chapters}
          defaultChapterId={regenCharacterCtx.defaultChapterId}
          onClose={()=>setRegenCharacterCtx(null)}
          onConfirm={startRegenerateCharacter}
        />
      )}
      {batchRegenIds && (
        <BatchCharacterRegenerateModal
          characterIds={batchRegenIds}
          characters={characters}
          chapters={chapters}
          onClose={()=>setBatchRegenIds(null)}
          onConfirm={startBatchRegenerate}
        />
      )}
      {showDriftReport && (
        <DriftReportModal
          events={driftEvents}
          characters={characters}
          onClose={()=>setShowDriftReport(false)}
          onRegenerateChapter={(charId, chapterId) => {
            setShowDriftReport(false);
            setRegenCharacterCtx({ characterId: charId, defaultChapterId: chapterId });
          }}
          onDismiss={(eventId) => setDriftEvents(prev => prev.filter(e => e.id !== eventId))}
        />
      )}
      {showRevisionPlayer && pendingRevisions[0] && (
        <RevisionDiffPlayer
          revision={pendingRevisions[0]}
          chapter={chapters.find(c => c.id === pendingRevisions[0].chapterId)}
          character={characters.find(c => c.id === pendingRevisions[0].characterId)}
          onClose={()=>setShowRevisionPlayer(false)}
          onAccept={()=>{ setPendingRevisions([]); setShowRevisionPlayer(false); }}
          onReject={()=>{ setPendingRevisions([]); setShowRevisionPlayer(false); }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
tElementById("root")).render(<App/>);
</script>
