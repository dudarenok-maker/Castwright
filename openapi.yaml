# =====================================================================
# Audiobook generator — backend API contract
# ---------------------------------------------------------------------
# Generated from JSDoc shapes in app/lib/api.js. Mocked implementations
# in that file return the same structures so the front-end can be
# swapped onto a real backend by replacing the mock* functions with
# fetch() calls.
# =====================================================================
openapi: 3.0.3
info:
  title: Audiobook generator API
  version: 0.1.0
  description: |
    Pipeline endpoints for turning a manuscript into a cast-voiced
    audiobook. Six endpoints span the full flow: upload → analyse →
    voice-match → generate → playback → revisions/drift.

servers:
  - url: https://api.example.com
    description: Production (placeholder)
  - url: http://localhost:8080
    description: Local dev

# ---------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------
paths:
  /api/user/settings:
    get:
      summary: Read the user's account defaults + non-secret server overrides
      operationId: getUserSettings
      description: |
        Returns the merged user-settings document. The server reads
        `server/user-settings.json` (created on first GET with defaults) and
        layers in env-derived read-only fields: `apiKeyStatus`,
        `workspaceRoot`, `workspaceSource`. The Gemini API key itself is
        never echoed back — only the binary "is something set in .env" flag.
      responses:
        '200':
          description: Merged settings + env-derived status fields
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSettings' }
    put:
      summary: Update the user's account defaults + non-secret server overrides
      operationId: putUserSettings
      description: |
        Partial update. Only the writable fields from the request body are
        persisted; `apiKeyStatus`, `workspaceRoot`, `workspaceSource` are
        derived and silently ignored if submitted. Any field named
        `geminiApiKey` (or similar secret-shaped key) is also dropped — the
        API key never leaves `server/.env`. Changes to `sidecarUrl` take
        effect on the next request; `workspaceDirOverride` is persisted
        but requires a server restart to apply.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserSettingsPatch' }
      responses:
        '200':
          description: Updated settings (same shape as GET)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSettings' }
        '400':
          description: Malformed body (failed schema validation)

  /api/workspace/changelog:
    get:
      summary: Aggregated change log across every book in the workspace
      operationId: getWorkspaceChangelog
      description: |
        Fans out `.audiobook/change-log.json` from every book in the workspace,
        attaches `bookId`, `bookTitle`, and `author` to each event, and returns
        a page of events sorted newest-first. Books without an on-disk
        change-log are skipped. Backs the global Change Log view.

        Pagination is cursor-based: pass `before` (the previous page's
        `nextCursor`) to fetch the next page. `totalCount` and
        `categoryCounts` always reflect the FULL workspace set, not just
        this page — the workspace Activity pills can show honest totals while
        the user scrolls through pages.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200, minimum: 1 }
          description: Page size. Defaults to 50; capped at 200.
        - in: query
          name: before
          schema: { type: string, format: date-time }
          description: |
            ISO timestamp cursor. Only events strictly older than this land
            in the page. Omit on the first request; pass `nextCursor` from
            the previous response thereafter.
      responses:
        '200':
          description: One page of workspace-wide editorial activity
          content:
            application/json:
              schema:
                type: object
                required: [events, nextCursor, totalCount, categoryCounts]
                properties:
                  events:
                    type: array
                    items: { $ref: '#/components/schemas/WorkspaceChangeLogEvent' }
                  nextCursor:
                    type: string
                    nullable: true
                    description: |
                      ISO timestamp of the last event in this page when more
                      events follow it; `null` when this page is the tail.
                  totalCount:
                    type: integer
                    description: Total events across the workspace (all pages).
                  categoryCounts:
                    type: object
                    required: [voice, generation, manuscript, cast]
                    properties:
                      voice:      { type: integer }
                      generation: { type: integer }
                      manuscript: { type: integer }
                      cast:       { type: integer }

  /api/library:
    get:
      summary: List books in the on-disk workspace
      operationId: getLibrary
      description: |
        Walks the workspace `books/<Author>/<Series>/<Book>/` tree and returns
        the grouped library used by the frontend's book-library view. Status
        per book is derived from the presence of `.audiobook/state.json`,
        `cast.json`, and the audio output count.
      responses:
        '200':
          description: Library tree grouped by author and series
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LibraryResponse' }

  /api/import:
    post:
      summary: Parse a manuscript and stage it for confirmation
      operationId: importManuscript
      description: |
        Parse-only: returns the parsed text plus best-effort author/series/title
        metadata, and stashes the result in memory under a short tempId. Nothing
        is written to disk. The frontend then renders a confirm-metadata form;
        on submit, POST /api/books drains the staging entry into the workspace.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:     { type: string }
                fileName: { type: string }
      responses:
        '200':
          description: Parsed candidate ready for confirmation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportResponse' }
        '415':
          description: Unsupported manuscript format

  /api/books:
    post:
      summary: Confirm metadata and write a book into the workspace
      operationId: confirmBook
      description: |
        Drains the staged import identified by `tempId`, writes
        `manuscript.<ext>` and `.audiobook/state.json` into
        `books/<Author>/<Series>/<Title>/`, and returns the resulting bookId +
        manuscriptId. Returns 409 with a `suggestedTitle` if a book with the
        same slug already exists.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConfirmBookRequest' }
      responses:
        '201':
          description: Book saved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfirmBookResponse' }
        '400':
          description: Missing required fields
        '409':
          description: A book with this slug already exists on disk
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:          { type: string, example: 'slug_collision' }
                  suggestedTitle: { type: string }
        '410':
          description: Import tempId expired or already consumed

  /api/manuscripts:
    post:
      summary: Upload a manuscript
      operationId: uploadManuscript
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:        { type: string, format: binary }
                title:       { type: string, description: "Optional override title." }
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                title: { type: string }
                text:  { type: string, description: "Inline manuscript text (markdown or plain)." }
      responses:
        '200':
          description: Manuscript accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadResponse' }
        '415':
          description: Unsupported manuscript format (e.g. unparseable EPUB/DOCX)

  /api/manuscripts/{manuscriptId}/analysis:
    post:
      summary: Run cast + chapter analysis
      operationId: analyseManuscript
      description: |
        Streams phase progress over Server-Sent Events while the analysis
        runs. The final SSE event carries the full `AnalyseResponse`.
      parameters:
        - { in: path, name: manuscriptId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Final analysis payload (also delivered as the terminal SSE event)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnalyseResponse' }
            text/event-stream:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AnalysePhaseEvent'
                  - $ref: '#/components/schemas/AnalyseResponse'

  /api/manuscripts/{manuscriptId}/analysis/chapters:
    post:
      summary: Re-run analysis for a subset of chapters
      operationId: analyseChapterSubset
      description: |
        Runs Phase 0a (cast detection) + Phase 1 (sentence attribution)
        for the listed chapter ids only, merging into the existing roster
        and analysis cache without re-doing the whole book. Used when the
        user un-excludes a chapter that was excluded at confirm time.
      parameters:
        - { in: path, name: manuscriptId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chapterIds]
              properties:
                chapterIds:
                  type: array
                  items: { type: integer }
                  description: "Chapter ids to re-run analysis for. Must reference chapters already in the manuscript record."
                model: { type: string, description: "Optional model id override (matches the full-book endpoint)." }
      responses:
        '200':
          description: SSE stream identical in shape to the full-book analysis route.
          content:
            text/event-stream:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AnalysePhaseEvent'
                  - $ref: '#/components/schemas/AnalyseResponse'

  /api/books/{bookId}/chapters/{chapterId}/exclude:
    post:
      summary: Toggle the excluded flag on a single chapter
      operationId: setChapterExcluded
      description: |
        Updates state.json atomically and propagates the flag into the
        in-memory ManuscriptRecord so subsequent analysis/generation
        passes honour it. When `excluded` becomes true, any existing
        audio output for the chapter is deleted; when it becomes false
        the chapter is eligible for analysis-subset + audio generation
        again.
      parameters:
        - { in: path, name: bookId,    required: true, schema: { type: string } }
        - { in: path, name: chapterId, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [excluded]
              properties:
                excluded: { type: boolean }
      responses:
        '200':
          description: Updated chapter entry from state.json
          content:
            application/json:
              schema:
                type: object
                required: [id, title, slug, excluded]
                properties:
                  id:       { type: integer }
                  title:    { type: string }
                  slug:     { type: string }
                  excluded: { type: boolean }
        '404':
          description: Book or chapter not found

  /api/books/{bookId}/cover/candidates:
    get:
      summary: List OpenLibrary cover candidates for a book
      operationId: getCoverCandidates
      description: |
        Searches OpenLibrary (`/search.json?title=…&author=…`) and returns
        up to 6 deduped cover candidates. Powers the "Find cover image"
        modal on the library card + Listen header. Keyless — OpenLibrary
        is the upstream and rate-limits anonymously.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Candidate list (may be empty when OpenLibrary has no match)
          content:
            application/json:
              schema:
                type: object
                required: [candidates]
                properties:
                  candidates:
                    type: array
                    items: { $ref: '#/components/schemas/CoverCandidate' }
        '404': { description: Book not found }
        '502':
          description: OpenLibrary unreachable, timed out, or returned malformed JSON

  /api/books/{bookId}/cover:
    get:
      summary: Stream the cached cover image bytes
      operationId: getCover
      description: |
        Serves the JPEG bytes for the book's currently-selected cover
        (`<bookDir>/.audiobook/cover.jpg`). Cached for an hour
        (`Cache-Control: public, max-age=3600`). Returns 404 when no
        cover is on disk — clients fall back to `coverGradient`.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      responses:
        '200':
          description: JPEG bytes
          content:
            image/jpeg:
              schema: { type: string, format: binary }
        '404': { description: Book has no cached cover }
    post:
      summary: Download and pin one of the OpenLibrary candidates as this book's cover
      operationId: setCover
      description: |
        Re-runs the OpenLibrary search to locate the requested candidate
        by `openLibraryId`, downloads the JPEG to
        `<bookDir>/.audiobook/cover.jpg`, and patches `coverImage` onto
        state.json so the next library scan exposes `coverImageUrl`.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [openLibraryId]
              properties:
                openLibraryId:
                  type: string
                  description: "Stable id from `CoverCandidate.openLibraryId` (e.g. `cover-i:123456`)."
      responses:
        '200':
          description: Cover saved
          content:
            application/json:
              schema:
                type: object
                required: [coverImageUrl]
                properties:
                  coverImageUrl: { type: string, format: uri-reference }
        '400': { description: Missing or malformed `openLibraryId` }
        '404': { description: Book not found OR candidate no longer in the live OpenLibrary result set }
        '502':
          description: OpenLibrary unreachable, timed out, oversized, or returned a non-image response
    delete:
      summary: Remove the cached cover and revert to the procedural gradient
      operationId: deleteCover
      description: |
        Removes `<bookDir>/.audiobook/cover.jpg` and clears the
        `coverImage` field from state.json. Idempotent — succeeds even
        when no cover exists.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      responses:
        '204': { description: Cover removed (or was never present) }
        '404': { description: Book not found }

  /api/voices/base:
    get:
      summary: List the raw model voices the configured engines expose
      operationId: getBaseVoices
      description: |
        Returns the catalog of unmodified model voices available across every
        supported TTS engine, used both by the Voices view's "Base voices"
        tab and by the per-cast voice-override picker in the Profile Drawer.

        For `coqui`, the list is read from the live sidecar `GET /speakers`
        — entries reflect whatever XTTS v2's `speaker_manager` actually
        publishes today (the sidecar tolerates `name_to_id` / `speaker_names`
        API drift). If the sidecar is unreachable, the coqui section is
        empty rather than failing the whole call.

        For `gemini`, `piper`, `kokoro`, the list comes from the
        engine-specific static constants in `server/src/tts/voice-mapping.ts`
        — these engines either ship fixed voice catalogs or aren't installed
        locally, so they don't depend on a running sidecar.
      responses:
        '200':
          description: Merged base-voice catalog across all engines
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BaseVoiceCatalog' }

  /api/voices/{voiceId}/sample:
    post:
      summary: Synthesise a ~12-second voice preview
      operationId: getVoiceSample
      description: |
        Renders a short sample of the voice via the configured TTS provider
        (free-tier Gemini). The server caches the WAV on disk keyed by
        `voiceId` + `modelKey`; subsequent requests with the same key return
        immediately with `cached: true`. The frontend plays the URL with a
        plain `<audio>` element.

        When `rawEngine` + `rawSpeaker` are provided, the picker is
        bypassed and the named speaker is synthesised directly. This is
        what powers the "Base voices" tab and the family-header Play
        buttons — the voiceId in the path is treated as a cache scope
        (`raw-<engine>-<speaker>`) so unused base voices can still cache
        without piggy-backing on a real Voice id.
      parameters:
        - { in: path, name: voiceId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VoiceSampleRequest' }
      responses:
        '200':
          description: Sample is ready (either cached or freshly synthesised)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceSample' }
        '400':
          description: Invalid model key
        '429':
          description: Upstream TTS provider is rate-limited
        '502':
          description: Upstream TTS provider failed

  /api/books/{bookId}/voice-match:
    post:
      summary: Match characters to existing library voices
      operationId: matchVoices
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [characters]
              properties:
                characters:
                  type: array
                  items: { $ref: '#/components/schemas/CharacterMatchInput' }
                libraryVoiceIds:
                  type: array
                  items: { type: string }
                  description: Restrict candidates to a subset of the user's library.
      responses:
        '200':
          description: Match candidates per character
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceMatchResponse' }

  /api/books/{bookId}/generation:
    post:
      summary: Generate chapter audio with progress streaming
      operationId: streamGeneration
      description: |
        Single long-running POST that streams generation progress as SSE
        events. Mirrors the analysis route shape (`POST /api/manuscripts/{id}/
        analysis`). Each `data: <json>` payload follows the GenerationTick
        schema. Synthesises chapters one at a time; per-chapter completion
        writes `audio/<chapterSlug>.mp3` + `audio/<chapterSlug>.segments.json`
        into the workspace book directory. Legacy `.wav` files from chapters
        generated before the MP3 switch keep playing — the locator probes
        `.mp3` first, falls back to `.wav` (see plan 28).
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [modelKey]
              properties:
                modelKey:
                  type: string
                  enum: [kokoro-v1, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
                  description: TTS model key. Local engines (kokoro-, coqui-) route to the sidecar; gemini-* keys route to Google's TTS API.
                chapterIds:
                  type: array
                  items: { type: integer }
                  description: Optional subset of chapters to (re)generate. Defaults to all chapters lacking an audio file.
                force:
                  type: boolean
                  description: Re-synthesise even if an audio file already exists on disk.
      responses:
        '200':
          description: Tick stream
          content:
            text/event-stream:
              schema: { $ref: '#/components/schemas/GenerationTick' }

  /api/books/{bookId}/chapters/{chapterId}/audio:
    get:
      summary: Get a chapter's playable audio + waveform metadata
      operationId: getChapterAudio
      parameters:
        - { in: path, name: bookId,    required: true, schema: { type: string } }
        - { in: path, name: chapterId, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Chapter audio metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChapterAudio' }

  /api/voices:
    get:
      summary: List voices derived from every confirmed cast in the workspace
      operationId: getVoices
      description: |
        Walks `books/<Author>/<Series>/<Book>/.audiobook/cast.json` for every
        book where `state.castConfirmed === true` and aggregates the characters
        into a deduplicated voice library. There is no separate voice store —
        a "voice" is the reusable identity of a previously-cast character. The
        `id` matches what the TTS layer hashes for prebuilt-voice picking, so
        cached samples at `/audio/voices/{id}-{modelKey}-{paramHash}.mp3`
        line up. The trailing hash captures the synthesis inputs so attribute
        edits in the profile drawer correctly bust the cache.
      parameters:
        - in: query
          name: currentBookId
          required: false
          schema: { type: string }
          description: "When set, voices belonging to that book are tagged source=current."
        - in: query
          name: engine
          required: false
          schema: { type: string, enum: [coqui, gemini, piper, kokoro] }
          description: "TTS engine whose voice catalog is used to populate each Voice.ttsVoice. Defaults to 'coqui' (the UI's default)."
      responses:
        '200':
          description: Derived voice library, pinned first then by usage descending
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceLibraryResponse' }

  /api/voices/{voiceId}/pin:
    put:
      summary: Pin or unpin a voice in the workspace library
      operationId: setVoicePin
      description: |
        Toggles a workspace-level pin flag persisted to
        `audiobook-workspace/voices.json`. Pinned voices sort to the top of
        the library response so favourites stay at hand across books.
      parameters:
        - { in: path, name: voiceId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pinned]
              properties:
                pinned: { type: boolean }
      responses:
        '204':
          description: Pin flag updated
        '400':
          description: Missing or non-boolean `pinned` field

  /api/voices/{voiceId}/override:
    put:
      summary: Set or clear the manual base-voice override on a voice family
      operationId: setVoiceOverride
      description: |
        Writes a manual base-voice override into every cast.json character
        whose `voiceId` (or character id, when voiceId is absent) matches the
        path parameter. The same voiceId can recur across a series (the
        character is meant to be the same identity), so one PUT propagates to
        every confirmed-cast book that shares it. Pass `override: null` to
        clear.

        When the override's engine matches the project's active TTS engine,
        synthesis bypasses the attribute-driven picker (`pickVoiceForEngine`)
        and uses the named speaker directly. Cross-engine overrides are kept
        but ignored at synth time; the UI surfaces an "engine mismatch" badge.
      parameters:
        - { in: path, name: voiceId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [override]
              properties:
                override:
                  oneOf:
                    - $ref: '#/components/schemas/BaseVoice'
                    - type: 'null'
      responses:
        '204':
          description: Override written (or cleared) on every matching cast.json entry
        '400':
          description: Body is missing or malformed (override must be a BaseVoice or null)
        '404':
          description: No character with that voiceId exists in any confirmed cast

  /api/books/{bookId}/revisions:
    get:
      summary: Pending A/B revisions + voice-drift events
      operationId: pollRevisions
      description: Polled every 30 s by the client, or pushed via the generation stream.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Outstanding revisions + drift events
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RevisionsResponse' }

  /api/books/{bookId}/exports:
    post:
      summary: Build a sideloadable audiobook artifact (Phase A — MP3.ZIP)
      operationId: createBookExport
      description: |
        Packages a finished book's per-chapter MP3 files into a single
        zip archive (PocketBook Reader Android sideloads MP3.ZIP, the
        e-reader's audiobook app on every platform accepts it). The
        zip carries one MP3 per non-excluded chapter, two-digit-prefixed
        and ID3v2.4-tagged (TIT2, TALB, TPE1, TPE2, TRCK) so PocketBook
        sorts and labels them correctly. Chapter audio is copied byte-
        for-byte via `ffmpeg -c:a copy` — no re-encode of the existing
        LAME VBR V2 frames.

        Returns immediately with the freshly-created job; clients poll
        `getBookExport` for progress and follow `downloadUrl` once
        `status === 'done'`. With `destination: 'sync-folder'`, the
        finished archive is also copied to the user's configured
        `exportSyncFolder` via an atomic tmp+rename (same OneDrive-safe
        backoff as state.json). Refuses with `409 export_incomplete`
        when any non-excluded chapter lacks an `.mp3` audio file.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BookExportRequest' }
      responses:
        '201':
          description: Export job created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BookExportJob' }
        '404':
          description: Book not found
        '409':
          description: One or more non-excluded chapters lack a `.mp3` audio file
          content:
            application/json:
              schema:
                type: object
                required: [error, missing]
                properties:
                  error: { type: string, enum: [export_incomplete] }
                  missing:
                    type: array
                    items: { type: string, description: "Chapter slug or title" }

  /api/books/{bookId}/exports/{exportId}:
    get:
      summary: Poll the status of an in-flight or completed export
      operationId: getBookExport
      parameters:
        - { in: path, name: bookId,   required: true, schema: { type: string } }
        - { in: path, name: exportId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Current job state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BookExportJob' }
        '404':
          description: Job id unknown

  /api/books/{bookId}/exports/{exportId}/download:
    get:
      summary: Stream the export archive bytes
      operationId: downloadBookExport
      description: |
        Range-aware `application/zip` (Phase A) or `audio/mp4`
        (Phase B M4B) stream. Phone Chrome can hit this URL directly
        over the LAN; the browser saves into Downloads/ and a tap
        opens it with PocketBook Reader.
      parameters:
        - { in: path, name: bookId,   required: true, schema: { type: string } }
        - { in: path, name: exportId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Archive bytes
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '206':
          description: Partial content (Range request)
        '404':
          description: Job id unknown or staging file missing

  /api/export/lan:
    get:
      summary: Enumerate the server's reachable LAN URLs
      operationId: getExportLanUrls
      description: |
        Returns non-loopback IPv4 addresses the Node server is reachable
        on so the export modal can render a sideload URL + QR for the
        user's phone. Loopback (127.x) and link-local v6 (fe80::) are
        filtered out — they're useless for sideloading. Order matches
        `os.networkInterfaces()` enumeration; the modal picks the first.
      responses:
        '200':
          description: LAN URL list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExportLanInfo' }

# ---------------------------------------------------------------------
# Schemas
# ---------------------------------------------------------------------
components:
  schemas:

    # --- User settings ----------------------------------------------
    UserSettings:
      type: object
      required:
        - displayName
        - defaultAnalysisModel
        - defaultTtsEngine
        - defaultTtsModelKey
        - sidecarUrl
        - analysisEngine
        - ollamaUrl
        - minorCastMinLines
        - apiKeyStatus
        - workspaceRoot
        - workspaceSource
      properties:
        displayName:
          type: string
          description: |
            Free-text name shown in the top-bar avatar and used as the
            author of editorial actions in the change log. Seeded to a
            placeholder on first run; user can edit any time.
        defaultAnalysisModel:
          type: string
          description: |
            Analysis model id from src/lib/models.ts MODEL_OPTIONS. Used as
            the initial value of ui.selectedModel when a book has no
            persisted analysis-model choice (seed-only; per-book picks win
            after).
        defaultTtsEngine:
          type: string
          enum: [local, gemini]
          description: |
            Frontend engine group from src/lib/tts-models.ts (TtsEngineId).
            Used to filter the model dropdown's initial state.
        defaultTtsModelKey:
          type: string
          enum: [kokoro-v1, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
          description: |
            TTS model key from src/lib/tts-models.ts. Used as the initial
            value of ui.ttsModelKey when a book has no persisted TTS-model
            choice (seed-only). Default for new accounts is `kokoro-v1`.
        sidecarUrl:
          type: string
          description: |
            Overrides the LOCAL_TTS_URL env var. Re-read on every request
            by the sidecar provider + health probe.
        analysisEngine:
          type: string
          enum: [local, gemini]
          description: |
            Analyzer dispatch. `local` routes through OllamaAnalyzer (with
            Gemini as automatic fallback iff GEMINI_API_KEY is set AND the
            local daemon is unreachable). `gemini` always goes direct.
            See server/src/analyzer/index.ts selectAnalyzer.
        ollamaUrl:
          type: string
          description: |
            Base URL of the local Ollama daemon. Falls through to OLLAMA_URL
            env then http://localhost:11434 in the server resolver. Re-read
            on every analysis request, like sidecarUrl. The Ollama *model*
            tag is not stored separately — `defaultAnalysisModel` doubles
            as the Ollama tag when it has Ollama shape (contains ':').
        workspaceDirOverride:
          type: string
          nullable: true
          description: |
            Optional override for the WORKSPACE_DIR env var. Read once at
            server startup — changes require a server restart to apply
            (UI flags this with a "restart required" badge).
        exportSyncFolder:
          type: string
          nullable: true
          description: |
            Optional destination folder the audiobook-export pipeline copies
            finished files into (e.g. a OneDrive or Syncthing watch path
            mirrored to the user's phone). Null disables the "save to sync
            folder" tab in the export modal. The writer mkdirs on demand
            and uses the same OneDrive-safe atomic-rename retry as state.json.
        minorCastMinLines:
          type: integer
          minimum: 0
          maximum: 50
          description: |
            Threshold for the minor-cast fold pass at analysis time. A
            character whose number of attributed sentences (not words —
            each sentence the model assigns to that speaker counts as one
            "line", same as the count shown on the cast roster) is BELOW
            this number gets folded into the generic `Unknown male` /
            `Unknown female` bucket. Set to 0 to disable the line-count
            trigger entirely (only characters whose name begins with
            "Unknown" will still fold). Default 3 — i.e. a speaker who
            says 0, 1, or 2 sentences in the whole book doesn't warrant a
            dedicated voice profile.
        apiKeyStatus:
          type: string
          enum: [set, unset]
          readOnly: true
          description: |
            Whether process.env.GEMINI_API_KEY is non-empty. The key value
            itself is never returned over the wire — the UI uses this flag
            to render a "set in server/.env" pill.
        workspaceRoot:
          type: string
          readOnly: true
          description: Resolved absolute path of the active workspace root.
        workspaceSource:
          type: string
          enum: [env, default, override]
          readOnly: true
          description: |
            Where WORKSPACE_ROOT was resolved from. `override` when
            user-settings.json's workspaceDirOverride was used at boot,
            `env` when WORKSPACE_DIR was, `default` when the built-in
            `../audiobook-workspace` fallback applied.

    UserSettingsPatch:
      type: object
      description: |
        Partial update payload. Read-only fields (apiKeyStatus,
        workspaceRoot, workspaceSource) are ignored. Any `geminiApiKey`-
        shaped field is dropped — the API key only lives in server/.env.
      properties:
        displayName:          { type: string }
        defaultAnalysisModel: { type: string }
        defaultTtsEngine:     { type: string, enum: [local, gemini] }
        defaultTtsModelKey:
          type: string
          enum: [kokoro-v1, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
        sidecarUrl:           { type: string }
        analysisEngine:       { type: string, enum: [local, gemini] }
        ollamaUrl:            { type: string }
        workspaceDirOverride:
          type: string
          nullable: true
        exportSyncFolder:
          type: string
          nullable: true
        minorCastMinLines:
          type: integer
          minimum: 0
          maximum: 50

    # --- Library ----------------------------------------------------
    LibraryResponse:
      type: object
      required: [authors]
      properties:
        authors:
          type: array
          items: { $ref: '#/components/schemas/LibraryAuthor' }

    LibraryAuthor:
      type: object
      required: [name, series]
      properties:
        name: { type: string }
        series:
          type: array
          items: { $ref: '#/components/schemas/LibrarySeries' }

    LibrarySeries:
      type: object
      required: [name, books]
      properties:
        name: { type: string }
        books:
          type: array
          items: { $ref: '#/components/schemas/LibraryBook' }

    CoverCandidate:
      type: object
      required: [openLibraryId, coverUrl]
      properties:
        openLibraryId:
          type: string
          description: |
            Stable identifier carried back to POST /api/books/{bookId}/cover
            (`cover-i:<openLibraryCoverEditionId>`).
        coverUrl:
          type: string
          format: uri
          description: "Direct OpenLibrary cover URL (`/b/id/<id>-L.jpg`)."
        edition:
          type: string
          description: "Optional display string — `<publisher> · <year>`. Best-effort; OpenLibrary metadata is patchy."

    LibraryBook:
      type: object
      required: [bookId, title, author, series, status, chapterCount, completedChapters, characterCount, voiceCount, lastWorkedOn, coverGradient, isStandalone]
      properties:
        bookId:           { type: string, description: "slug(author)__slug(series)__slug(title)" }
        title:            { type: string }
        author:           { type: string }
        series:           { type: string }
        seriesPosition:
          type: number
          nullable: true
          description: "Series position. Allows decimals for novellas (e.g. 1.5)."
        isStandalone:     { type: boolean }
        status:
          type: string
          enum: [not_analysed, analysing, cast_pending, generating, complete, unreadable, orphaned]
        manuscriptId:     { type: string }
        chapterCount:     { type: integer }
        completedChapters: { type: integer }
        characterCount:   { type: integer }
        voiceCount:       { type: integer }
        matchedFromLibrary: { type: integer }
        progress:         { type: number, minimum: 0, maximum: 1 }
        runtime:          { type: string, description: "human-formatted total runtime, e.g. '4h 38m'" }
        lastWorkedOn:     { type: string, description: "human-formatted relative time, e.g. '2 min ago'" }
        coverGradient:
          type: array
          minItems: 2
          maxItems: 2
          items: { type: string, description: "CSS color literal" }
        coverImageUrl:
          type: string
          format: uri-reference
          description: |
            Server-relative URL for the cached cover image bytes (always
            `/api/books/{bookId}/cover`). Present only when the book has
            a cover cached on disk (`.audiobook/cover.jpg`). When
            absent, the UI falls back to `coverGradient`.
        pinned:           { type: boolean }

    # --- Import + confirm-metadata ---------------------------------
    ImportCandidate:
      type: object
      required: [format, title, sourceText, wordCount, byteSize, chapters]
      properties:
        format:         { type: string, enum: [markdown, plaintext, epub, pdf] }
        title:          { type: string }
        author:         { type: string, nullable: true }
        series:         { type: string, nullable: true }
        seriesPosition:
          type: number
          nullable: true
          description: "Series position. Allows decimals for novellas (e.g. 1.5)."
        sourceText:     { type: string }
        wordCount:      { type: integer }
        byteSize:       { type: integer }
        chapters:
          type: array
          items:
            type: object
            required: [id, title]
            properties:
              id:        { type: integer }
              title:     { type: string }
              wordCount: { type: integer, description: "Words in this chapter body. Lets the confirm view auto-suggest front/back-matter exclusion." }

    ImportResponse:
      type: object
      required: [tempId, candidate]
      properties:
        tempId:    { type: string, example: "imp_abc123" }
        candidate: { $ref: '#/components/schemas/ImportCandidate' }

    ConfirmBookRequest:
      type: object
      required: [tempId, author, title, isStandalone]
      properties:
        tempId:       { type: string }
        author:       { type: string }
        series:       { type: string }
        seriesPosition:
          type: number
          nullable: true
          description: "Series position. Allows decimals for novellas (e.g. 1.5)."
        title:        { type: string }
        isStandalone: { type: boolean }
        excludedSlugs:
          type: array
          items: { type: string }
          description: "Chapter slugs to seed as excluded=true in state.json. Built client-side from the candidate.chapters[].id + title; the server re-derives the slug to match."

    ConfirmBookResponse:
      allOf:
        - $ref: '#/components/schemas/UploadResponse'
        - type: object
          required: [bookId, author, series, isStandalone, paths]
          properties:
            bookId:       { type: string }
            author:       { type: string }
            series:       { type: string }
            seriesPosition:
              type: number
              nullable: true
              description: "Series position. Allows decimals for novellas (e.g. 1.5)."
            isStandalone: { type: boolean }
            paths:
              type: object
              required: [bookDir, manuscript, dotAudiobook]
              properties:
                bookDir:      { type: string }
                manuscript:   { type: string }
                dotAudiobook: { type: string }

    # --- Upload -----------------------------------------------------
    UploadResponse:
      type: object
      required: [manuscriptId, format, title, wordCount, byteSize, uploadedAt, sourceText]
      properties:
        manuscriptId: { type: string, example: "mns_abc123" }
        format:       { type: string, enum: [markdown, plaintext, epub, pdf] }
        title:        { type: string }
        wordCount:    { type: integer }
        byteSize:     { type: integer }
        uploadedAt:   { type: string, format: date-time }
        sourceText:   { type: string, description: "Normalised plain-text body." }

    # --- Analyse ----------------------------------------------------
    AnalysePhaseEvent:
      type: object
      required: [phaseId, progress]
      properties:
        phaseId:  { type: integer, minimum: 0 }
        progress: { type: number,  minimum: 0, maximum: 1 }
        label:    { type: string }

    AnalyseResponse:
      type: object
      required: [bookId, manuscriptId, title, phaseTimings, characters, chapters, sentences]
      properties:
        bookId:        { type: string, example: "ns" }
        manuscriptId:  { type: string }
        title:         { type: string }
        phaseTimings:
          type: array
          items:
            type: object
            properties:
              id:       { type: integer }
              label:    { type: string }
              duration: { type: integer, description: "milliseconds" }
        characters:    { type: array, items: { $ref: '#/components/schemas/Character' } }
        chapters:      { type: array, items: { $ref: '#/components/schemas/Chapter' } }
        sentences:     { type: array, items: { $ref: '#/components/schemas/Sentence' } }
        libraryMatches:
          type: array
          description: Hints from a pre-pass against the user's voice library.
          items:
            type: object
            properties:
              characterId: { type: string }
              voiceId:     { type: string }
              confidence:  { type: number }

    # --- Voice match ------------------------------------------------
    CharacterMatchInput:
      type: object
      required: [id, name, attributes]
      properties:
        id:             { type: string }
        name:           { type: string }
        aliases:
          type: array
          items: { type: string }
          description: |
            Alternate forms accumulated when the user merged duplicate roster
            entries (mirrors Character.aliases). The matcher scores against
            name OR any alias on either side, so book N+1 can recognise a
            character last met under a different form.
        gender:
          type: string
          enum: [male, female, neutral]
          description: Optional tie-breaker signal (set by analysis).
        ageRange:
          type: string
          enum: [child, teen, adult, elderly]
          description: Optional tie-breaker signal (set by analysis).
        attributes:     { type: array, items: { type: string } }
        tone:
          type: object
          properties:
            warmth:    { type: integer }
            pace:      { type: integer }
            authority: { type: integer }
            emotion:   { type: integer }
        evidenceQuotes:
          type: array
          items: { type: string }

    VoiceMatchResponse:
      type: object
      required: [bookId, matches]
      properties:
        bookId:  { type: string }
        matches:
          type: array
          items:
            type: object
            required: [characterId, candidates]
            properties:
              characterId: { type: string }
              candidates:
                type: array
                items:
                  type: object
                  required: [voiceId, score]
                  properties:
                    voiceId:         { type: string }
                    fromBookId:      { type: string, description: "Library book whose confirmed cast holds this voice. Lets the client target the exact library record for the override endpoint." }
                    fromBookTitle:   { type: string }
                    fromCharacterId: { type: string, description: "Character id within fromBookId's cast.json. Stable handle for library-cast override." }
                    score:           { type: number, minimum: 0, maximum: 1 }
                    factors:
                      type: array
                      items: { $ref: '#/components/schemas/MatchFactor' }

    MatchFactor:
      type: object
      required: [id, label, score]
      properties:
        id:     { type: string, example: "register" }
        label:  { type: string, example: "Vocabulary register" }
        score:  { type: number, minimum: 0, maximum: 1 }
        detail: { type: string }

    # --- Generation -------------------------------------------------
    GenerationTick:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [progress, chapter_assembling, chapter_complete, chapter_failed, idle]
          description: |
            `chapter_assembling` is emitted between the last per-group synthesis
            tick and `chapter_complete`, while the server concatenates the PCM,
            writes the WAV + segments JSON, and updates state.json. Surfaces
            the disk-write phase so the UI doesn't look stalled at 99 %.
        chapterId:   { type: integer }
        characterId:
          type: string
          nullable: true
          description: null = chapter-wide tick (not character-specific).
        progress:    { type: number, minimum: 0, maximum: 1 }
        currentLine: { type: integer }
        totalLines:  { type: integer }
        totalGroups:
          type: integer
          description: Only on `chapter_assembling` — number of synthesised same-speaker groups about to land on disk.
        durationSec:
          type: number
          description: Only on `chapter_assembling` — measured audio length about to be written.
        audioModelKey:
          type: string
          enum: [kokoro-v1, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
          description: |
            Only on `chapter_complete` — the TTS model key that produced
            this chapter's audio. Carries the engine forward so the
            frontend can update `chapter.audioModelKey` without waiting
            for a state.json reload (which would otherwise let an
            engine-drift badge appear only after page navigation). See
            `docs/features/35-engine-drift-detection.md`.
        errorReason: { type: string, nullable: true }

    # --- Voice samples ---------------------------------------------
    VoiceSampleRequest:
      type: object
      required: [modelKey]
      properties:
        modelKey:
          type: string
          enum: [kokoro-v1, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
          description: UI-stable TTS model key. The engine prefix (kokoro-, coqui-, gemini-) drives provider selection server-side.
        voice:
          type: object
          description: Frontend Voice payload (attributes drive the prebuilt-voice picker).
          properties:
            id:         { type: string }
            character:  { type: string }
            attributes: { type: array, items: { type: string } }
        characterHint:
          type: object
          description: |
            Extra signals the server uses to pick a sensible prebuilt Gemini
            voice when the library `attributes` only carry personality traits
            (e.g. "sarcastic", "patient") rather than vocal descriptors. The
            description is scanned for he/she pronouns; gender + ageRange take
            precedence when present; tone is used as a tiebreaker. Evidence
            quotes (real manuscript lines) drive the sample script when
            present so every voice actually sounds like that character.
          properties:
            description: { type: string }
            role:        { type: string }
            gender:      { type: string, enum: [male, female, neutral] }
            ageRange:    { type: string, enum: [child, teen, adult, elderly] }
            evidence:
              type: array
              items: { type: string }
              description: Manuscript lines spoken by or about this character.
            tone:
              type: object
              properties:
                warmth:    { type: integer }
                pace:      { type: integer }
                authority: { type: integer }
                emotion:   { type: integer }
        text:
          type: string
          description: Optional override script. Capped to ~30 words server-side to stay near 12 s.
        rawEngine:
          type: string
          enum: [coqui, gemini, piper, kokoro]
          description: |
            When set together with `rawSpeaker`, the server skips the
            attribute-driven prebuilt-voice picker and synthesises with the
            named base voice directly. Used by the Voices view's "Base voices"
            tab and family-header Play buttons.
        rawSpeaker:
          type: string
          description: |
            Base-voice name from `GET /api/voices/base` (e.g. "Asya Anara",
            "Charon"). Ignored unless `rawEngine` is also set.

    VoiceSample:
      type: object
      required: [url, cached, modelKey]
      properties:
        url:
          type: string
          description: Path under the server's static /audio mount; play directly with <audio>.
        durationSec:
          type: number
          nullable: true
          description: Computed from the synthesised PCM length. Null when the response was served from cache.
        cached:    { type: boolean }
        modelKey:
          type: string
          enum: [kokoro-v1, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]

    # --- Voice library ---------------------------------------------
    TtsVoiceAssignment:
      type: object
      required: [provider, name, description]
      description: |
        The TTS provider voice this Voice resolves to. Computed server-side by
        the same picker that synthesises samples and chapters, so the value
        previewed in the UI matches what the user actually hears.
      properties:
        provider:    { type: string, enum: [coqui, gemini, piper, kokoro] }
        name:        { type: string, description: "Engine-specific prebuilt voice name, e.g. 'Charon' (Gemini) or 'Claribel Dervla' (Coqui XTTS v2)." }
        description: { type: string, description: "Short label for the picked voice — engine-specific. Empty/placeholder when the engine doesn't publish descriptors." }

    BaseVoice:
      type: object
      required: [engine, name]
      description: |
        One unmodified speaker exposed by a TTS engine. The pair (engine, name)
        is the stable identity — the engine routes the request to the right
        provider, the name is the engine-specific speaker handle (XTTS speaker
        name, Gemini prebuilt voice id, Piper short name, etc.). Used by the
        Voices view's "Base voices" tab and the Profile Drawer override picker.
      properties:
        engine:   { type: string, enum: [coqui, gemini, piper, kokoro] }
        name:     { type: string, description: "Engine-specific speaker handle, e.g. 'Asya Anara' (Coqui XTTS) or 'Charon' (Gemini)." }
        language: { type: string, description: "Optional ISO 639-1 / BCP-47 hint; absent when the engine doesn't tag languages." }
        gender:
          type: string
          enum: [male, female, neutral]
          description: "Engine-supplied gender hint; absent when the engine doesn't publish one (XTTS speakers don't)."

    BaseVoiceCatalog:
      type: object
      required: [voices]
      properties:
        voices:
          type: array
          items: { $ref: '#/components/schemas/BaseVoice' }

    Voice:
      type: object
      required: [id, character, bookTitle, bookId, attributes, gradient, usedIn, source, ttsVoice]
      properties:
        id:         { type: string, description: "Stable id used to hash a TTS prebuilt voice. Defaults to character.voiceId or character.id." }
        character:  { type: string }
        bookTitle:  { type: string }
        bookId:     { type: string }
        attributes:
          type: array
          items: { type: string }
        gradient:
          type: array
          minItems: 2
          maxItems: 2
          items: { type: string, description: "CSS color literal" }
        usedIn:     { type: integer, minimum: 0, description: "Number of distinct books that contain this voiceId." }
        source:
          type: string
          enum: [current, library]
          description: "'current' when the voice belongs to the currently-open book; 'library' otherwise."
        reusable:   { type: boolean, description: "Marker for narrator-like voices that span an entire book." }
        pinned:     { type: boolean, description: "Workspace-level pin flag from audiobook-workspace/voices.json." }
        ttsVoice:   { $ref: '#/components/schemas/TtsVoiceAssignment' }
        overrideTtsVoices:
          type: object
          nullable: true
          description: |
            User-set TTS voice overrides per engine. Each entry pins a
            specific speaker for that engine; the active synth engine
            reads its own slot at render time and falls back to attribute
            inference when absent. Engine switches preserve cast
            assignments across engines (no need to re-cast every
            character when toggling Coqui ↔ Kokoro).

            Keyed by `TtsEngine` (`coqui`, `gemini`, `piper`, `kokoro`);
            OpenAPI 3.0 can't constrain map keys to an enum, but the
            server normalises unknown keys away at read time.
          additionalProperties:
            type: object
            required: [name]
            properties:
              name:
                type: string
                description: "Engine-specific speaker handle for this engine's slot."
          example:
            coqui:  { name: "Asya Anara" }
            kokoro: { name: "am_onyx" }
        overrideTtsVoice:
          deprecated: true
          allOf:
            - $ref: '#/components/schemas/BaseVoice'
          nullable: true
          description: |
            DEPRECATED: superseded by `overrideTtsVoices` (plural) for
            multi-engine support. Server-side reads still accept this
            singular form for backwards compatibility with cast.json files
            written by older clients — they get normalised into the
            plural map at load time. Writes always emit `overrideTtsVoices`
            and may omit this field. Will be removed once all in-flight
            casts have been touched at least once.
        bookSeries:
          type: string
          nullable: true
          description: |
            Series name from the book directory (`books/<Author>/<Series>/<Book>`),
            or null/empty for standalones. Lets the voice-family-grouped Voices
            view nest cast members under their book series before the book.

    VoiceLibraryResponse:
      type: object
      required: [voices]
      properties:
        voices:
          type: array
          items: { $ref: '#/components/schemas/Voice' }

    # --- Audio ------------------------------------------------------
    ChapterAudio:
      type: object
      required: [durationSec, peaks]
      properties:
        url:
          type: string
          nullable: true
          description: Signed MP3/Opus URL; null while still rendering.
        durationSec: { type: number }
        peaks:
          type: array
          items: { type: number, minimum: 0, maximum: 1 }
          description: Pre-computed waveform envelope, typically 240 samples.
        sampleRate:  { type: integer, example: 44100 }
        segments:
          type: array
          items:
            type: object
            properties:
              start:       { type: number, description: "seconds" }
              end:         { type: number, description: "seconds" }
              characterId: { type: string }
              sentenceId:  { type: integer }

    # --- Workspace change log ---------------------------------------
    ChangeLogEvent:
      type: object
      required: [id, ts, date, type, title, note, actor]
      properties:
        id:       { type: integer, description: "Monotonic id, usually now.getTime() at write time." }
        at:       { type: string, format: date-time, description: "ISO timestamp; absent on hand-authored fixture entries." }
        ts:       { type: string, description: "Human-readable relative time (\"Just now\", \"2 min ago\"). Recomputed on render." }
        date:     { type: string, enum: [today, yesterday, earlier] }
        type:     { type: string, enum: [regenerate, voice_tune, voice_reuse, voice_lock, boundary_move, chapter_complete, generation_run_complete, chapter_failed, generation_started, cast_confirm, analysis_complete, import, library_add, reparse] }
        title:    { type: string }
        note:     { type: string }
        actor:    { type: string, enum: [you, system] }
        chapterId:  { type: integer, description: "Bound to chapter scope when applicable. Reparse drops every event that carries this field." }
        revertible: { type: boolean }
    WorkspaceChangeLogEvent:
      allOf:
        - $ref: '#/components/schemas/ChangeLogEvent'
        - type: object
          description: |
            Returned by GET /api/workspace/changelog. The aggregator tags each
            per-book event with the originating book's identifying metadata so
            the workspace view can render cross-book context.
          required: [bookId, bookTitle, author]
          properties:
            bookId:    { type: string }
            bookTitle: { type: string }
            author:    { type: string }

    # --- Revisions + drift -----------------------------------------
    RevisionsResponse:
      type: object
      properties:
        pending: { type: array, items: { $ref: '#/components/schemas/Revision' } }
        drift:   { type: array, items: { $ref: '#/components/schemas/DriftEvent' } }

    Revision:
      type: object
      required: [id, chapterId, characterId, segments]
      properties:
        id:            { type: string }
        chapterId:     { type: integer }
        characterId:   { type: string }
        triggeredBy:   { type: string }
        triggeredAgo:  { type: string }
        oldDuration:   { type: string }
        newDuration:   { type: string }
        confidence:    { type: number, minimum: 0, maximum: 1 }
        segments:
          type: array
          items:
            type: object
            properties:
              id:           { type: integer }
              text:         { type: string }
              oldDuration:  { type: string }
              newDuration:  { type: string }
              changed:      { type: boolean }
              narratorOnly: { type: boolean }

    DriftEvent:
      type: object
      required: [id, characterId, chapterId, severity, factor]
      properties:
        id:           { type: string }
        characterId:  { type: string }
        chapterId:    { type: integer }
        severity:     { type: string, enum: [mild, moderate, severe] }
        factor:       { type: string, example: "register" }
        factorLabel:  { type: string }
        description:  { type: string }
        metrics:
          type: object
          properties:
            current:  { type: number }
            expected: { type: number }
            unit:     { type: string }
        detected:         { type: string }
        suggestedAction:  { type: string, example: "regenerate_chapter" }

    # --- Domain core -----------------------------------------------
    Character:
      type: object
      required: [id, name, role, color]
      properties:
        id:          { type: string }
        name:        { type: string }
        role:        { type: string }
        color:       { type: string }
        lines:       { type: integer }
        scenes:      { type: integer }
        attributes:  { type: array, items: { type: string } }
        aliases:
          type: array
          items: { type: string }
          description: |
            Alternate names this character is known by. Populated when the
            user merges a duplicate roster entry (e.g. "Sophie" merged into
            "Sophie Foster" adds "Sophie" here). Surfaced to the voice
            matcher so the same person can be recognised when later books
            in a series detect the character under a different form.
        tone:
          type: object
          properties:
            warmth:    { type: integer }
            pace:      { type: integer }
            authority: { type: integer }
            emotion:   { type: integer }
        voiceId:     { type: string }
        voiceState:  { type: string, enum: [generated, tuned, reused, locked] }
        gender:
          type: string
          enum: [male, female, neutral]
          description: |
            Voice gender inferred during analysis. Drives the prebuilt-voice
            picker so e.g. a young boy gets a male voice instead of a neutral
            default. Optional — older cached analyses won't have it.
        ageRange:
          type: string
          enum: [child, teen, adult, elderly]
          description: Coarse age bucket used as a register hint for TTS.
        description: { type: string }
        evidence:
          type: array
          items:
            type: object
            properties:
              quote: { type: string }
              note:  { type: string }
        matchedFrom:
          type: object
          nullable: true
          properties:
            bookId:      { type: string, description: "Library book whose confirmed cast holds the matched voice. Required for the library-cast override flow." }
            characterId: { type: string, description: "Character id within bookId's cast.json. Required for the library-cast override flow." }
            bookTitle:   { type: string }
            confidence:  { type: number, minimum: 0, maximum: 1 }

    Chapter:
      type: object
      required: [id, title, duration, state, progress, characters]
      properties:
        id:           { type: integer }
        title:        { type: string }
        duration:     { type: string, example: "12:48" }
        state:        { type: string, enum: [queued, in_progress, done, failed] }
        progress:     { type: number, minimum: 0, maximum: 1 }
        currentLine:  { type: integer }
        totalLines:   { type: integer }
        characters:
          type: object
          additionalProperties:
            type: string
            enum: [queued, in_progress, done, skipped, failed]
        errorReason:  { type: string, nullable: true }
        excluded:     { type: boolean, description: "When true, this chapter is skipped by both analysis (Phase 0a + Phase 1) and audio generation. Typically front- or back-matter like Dedication, Copyright, About the Author." }
        audioModelKey:
          type: string
          enum: [kokoro-v1, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
          description: |
            TTS model key that produced this chapter's existing audio
            file. Stamped at render time and backfilled from the
            segments file for legacy chapters. Absent on never-rendered
            chapters. The frontend compares against the project's
            current `ui.ttsModelKey` to surface engine-drift badges (see
            `docs/features/35-engine-drift-detection.md`).
        audioRenderedAt:
          type: string
          format: date-time
          description: |
            ISO timestamp from when the audio was synthesised. Mirrors
            the segments file's `synthesizedAt`. Surfaces alongside the
            drift badge so the user can see how stale the rendered audio
            is.

    Sentence:
      type: object
      required: [id, chapterId, text, characterId]
      properties:
        id:          { type: integer }
        chapterId:   { type: integer }
        text:        { type: string }
        characterId: { type: string }
        startMs:     { type: integer }
        endMs:       { type: integer }

    # --- Audiobook export ------------------------------------------
    BookExportRequest:
      type: object
      required: [format, destination]
      properties:
        format:
          type: string
          enum: [mp3-zip, m4b]
          description: |
            Container format. `mp3-zip` packages per-chapter MP3s into
            a zip — universal compatibility, no re-encode (the LAME
            VBR V2 frames round-trip byte-identical). `m4b` produces
            a single AAC-LC file at 96 kbps mono 44.1 kHz with
            QuickTime chapter atoms; PocketBook surfaces it under
            Audiobooks with chapter UI + resume position. M4B
            re-encodes from MP3 → AAC.
        destination:
          type: string
          enum: [download, sync-folder]
          description: |
            `download` stages the file under the book's `.audiobook/exports/`
            for the user to pull via `downloadBookExport`. `sync-folder`
            additionally copies the finished archive into the user's
            configured `exportSyncFolder` (e.g. a OneDrive watch path) so
            it lands on their phone via sync. Requires `exportSyncFolder`
            to be set; the request 400s otherwise.

    BookExportJob:
      type: object
      required: [id, bookId, format, destination, status, filename, createdAt]
      properties:
        id:          { type: string, description: "Server-generated export id" }
        bookId:      { type: string }
        format:      { type: string, enum: [mp3-zip, m4b] }
        destination: { type: string, enum: [download, sync-folder] }
        status:
          type: string
          enum: [queued, in_progress, done, failed]
        filename:    { type: string, description: "e.g. 'The Northern Star.zip'" }
        sizeBytes:   { type: integer, nullable: true, description: "Final size once status === 'done'." }
        progress:    { type: number, minimum: 0, maximum: 1, nullable: true, description: "0..1 while in_progress; null otherwise." }
        downloadUrl: { type: string, nullable: true, description: "Set once status === 'done' AND destination === 'download'." }
        syncPath:    { type: string, nullable: true, description: "Absolute path the archive was copied to when destination === 'sync-folder'." }
        errorReason: { type: string, nullable: true, description: "Human-readable failure reason; populated when status === 'failed'." }
        createdAt:   { type: string, description: "ISO timestamp" }
        completedAt: { type: string, nullable: true, description: "ISO timestamp once status leaves in_progress." }

    ExportLanInfo:
      type: object
      required: [urls, port]
      properties:
        port: { type: integer, description: "The Node server's listening port (8080 by default)." }
        urls:
          type: array
          items: { type: string, description: "Reachable URL, e.g. 'http://192.168.1.42:8080'" }
