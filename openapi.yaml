# =====================================================================
# Audiobook generator — backend API contract
# ---------------------------------------------------------------------
# Generated from JSDoc shapes in app/lib/api.js. Mocked implementations
# in that file return the same structures so the front-end can be
# swapped onto a real backend by replacing the mock* functions with
# fetch() calls.
# =====================================================================
openapi: 3.0.3
info:
  title: Audiobook generator API
  version: 1.0.0
  description: |
    Pipeline endpoints for turning a manuscript into a cast-voiced
    audiobook. Six endpoints span the full flow: upload → analyse →
    voice-match → generate → playback → revisions/drift.

servers:
  - url: https://api.example.com
    description: Production (placeholder)
  - url: http://localhost:8080
    description: Local dev

# ---------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------
paths:
  /api/user/settings:
    get:
      summary: Read the user's account defaults + non-secret server overrides
      operationId: getUserSettings
      description: |
        Returns the merged user-settings document. The server reads
        `server/user-settings.json` (created on first GET with defaults) and
        layers in env-derived read-only fields: `apiKeyStatus`,
        `workspaceRoot`, `workspaceSource`. The Gemini API key itself is
        never echoed back — only the binary "is something set" flag.
        Plan 49: `apiKeyStatus` is `set` iff either the env var
        `GEMINI_API_KEY` is configured OR a key has been saved via
        PUT /api/user/settings/gemini-key (stored in user-settings.json).
      responses:
        '200':
          description: Merged settings + env-derived status fields
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSettings' }
    put:
      summary: Update the user's account defaults + non-secret server overrides
      operationId: putUserSettings
      description: |
        Partial update. Only the writable fields from the request body are
        persisted; `apiKeyStatus`, `workspaceRoot`, `workspaceSource` are
        derived and silently ignored if submitted. Any field named
        `geminiApiKey` (or similar secret-shaped key) is also dropped from
        the general PUT — use PUT /api/user/settings/gemini-key for that.
        Changes to `sidecarUrl` take effect on the next request;
        `workspaceDirOverride` is persisted but requires a server restart
        to apply.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserSettingsPatch' }
      responses:
        '200':
          description: Updated settings (same shape as GET)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSettings' }
        '400':
          description: Malformed body (failed schema validation)

  /api/user/settings/gemini-key:
    put:
      summary: Save (or clear) the UI-managed Gemini API key
      operationId: putGeminiApiKey
      description: |
        Plan 49 — dedicated write surface for the Gemini API key, kept off
        the general /api/user/settings PUT so a misaddressed payload can't
        leak the secret into an unrelated field. The key is stored
        plaintext in `server/user-settings.json` (gitignored, same trust
        model as `server/.env`). Pass `{ "key": null }` to clear it.

        The env var `GEMINI_API_KEY` still wins when present — setting a
        key here while env is set is allowed but visually a no-op
        (apiKeyStatus stays `set` either way).

        The response shape matches GET /api/user/settings: the plaintext
        key is NEVER returned, only the redacted `apiKeyStatus` boolean.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
                  nullable: true
                  description: |
                    The new Gemini API key, or `null` to clear the saved
                    value. Whitespace is trimmed; empty / whitespace-only
                    strings are coerced to `null`.
      responses:
        '200':
          description: Updated settings (same shape as GET /api/user/settings)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSettings' }
        '400':
          description: Malformed body (failed schema validation)

  /api/user/settings/sync-folder/test:
    post:
      summary: Probe whether a sync folder path is actually writable
      operationId: testSyncFolderPath
      description: |
        Plan 79 — write-probe behind the export modal's "Test" button so
        the user can tell immediately whether the path they typed for the
        Voice / Smart AudioBook / Audiobookshelf tile (or the generic
        "Sync folder" tab) is actually writable.

        Server runs `mkdir({recursive: true}) + writeFile(<path>/.audiobook-write-probe, 'ok') + unlink`
        and reports the outcome. Success means "Node can write here right
        now" — NOT "your sync app will mirror it to your phone". The
        latter is on the user to confirm (Drive paused, Files On-Demand
        mode, folder not in the sync inclusion list, etc.).

        The most common failure on Windows + Google Drive is a path that
        names the legacy `Backup and Sync` layout (`C:\Users\you\Google Drive\...`)
        when the modern Drive for Desktop is installed — Drive for
        Desktop mounts under `<drive>:\My Drive\...` instead. The probe
        surfaces the underlying errno + message so the modal can hint at
        the cause.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  minLength: 1
                  maxLength: 2000
                  description: |
                    Absolute filesystem path the export pipeline would
                    attempt to write into. The probe creates the folder
                    on demand and removes the probe file before returning.
      responses:
        '200':
          description: |
            Probe outcome. `ok: true` means the write succeeded;
            `ok: false` carries the underlying errno code (e.g. EACCES,
            ENOENT, EBUSY) plus the original error message.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                  code:
                    type: string
                    description: |
                      Node errno code when `ok` is false (e.g. EACCES,
                      ENOENT). Absent when `ok` is true.
                  message:
                    type: string
                    description: |
                      Underlying error message when `ok` is false. Absent
                      when `ok` is true.
        '400':
          description: Malformed body (path missing, empty, or too long)

  /api/books/{bookId}/backups:
    get:
      summary: List a book's state.json auto-backup snapshots
      operationId: listBookBackups
      description: |
        srv-2 — returns every on-disk backup snapshot of the book's
        `.audiobook/state.json`, newest first. Snapshots are written by the
        per-book auto-backup on the user's configured cadence (see
        UserSettings.backupCadence / backupRetention) and by an explicit
        "Back up now" request. Empty array when no snapshots exist yet.
      parameters:
        - in: path
          name: bookId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Snapshots newest-first
          content:
            application/json:
              schema:
                type: object
                required: [backups]
                properties:
                  backups:
                    type: array
                    items: { $ref: '#/components/schemas/BackupSnapshot' }

  /api/books/{bookId}/backups/now:
    post:
      summary: Take an immediate state.json backup snapshot
      operationId: backupBookNow
      description: |
        srv-2 — snapshots the book's current `.audiobook/state.json` on
        demand, independent of the auto-backup cadence, and prunes to the
        retention window. Returns the new snapshot filename.
      parameters:
        - in: path
          name: bookId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Snapshot taken
          content:
            application/json:
              schema:
                type: object
                required: [ok, file]
                properties:
                  ok: { type: boolean }
                  file: { type: string }
        '409':
          description: No state.json on disk to back up
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

  /api/books/{bookId}/backups/restore:
    post:
      summary: Restore a book's state.json from a backup snapshot
      operationId: restoreBookBackup
      description: |
        srv-2 — overwrites the book's current `.audiobook/state.json` with
        the contents of the named snapshot. The `backupFile` must be one of
        the filenames returned by GET /api/books/{bookId}/backups.
      parameters:
        - in: path
          name: bookId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [backupFile]
              properties:
                backupFile:
                  type: string
                  description: Filename of the snapshot to restore.
      responses:
        '200':
          description: Restored
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
        '400':
          description: Bad / unsafe backupFile name
        '404':
          description: Book or snapshot not found
        '409':
          description: Snapshot is corrupt / unparseable

  /api/workspace/changelog:
    get:
      summary: Aggregated change log across every book in the workspace
      operationId: getWorkspaceChangelog
      description: |
        Fans out `.audiobook/change-log.json` from every book in the workspace,
        attaches `bookId`, `bookTitle`, and `author` to each event, and returns
        a page of events sorted newest-first. Books without an on-disk
        change-log are skipped. Backs the global Change Log view.

        Pagination is cursor-based: pass `before` (the previous page's
        `nextCursor`) to fetch the next page. `totalCount` and
        `categoryCounts` always reflect the FULL workspace set, not just
        this page — the workspace Activity pills can show honest totals while
        the user scrolls through pages.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200, minimum: 1 }
          description: Page size. Defaults to 50; capped at 200.
        - in: query
          name: before
          schema: { type: string, format: date-time }
          description: |
            ISO timestamp cursor. Only events strictly older than this land
            in the page. Omit on the first request; pass `nextCursor` from
            the previous response thereafter.
      responses:
        '200':
          description: One page of workspace-wide editorial activity
          content:
            application/json:
              schema:
                type: object
                required: [events, nextCursor, totalCount, categoryCounts]
                properties:
                  events:
                    type: array
                    items: { $ref: '#/components/schemas/WorkspaceChangeLogEvent' }
                  nextCursor:
                    type: string
                    nullable: true
                    description: |
                      ISO timestamp of the last event in this page when more
                      events follow it; `null` when this page is the tail.
                  totalCount:
                    type: integer
                    description: Total events across the workspace (all pages).
                  categoryCounts:
                    type: object
                    required: [voice, generation, manuscript, cast]
                    properties:
                      voice: { type: integer }
                      generation: { type: integer }
                      manuscript: { type: integer }
                      cast: { type: integer }

  /api/library:
    get:
      summary: List books in the on-disk workspace
      operationId: getLibrary
      description: |
        Walks the workspace `books/<Author>/<Series>/<Book>/` tree and returns
        the grouped library used by the frontend's book-library view. Status
        per book is derived from the presence of `.audiobook/state.json`,
        `cast.json`, and the audio output count.
      responses:
        '200':
          description: Library tree grouped by author and series
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LibraryResponse' }

  /api/library/sync-manifest:
    get:
      summary: Two-level delta-sync manifest for the companion app (srv-32)
      operationId: getSyncManifest
      description: |
        The Android companion's delta-sync contract (srv-32, plan 191). One
        route, two modes:

        - **No `bookId`** → the INDEX: one lightweight row per book (book id +
          audio-aware `updatedAt` + cover ref + active-chapter count) plus the
          full `activeBookIds` set. `?since=<iso>` trims the `books` list to
          books changed after the cutoff but NEVER the `activeBookIds` set —
          that full set drives stateless client-side eviction (a filesystem
          scan has no tombstones for deleted books).
        - **`?bookId=<id>`** → the per-book DETAIL: that book's chapters keyed
          by the stable `uuid` (srv-35), each with a `fingerprint`
          (`audioRenderedAt` + file size — moves on every audio mutation), the
          actual `urlSuffix`/`audioUrl` (`.mp3`/`.m4a`/`.ogg`), and
          `durationSec`/`lufs` hints, plus the full `activeChapterUuids` set.

        The response is gzip-compressed when the client sends
        `Accept-Encoding: gzip`. Compatibility is gated off the
        `schemas.syncManifest` version in `GET /api/info`.
      parameters:
        - name: bookId
          in: query
          required: false
          schema: { type: string }
          description: When present, returns that book's per-chapter detail instead of the index.
        - name: since
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: Index only — omit books whose `updatedAt` is at or before this ISO timestamp.
      responses:
        '200':
          description: The sync-manifest index, or a per-book detail when `bookId` is supplied.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SyncManifestIndex'
                  - $ref: '#/components/schemas/SyncManifestBookDetail'
        '404':
          description: The requested `bookId` does not exist.

  /api/import:
    post:
      summary: Parse a manuscript and stage it for confirmation
      operationId: importManuscript
      description: |
        Parse-only: returns the parsed text plus best-effort author/series/title
        metadata, and stashes the result in memory under a short tempId. Nothing
        is written to disk. The frontend then renders a confirm-metadata form;
        on submit, POST /api/books drains the staging entry into the workspace.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
                fileName: { type: string }
      responses:
        '200':
          description: Parsed candidate ready for confirmation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportResponse' }
        '415':
          description: Unsupported manuscript format

  /api/books:
    post:
      summary: Confirm metadata and write a book into the workspace
      operationId: confirmBook
      description: |
        Drains the staged import identified by `tempId`, writes
        `manuscript.<ext>` and `.audiobook/state.json` into
        `books/<Author>/<Series>/<Title>/`, and returns the resulting bookId +
        manuscriptId. Returns 409 with a `suggestedTitle` if a book with the
        same slug already exists.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConfirmBookRequest' }
      responses:
        '201':
          description: Book saved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfirmBookResponse' }
        '400':
          description: Missing required fields
        '409':
          description: A book with this slug already exists on disk
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, example: 'slug_collision' }
                  suggestedTitle: { type: string }
        '410':
          description: Import tempId expired or already consumed

  /api/manuscripts:
    post:
      summary: Upload a manuscript
      operationId: uploadManuscript
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                title: { type: string, description: 'Optional override title.' }
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                title: { type: string }
                text: { type: string, description: 'Inline manuscript text (markdown or plain).' }
      responses:
        '200':
          description: Manuscript accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadResponse' }
        '415':
          description: Unsupported manuscript format (e.g. unparseable EPUB/DOCX)

  /api/manuscripts/{manuscriptId}/analysis:
    post:
      summary: Run cast + chapter analysis
      operationId: analyseManuscript
      description: |
        Streams phase progress over Server-Sent Events while the analysis
        runs. The final SSE event carries the full `AnalyseResponse`.
      parameters:
        - { in: path, name: manuscriptId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Final analysis payload (also delivered as the terminal SSE event)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AnalyseResponse' }
            text/event-stream:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AnalysePhaseEvent'
                  - $ref: '#/components/schemas/AnalyseResponse'

  /api/manuscripts/{manuscriptId}/analysis/chapters:
    post:
      summary: Re-run analysis for a subset of chapters
      operationId: analyseChapterSubset
      description: |
        Runs Phase 0a (cast detection) + Phase 1 (sentence attribution)
        for the listed chapter ids only, merging into the existing roster
        and analysis cache without re-doing the whole book. Used when the
        user un-excludes a chapter that was excluded at confirm time.
      parameters:
        - { in: path, name: manuscriptId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chapterIds]
              properties:
                chapterIds:
                  type: array
                  items: { type: integer }
                  description: 'Chapter ids to re-run analysis for. Must reference chapters already in the manuscript record.'
                model:
                  {
                    type: string,
                    description: 'Optional model id override (matches the full-book endpoint).',
                  }
      responses:
        '200':
          description: SSE stream identical in shape to the full-book analysis route.
          content:
            text/event-stream:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AnalysePhaseEvent'
                  - $ref: '#/components/schemas/AnalyseResponse'

  /api/books/{bookId}/chapters/{chapterId}/exclude:
    post:
      summary: Toggle the excluded flag on a single chapter
      operationId: setChapterExcluded
      description: |
        Updates state.json atomically and propagates the flag into the
        in-memory ManuscriptRecord so subsequent analysis/generation
        passes honour it. When `excluded` becomes true, any existing
        audio output for the chapter is deleted; when it becomes false
        the chapter is eligible for analysis-subset + audio generation
        again.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
        - { in: path, name: chapterId, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [excluded]
              properties:
                excluded: { type: boolean }
      responses:
        '200':
          description: Updated chapter entry from state.json
          content:
            application/json:
              schema:
                type: object
                required: [id, title, slug, excluded]
                properties:
                  id: { type: integer }
                  title: { type: string }
                  slug: { type: string }
                  excluded: { type: boolean }
        '404':
          description: Book or chapter not found

  /api/books/{bookId}/chapters/{chapterId}/rename:
    post:
      summary: Override a chapter's title with a user-supplied label
      operationId: renameChapter
      description: |
        Sets `state.chapters[chapterId-1].title` to the supplied value and
        flips `titleOverridden` to true so subsequent heuristic refresh
        passes (`refreshChapterTitles` on book-state GET, and the
        explicit POST `/chapters/refresh-titles`) leave it alone.
        Writes state.json atomically; holds the per-book write lock.
        Pure label mutation — does not touch sentence ids, slugs, audio
        files, or analysis cache.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
        - { in: path, name: chapterId, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 200
                  description: 'New chapter title. Server trims surrounding whitespace; rejects empty / whitespace-only / >200-char values with 400.'
      responses:
        '200':
          description: Updated chapter entry from state.json
          content:
            application/json:
              schema:
                type: object
                required: [id, title, slug, titleOverridden]
                properties:
                  id: { type: integer }
                  title: { type: string }
                  slug: { type: string }
                  titleOverridden: { type: boolean }
        '400':
          description: 'Bad request (empty / whitespace-only / oversized title)'
        '404':
          description: Book or chapter not found

  /api/books/{bookId}/chapters/merge:
    post:
      summary: Merge two or more contiguous chapters into one
      operationId: mergeChapters
      description: |
        Concatenates the chapter bodies (joined by `\n\n`), preserves all
        sentence attribution (text + characterId + voice assignment) by
        rewriting `chapterId` pointers and renumbering per-chapter
        sentence ids, and deletes audio for the merged chapter (content
        changed → must regenerate). Chapters below the merge are
        renumbered down; their audio files are renamed to match the new
        slugs (content unchanged, no regen needed).

        Pure remap — no Phase 1 re-analysis is triggered. See
        `docs/features/archive/51-restructure-chapters.md`.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chapterIds]
              properties:
                chapterIds:
                  type: array
                  items: { type: integer }
                  minItems: 2
                  description: 'IDs of contiguous chapters to merge (≥ 2). Server rejects non-contiguous selections with 400.'
                mergedTitle:
                  type: string
                  description: 'Optional override for the merged chapter title. Defaults to the first member''s title.'
      responses:
        '200':
          description: New chapter list + sentence remap table
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChapterRestructureResponse' }
        '400': { description: 'Bad request (e.g. non-contiguous ids, fewer than 2 ids)' }
        '404': { description: Book or chapter not found }

  /api/books/{bookId}/chapters/split:
    post:
      summary: Split a chapter into two at a sentence boundary
      operationId: splitChapter
      description: |
        Sentence `afterSentenceId` and everything before it stays in the
        original chapter; the remainder moves to a new chapter inserted
        immediately after. Chapter body is split at the byte offset
        matching the end of sentence `afterSentenceId`, snapped to the
        next paragraph break.

        Audio for the source chapter is deleted (content changed →
        regenerate); the new chapter has no prior audio; chapters below
        the split are renumbered up by 1 and their audio renamed.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chapterId, afterSentenceId]
              properties:
                chapterId: { type: integer }
                afterSentenceId:
                  type: integer
                  description: 'Sentence id (per-chapter) after which to split. Cannot be the last sentence — second half would be empty.'
                newTitle:
                  type: string
                  description: 'Optional title for the new (second-half) chapter. Defaults to `"<original> (cont.)"`.'
      responses:
        '200':
          description: New chapter list + sentence remap table
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChapterRestructureResponse' }
        '400': { description: 'Bad request (e.g. split after last sentence)' }
        '404': { description: Book, chapter, or sentence not found }

  /api/books/{bookId}/chapters/reorder:
    post:
      summary: Reorder all chapters into a new sequence
      operationId: reorderChapters
      description: |
        Reassigns chapter ids 1..N in the requested order. Chapter bodies
        and per-chapter sentence ids are unchanged; sentence `chapterId`
        pointers are remapped to match the new positions. Audio files
        are renamed to the new slugs (two-pass via temp name to avoid
        collisions on permutations). No audio is deleted.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order]
              properties:
                order:
                  type: array
                  items: { type: integer }
                  description: 'Permutation of current chapter ids in new desired order.'
      responses:
        '200':
          description: New chapter list + sentence remap table
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChapterRestructureResponse' }
        '400': { description: 'Bad request (e.g. order length mismatch, duplicate or unknown ids)' }
        '404': { description: Book not found }

  /api/books/{bookId}/cover/candidates:
    get:
      summary: List cover candidates (OpenLibrary + Apple Books + Google Books)
      operationId: getCoverCandidates
      description: |
        Searches OpenLibrary, Apple Books, and Google Books and returns up to
        6 deduped cover candidates. Powers the "Find cover image" modal on the
        library card + Listen header. Per-source errors are swallowed; the
        aggregate always returns whatever succeeded.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Candidate list (may be empty when no source has a match)
          content:
            application/json:
              schema:
                type: object
                required: [candidates]
                properties:
                  candidates:
                    type: array
                    items: { $ref: '#/components/schemas/CoverCandidate' }
        '404': { description: Book not found }

  /api/books/{bookId}/cover:
    get:
      summary: Stream the cached cover image bytes
      operationId: getCover
      description: |
        Serves the JPEG bytes for the book's currently-selected cover
        (`<bookDir>/.audiobook/cover.jpg`). Cached for an hour
        (`Cache-Control: public, max-age=3600`). Returns 404 when no
        cover is on disk — clients fall back to `coverGradient`.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      responses:
        '200':
          description: JPEG bytes
          content:
            image/jpeg:
              schema: { type: string, format: binary }
        '404': { description: Book has no cached cover }
    post:
      summary: Download and pin one of the OpenLibrary candidates as this book's cover
      operationId: setCover
      description: |
        Re-runs the candidate's source search to re-locate it by `candidateId`,
        downloads the JPEG to `<bookDir>/.audiobook/cover.jpg`, and patches
        `coverImage` onto state.json so the next library scan exposes
        `coverImageUrl`.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [candidateId]
              properties:
                candidateId:
                  type: string
                  description: 'Composite id from `CoverCandidate.id` (e.g. `openlibrary:48006`).'
      responses:
        '200':
          description: Cover saved
          content:
            application/json:
              schema:
                type: object
                required: [coverImageUrl]
                properties:
                  coverImageUrl: { type: string, format: uri-reference }
        '400': { description: Missing or malformed candidateId }
        '404':
          { description: Book not found OR candidate no longer in the live OpenLibrary result set }
        '502':
          description: OpenLibrary unreachable, timed out, oversized, or returned a non-image response
    delete:
      summary: Remove the cached cover and revert to the procedural gradient
      operationId: deleteCover
      description: |
        Removes `<bookDir>/.audiobook/cover.jpg` and clears the
        `coverImage` field from state.json. Idempotent — succeeds even
        when no cover exists.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      responses:
        '204': { description: Cover removed (or was never present) }
        '404': { description: Book not found }

  /api/books/{bookId}/cover/upload:
    post:
      summary: Upload a local cover image (JPEG/PNG) and pin it as this book's cover
      operationId: uploadCover
      description: |
        Multipart upload route for user-supplied cover art. Accepts a
        single `image` field with `image/jpeg` or `image/png` content
        type, up to 10 MB. PNG payloads are transcoded server-side to
        JPEG (q=85) so the export pipeline's `covr` / `APIC` frames
        stay JPEG. Writes atomically to `<bookDir>/.audiobook/cover.jpg`,
        replacing any prior cover, and patches `state.json.coverImage`
        with `source: 'local'`, `originalFilename`, and `uploadedAt`.
        Plan [40](docs/features/archive/40-cover-framing-and-upload.md).
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Cover saved
          content:
            application/json:
              schema:
                type: object
                required: [coverImageUrl]
                properties:
                  coverImageUrl: { type: string, format: uri-reference }
                  originalFilename: { type: string, nullable: true }
        '400': { description: Missing `image` field }
        '404': { description: Book not found }
        '413': { description: Upload exceeds 10 MB }
        '415': { description: Content type is not `image/jpeg` or `image/png` }
        '502': { description: PNG → JPEG transcode failed }

  /api/books/{bookId}/cover/framing:
    patch:
      summary: Set pan + zoom framing for the book's current cover
      operationId: setCoverFraming
      description: |
        Persists a `CoverFraming` record onto `state.json.coverImage`,
        which the next library scan exposes as `LibraryBook.coverFraming`.
        Render-time only — does not modify the on-disk JPEG bytes, so the
        export pipeline is unaffected. Server clamps `offsetX`/`offsetY`
        to [-100, 100] and `zoom` to [1.0, 3.0]. To reset framing to
        defaults, PATCH `{ offsetX: 0, offsetY: 0, zoom: 1.0 }`.
        Plan [40](docs/features/archive/40-cover-framing-and-upload.md).
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CoverFraming' }
      responses:
        '204': { description: Framing saved }
        '400': { description: Body is missing fields or contains non-numeric values }
        '404': { description: Book not found, or book has no cover pinned }

  /api/books/{bookId}/listen-progress:
    get:
      summary: Read the per-book resume bookmark
      operationId: getListenProgress
      description: |
        Returns `{ chapterId, currentSec, updatedAt }` for the last
        chapter the user listened to in this book, or `null` if no
        listening session has been recorded yet. Backed by a sibling
        `listen-progress.json` next to `state.json` so the
        schema-versioning shape from plan 27 stays stable. Plan
        [47](docs/features/archive/47-listen-progress.md).
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Listen-progress record, or null when no session has been recorded
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ListenProgress'
                  - type: 'null'
        '404': { description: Book not found }
    put:
      summary: Stamp the per-book resume bookmark
      operationId: putListenProgress
      description: |
        Persist `{ chapterId, currentSec }` for this book. The server
        stamps `updatedAt = new Date().toISOString()` unless the caller
        supplies `listenedAt` (srv-34 / plan 188), in which case that
        client wall-clock time is used instead and a **guarded
        compare-and-set** applies: the write is committed only if
        `listenedAt` is strictly newer than the stored record, otherwise
        the existing (newer) record is returned unchanged so the client
        reconciles. Writes via `writeJsonAtomic` to
        `listen-progress.json` (no backup rotation — the file is cheap to
        re-derive on loss, unlike `state.json`). Called debounced from the
        mini-player's `onTimeUpdate` (once per 5 s) plus one final flush on
        chapter switch / close. Plan
        [47](docs/features/archive/47-listen-progress.md).
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chapterId, currentSec]
              properties:
                chapterId: { type: integer, minimum: 0 }
                currentSec: { type: number, minimum: 0 }
                playbackRate:
                  type: number
                  minimum: 0.25
                  maximum: 4.0
                  description: |
                    Plan 53 — per-book playback rate
                    (`HTMLMediaElement.playbackRate`). Optional; absent on
                    pre-plan-53 records. Server validates 0.25 <= rate <= 4.0
                    so a malformed PUT can't poison the on-disk JSON.
                markers:
                  type: array
                  description: |
                    Plan 53 — user-placed bookmarks. Optional; absent on
                    pre-plan-53 records. Each marker carries a label + kind
                    so the listen-view sidebar can group "general notes"
                    from "re-record" flags.
                  items: { $ref: '#/components/schemas/ListenMarker' }
                listenedAt:
                  type: string
                  format: date-time
                  description: |
                    srv-34 (plan 188) — optional client wall-clock time the
                    user actually listened. When present it stamps
                    `updatedAt` instead of receive-time and gates a guarded
                    compare-and-set (the write is rejected if not strictly
                    newer than the stored record). Lets an offline client
                    (the Android companion) flush in-car progress on
                    reconnect without clobbering a newer position made
                    elsewhere. Rejected (400) if non-date or absurdly future.
      responses:
        '200':
          description: The saved record (or, on a guard-rejected stale write, the existing newer record), with updatedAt = the client listenedAt when supplied
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListenProgress' }
        '400': { description: Body missing chapterId or currentSec, or contains non-numeric values, or contains a marker with an unrecognised kind }
        '404': { description: Book not found }

  /api/voices/base:
    get:
      summary: List the raw model voices the configured engines expose
      operationId: getBaseVoices
      description: |
        Returns the catalog of unmodified model voices available across every
        supported TTS engine, used both by the Voices view's "Base voices"
        tab and by the per-cast voice-override picker in the Profile Drawer.

        For `coqui`, the list is read from the live sidecar `GET /speakers`
        — entries reflect whatever XTTS v2's `speaker_manager` actually
        publishes today (the sidecar tolerates `name_to_id` / `speaker_names`
        API drift). If the sidecar is unreachable, the coqui section is
        empty rather than failing the whole call.

        For `gemini`, `piper`, `kokoro`, the list comes from the
        engine-specific static constants in `server/src/tts/voice-mapping.ts`
        — these engines either ship fixed voice catalogs or aren't installed
        locally, so they don't depend on a running sidecar.
      responses:
        '200':
          description: Merged base-voice catalog across all engines
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BaseVoiceCatalog' }

  /api/voices/{voiceId}/sample:
    post:
      summary: Synthesise a ~12-second voice preview
      operationId: getVoiceSample
      description: |
        Renders a short sample of the voice via the configured TTS provider
        (free-tier Gemini). The server caches the MP3 on disk keyed by
        `voiceId` + `modelKey`; subsequent requests with the same key return
        immediately with `cached: true`. The frontend plays the URL with a
        plain `<audio>` element.

        When `rawEngine` + `rawSpeaker` are provided, the picker is
        bypassed and the named speaker is synthesised directly. This is
        what powers the "Base voices" tab and the family-header Play
        buttons — the voiceId in the path is treated as a cache scope
        (`raw-<engine>-<speaker>`) so unused base voices can still cache
        without piggy-backing on a real Voice id.
      parameters:
        - { in: path, name: voiceId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VoiceSampleRequest' }
      responses:
        '200':
          description: Sample is ready (either cached or freshly synthesised)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceSample' }
        '400':
          description: Invalid model key
        '429':
          description: Upstream TTS provider is rate-limited
        '502':
          description: Upstream TTS provider failed

  /api/books/{bookId}/voice-match:
    post:
      summary: Match characters to existing library voices
      operationId: matchVoices
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [characters]
              properties:
                characters:
                  type: array
                  items: { $ref: '#/components/schemas/CharacterMatchInput' }
                libraryVoiceIds:
                  type: array
                  items: { type: string }
                  description: Restrict candidates to a subset of the user's library.
      responses:
        '200':
          description: Match candidates per character
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceMatchResponse' }

  /api/queue:
    get:
      summary: Read the workspace-level chapter-generation queue
      operationId: getQueue
      description: |
        Single-file workspace queue persisted to `<workspace>/.queue.json`.
        Aggregated across all books — entries from different books interleave
        based on `order`. Drains FIFO, one entry at a time. Read on app cold
        boot to restore the queue across reloads. See plan
        `docs/features/archive/102-global-queue-modal.md`.
      responses:
        '200':
          description: Queue snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueueListResponse' }

  /api/queue/enqueue:
    post:
      summary: Append entries to the workspace queue
      operationId: enqueueQueueEntries
      description: |
        Appends one or more entries to the bottom of the queue. The frontend
        pre-expands `scope: 'forward'` (regenerate chapter N + all subsequent)
        into per-chapter ids before posting, so this route only sees scoped
        entries that map 1:1 to a chapter id.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QueueEnqueueRequest' }
      responses:
        '200':
          description: Resulting queue snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueueListResponse' }

  /api/queue/reorder:
    post:
      summary: Reorder the workspace queue (excluding the in-flight pinned entry)
      operationId: reorderQueue
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QueueReorderRequest' }
      responses:
        '200':
          description: Resulting queue snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueueListResponse' }
        '409':
          description: Order list doesn't match current non-pinned entries (e.g. stale view after a concurrent enqueue).

  /api/queue/pause:
    post:
      summary: Toggle queue-global pause
      operationId: setQueuePaused
      description: |
        Sets the queue-global `paused` flag. When true, the dispatcher waits
        at the next chapter boundary — the currently in-flight chapter runs
        to completion, then the queue stops. Resume by POSTing `{ paused:
        false }`. Persists to `<workspace>/.queue.json`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paused]
              properties:
                paused: { type: boolean }
      responses:
        '200':
          description: Resulting queue snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueueListResponse' }

  /api/queue/clear:
    post:
      summary: Bulk-clear the queue
      operationId: clearQueue
      description: |
        Removes entries in bulk. With `{ force: false }` (the default) drops
        every `queued` and `failed` entry but leaves `in_progress` ones running
        to completion — a clean pending list without aborting work. With
        `{ force: true }` drops everything, including `in_progress`; the caller
        pairs this with a stream teardown so the live generation actually stops.
        Leaves the `paused` flag untouched. Persists to `<workspace>/.queue.json`.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  default: false
                  description: When true, also drop in_progress entries.
      responses:
        '200':
          description: Resulting queue snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueueListResponse' }

  /api/queue/{entryId}:
    delete:
      summary: Cancel (remove) a queued entry
      operationId: cancelQueueEntry
      description: |
        Removes the entry from the queue. Refuses with 409 if the entry is
        currently `in_progress` — the user must Pause first.
      parameters:
        - { in: path, name: entryId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Resulting queue snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueueListResponse' }
        '409':
          description: Entry is in_progress; pause the queue first.

  /api/queue/{entryId}/start:
    post:
      summary: Mark a queue entry in_progress (no reorder)
      operationId: startQueueEntry
      description: |
        Flips the entry's status to `in_progress` WITHOUT reordering. Under the
        queue-sole-concurrency model (one queue worker = one chapter) the
        dispatcher fires this the instant it claims an entry and opens that
        chapter's stream, so MULTIPLE entries can be `in_progress` at once —
        unlike the legacy single-in-flight `startEntry` mutator, this does not
        pin the entry to order 0 nor enforce a single-in-flight invariant. The
        queue modal renders every `in_progress` entry as "In flight".
        Idempotent (already-in_progress / missing id both 200). Persists to
        `<workspace>/.queue.json`.
      parameters:
        - { in: path, name: entryId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Resulting queue snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueueListResponse' }

  /api/queue/{entryId}/complete:
    post:
      summary: Drop a finished queue entry (done-prune)
      operationId: completeQueueEntry
      description: |
        Removes the entry from the queue regardless of status (the entry is
        `in_progress` when its chapter completes). The dispatcher's chapter-level
        reconcile fires this once a chapter's stream closes. Distinct from the
        user-facing DELETE, which 409s an `in_progress` entry so the modal's
        cancel button keeps its "pause first" guard. Idempotent for a missing id.
        Persists to `<workspace>/.queue.json`.
      parameters:
        - { in: path, name: entryId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Resulting queue snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueueListResponse' }

  /api/books/{bookId}/generation:
    post:
      summary: Generate chapter audio with progress streaming
      operationId: streamGeneration
      description: |
        Single long-running POST that streams generation progress as SSE
        events. Mirrors the analysis route shape (`POST /api/manuscripts/{id}/
        analysis`). Each `data: <json>` payload follows the GenerationTick
        schema. Synthesises chapters one at a time; per-chapter completion
        writes `audio/<chapterSlug>.mp3` + `audio/<chapterSlug>.segments.json`
        into the workspace book directory. On every new subscriber (cold
        connect AND post-reconnect during dev `tsx watch` restarts or
        production server bounce), the server emits a `resume_from` ack as
        the first event carrying the snapshot of completed chapter ids for
        the active queue entry so the reconnect doesn't replay. See plan
        `docs/features/archive/102-global-queue-modal.md`.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [modelKey]
              properties:
                modelKey:
                  type: string
                  enum: [kokoro-v1, qwen3-tts-0.6b, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
                  description: TTS model key. Local engines (kokoro-, coqui-) route to the sidecar; gemini-* keys route to Google's TTS API.
                chapterIds:
                  type: array
                  items: { type: integer }
                  description: Optional subset of chapters to (re)generate. Defaults to all chapters lacking an audio file.
                force:
                  type: boolean
                  description: Re-synthesise even if an audio file already exists on disk.
      responses:
        '200':
          description: Tick stream
          content:
            text/event-stream:
              schema: { $ref: '#/components/schemas/GenerationTick' }

  /api/books/{bookId}/chapters/{chapterId}/splice:
    post:
      summary: Per-character re-record / re-mix splice (fs-26)
      operationId: spliceChapter
      description: |
        Re-renders or re-mixes ONE character's segments in an already-rendered
        chapter and splices the result back into the chapter audio, instead of
        regenerating the whole chapter. Streams SSE `data: <json>` frames:
        `splice_start`, `chapter_assembling`, then `splice_complete` (or
        `chapter_failed`). Decodes the chapter audio, substitutes the target
        segments (a `volume` gain for `remix`, fresh synthesis for `rerecord`),
        re-runs the whole-chapter loudnorm so the splice is seamless, preserves
        the prior take as `.previous.*` (the A/B + rollback substrate), and
        updates `segments.json` + duration. A splice and a full regen of the
        same chapter mutually displace each other so they never race the files.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
        - { in: path, name: chapterId, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode, characterId]
              properties:
                mode:
                  type: string
                  enum: [remix, rerecord]
                  description: '`remix` applies a dB gain (no GPU — the fix for "too quiet"); `rerecord` re-synthesises the character''s sentences.'
                characterId:
                  type: string
                  description: The character whose segments in this chapter are re-mixed or re-recorded.
                gainDb:
                  type: number
                  description: 'remix only — signed dB gain applied to the character''s segments, clamped to [-24, +24].'
                segmentIndices:
                  type: array
                  items: { type: integer }
                  description: 'rerecord only — optional subset of the character''s segments to re-record; omitted = all of them.'
                modelKey:
                  type: string
                  enum: [kokoro-v1, qwen3-tts-0.6b, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
                  description: Required for rerecord — TTS model key to synthesise with.
      responses:
        '200':
          description: SSE splice progress + completion stream
          content:
            text/event-stream:
              schema:
                type: object
                description: 'A `data:` frame — one of splice_start / chapter_assembling / splice_complete / chapter_failed.'
                properties:
                  type: { type: string, enum: [splice_start, chapter_assembling, splice_complete, chapter_failed] }
                  chapterId: { type: integer }
                  characterId: { type: string }
                  mode: { type: string, enum: [remix, rerecord] }
                  durationSec: { type: number }
                  segmentCount: { type: integer }
                  hasPreviousAudio: { type: boolean }
                  progress: { type: number }
                  errorReason: { type: string }

  /api/books/{bookId}/chapters/{chapterId}/audio-qa-repair:
    post:
      summary: Scan an already-rendered chapter for bad sentences and re-record them (plan 179)
      operationId: audioQaRepairChapter
      description: |
        Runs the per-sentence audio-QA checks (dead/near-silent, a long internal
        silence run, duration drift vs the manuscript text) over each segment of
        an ALREADY-rendered chapter — the same checks the pre-assembly gate
        applies to new generations. Streams SSE `data: <json>` frames.

        `dryRun` (default `true`) returns the scan only — no GPU, no write,
        emitting `qa_scan` then `qa_repair_complete` with the `flagged` list.
        `dryRun: false` re-records the flagged sentences (best-of-N, re-QA'd)
        through the fs-26 splice engine, re-runs the whole-chapter loudnorm,
        preserves the prior take as `.previous.*`, and updates `segments.json` +
        duration. A repair and a full regen of the same chapter mutually displace
        each other so they never race the files.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
        - { in: path, name: chapterId, required: true, schema: { type: integer } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                dryRun:
                  type: boolean
                  default: true
                  description: 'When true (default) only scan and report `flagged`; no GPU, no write. False re-records the flagged sentences and re-splices.'
                modelKey:
                  type: string
                  enum: [kokoro-v1, qwen3-tts-0.6b, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
                  description: 'Re-record only — TTS model key to re-synthesise with. Defaults to the chapter''s own rendered model when omitted.'
                maxRerecords:
                  type: integer
                  description: 'Re-record only — max re-synthesis attempts per flagged sentence, keeping the best take. Defaults to SEG_QA_MAX_RERECORDS (2).'
      responses:
        '200':
          description: SSE QA scan + (optional) repair stream
          content:
            text/event-stream:
              schema:
                type: object
                description: 'A `data:` frame — one of qa_scan / splice_start / progress / chapter_assembling / qa_repair_complete / chapter_failed.'
                properties:
                  type: { type: string, enum: [qa_scan, splice_start, progress, chapter_assembling, qa_repair_complete, chapter_failed] }
                  chapterId: { type: integer }
                  dryRun: { type: boolean }
                  flaggedCount: { type: integer }
                  flagged:
                    type: array
                    description: Segments that failed the per-sentence QA scan.
                    items:
                      type: object
                      properties:
                        segmentIndex: { type: integer }
                        characterId: { type: string }
                        sentenceIds: { type: array, items: { type: integer } }
                        reasons: { type: array, items: { type: string } }
                  repaired: { type: array, items: { type: integer }, description: Segment indices that passed QA after re-recording. }
                  stillSuspect: { type: array, items: { type: integer }, description: Segment indices that stayed suspect after exhausting re-records. }
                  durationSec: { type: number }
                  segmentCount: { type: integer }
                  hasPreviousAudio: { type: boolean }
                  progress: { type: number }
                  errorReason: { type: string }

  /api/books/{bookId}/chapters/{chapterId}/audio:
    get:
      summary: Get a chapter's playable audio + waveform metadata
      operationId: getChapterAudio
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
        - { in: path, name: chapterId, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Chapter audio metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChapterAudio' }

  /api/books/{bookId}/chapters/{chapterId}/clip:
    get:
      summary: Slice a 30-second chapter clip as MP3 (no re-encode)
      operationId: getChapterClip
      description: |
        Stream a byte-sliced segment of the chapter MP3 to the caller as
        a downloadable file. The server runs `ffmpeg -ss <start> -i <mp3>
        -t <duration> -c copy` (fast-seek path, MP3-frame-granularity
        accuracy is sub-30 ms — ample for a 30 s social clip). Duration
        capped at 60 s for fair-use / viral-loop framing; longer ranges
        should download the whole chapter MP3.

        Response is `audio/mpeg` with `Content-Disposition: attachment;
        filename="<chapter-slug>-clip-<start>s.mp3"`.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
        - { in: path, name: chapterId, required: true, schema: { type: integer } }
        - in: query
          name: start
          required: true
          schema: { type: number, minimum: 0 }
          description: Clip start position, in seconds. Must be >= 0.
        - in: query
          name: duration
          required: true
          schema: { type: number, exclusiveMinimum: 0, maximum: 60 }
          description: Clip length, in seconds. Must be > 0 and <= 60.
      responses:
        '200':
          description: Sliced MP3 byte stream
          content:
            audio/mpeg:
              schema: { type: string, format: binary }
        '400':
          description: Invalid start / duration (negative, non-numeric, or duration > 60)
        '404':
          description: Book / chapter / chapter audio not found on disk
        '500':
          description: ffmpeg unavailable or slicing failed

  /api/books/{bookId}/chapters/{chapterId}/audio/previous:
    get:
      summary: Get the preserved prior chapter audio (for revision a/b audition)
      operationId: getChapterAudioPrevious
      description: |
        Returns the metadata for the chapter audio that was preserved when
        a regeneration replaced it. Same shape as `getChapterAudio`. The
        revision-diff player fetches both endpoints to drive its A vs B
        playback. 404 when no preserved pair exists (legacy chapters or
        first renders).
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
        - { in: path, name: chapterId, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Preserved chapter audio metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChapterAudio' }
        '404':
          description: No preserved audio for this chapter
    delete:
      summary: Accept the new render — discard the preserved prior audio
      operationId: acceptChapterRevision
      description: |
        Deletes `audio/<slug>.previous.mp3` and
        `audio/<slug>.previous.segments.json`. Idempotent: missing files
        are skipped. 404 only when no preserved pair existed to begin with.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
        - { in: path, name: chapterId, required: true, schema: { type: integer } }
      responses:
        '204':
          description: Preserved pair removed
        '404':
          description: No preserved audio to delete

  /api/books/{bookId}/chapters/{chapterId}/audio/previous/restore:
    post:
      summary: Reject the new render — restore the preserved prior audio
      operationId: rejectChapterRevision
      description: |
        Renames `audio/<slug>.previous.*` over the live names, clobbering
        the freshly-rendered audio. The user has chosen the prior take.
        409 when a generation is in flight for the book (the rename would
        race the write path).
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
        - { in: path, name: chapterId, required: true, schema: { type: integer } }
      responses:
        '204':
          description: Preserved pair restored over live names
        '404':
          description: No preserved audio to restore
        '409':
          description: Generation is in flight for this book — restore would race the write path

  /api/voices:
    get:
      summary: List voices derived from every confirmed cast in the workspace
      operationId: getVoices
      description: |
        Walks `books/<Author>/<Series>/<Book>/.audiobook/cast.json` for every
        book where `state.castConfirmed === true` and aggregates the characters
        into a deduplicated voice library. There is no separate voice store —
        a "voice" is the reusable identity of a previously-cast character. The
        `id` matches what the TTS layer hashes for prebuilt-voice picking, so
        cached samples at `/audio/voices/{id}-{modelKey}-{paramHash}.mp3`
        line up. The trailing hash captures the synthesis inputs so attribute
        edits in the profile drawer correctly bust the cache.
      parameters:
        - in: query
          name: currentBookId
          required: false
          schema: { type: string }
          description: 'When set, voices belonging to that book are tagged source=current.'
        - in: query
          name: engine
          required: false
          schema: { type: string, enum: [coqui, gemini, piper, kokoro] }
          description: "TTS engine whose voice catalog is used to populate each Voice.ttsVoice. Defaults to 'coqui' (the UI's default)."
      responses:
        '200':
          description: Derived voice library, pinned first then by usage descending
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VoiceLibraryResponse' }

  /api/voices/{voiceId}/pin:
    put:
      summary: Pin or unpin a voice in the workspace library
      operationId: setVoicePin
      description: |
        Toggles a workspace-level pin flag persisted to
        `audiobook-workspace/voices.json`. Pinned voices sort to the top of
        the library response so favourites stay at hand across books.
      parameters:
        - { in: path, name: voiceId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pinned]
              properties:
                pinned: { type: boolean }
      responses:
        '204':
          description: Pin flag updated
        '400':
          description: Missing or non-boolean `pinned` field

  /api/voices/{voiceId}/override:
    put:
      summary: Set or clear the manual base-voice override on a voice family
      operationId: setVoiceOverride
      description: |
        Writes a manual base-voice override into every cast.json character
        whose `voiceId` (or character id, when voiceId is absent) matches the
        path parameter. The same voiceId can recur across a series (the
        character is meant to be the same identity), so one PUT propagates to
        every confirmed-cast book that shares it. Pass `override: null` to
        clear.

        When the override's engine matches the project's active TTS engine,
        synthesis bypasses the attribute-driven picker (`pickVoiceForEngine`)
        and uses the named speaker directly. Cross-engine overrides are kept
        but ignored at synth time; the UI surfaces an "engine mismatch" badge.

        Scope (plan 108): the default `workspace` scope writes the override
        to every confirmed-cast book sharing the voiceId across the whole
        workspace (back-compat). Pass `scope: 'series'` + `bookId` to limit
        the write to the cast.json files of books in the same
        `(author, series)` as `bookId` — used by the Profile Drawer's
        per-character Qwen design flow so a bespoke voice propagates across
        that series only.
      parameters:
        - { in: path, name: voiceId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [override]
              properties:
                override:
                  oneOf:
                    - $ref: '#/components/schemas/BaseVoice'
                    - type: 'null'
                scope:
                  type: string
                  enum: [series, workspace]
                  description: |
                    Write scope. `workspace` (default) propagates across
                    every confirmed cast.json sharing the voiceId.
                    `series` limits the write to the `(author, series)` of
                    `bookId` (required when `scope: 'series'`).
                bookId:
                  type: string
                  description: |
                    Anchor book whose `(author, series)` defines the series
                    scope. Required when `scope: 'series'`; ignored otherwise.
      responses:
        '204':
          description: Override written (or cleared) on every matching cast.json entry
        '400':
          description: Body is missing or malformed (override must be a BaseVoice or null)
        '404':
          description: No character with that voiceId exists in any confirmed cast

  /api/books/{bookId}/revisions:
    get:
      summary: Pending A/B revisions + voice-drift events
      operationId: pollRevisions
      description: Polled every 30 s by the client, or pushed via the generation stream.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Outstanding revisions + drift events
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RevisionsResponse' }

  /api/books/{bookId}/exports:
    get:
      summary: List all export jobs for a book (newest-first)
      operationId: listBookExports
      description: |
        Returns every in-memory + rehydrated export job for the book,
        newest-first. Used by the Listen view to repopulate the export
        queue rail after a page reload so in-progress exports resume
        polling. Jobs that were mid-build when the server itself
        restarted have no manifest and are not returned.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Export jobs for this book
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/BookExportJob' }
        '404':
          description: Book not found
    post:
      summary: Build a sideloadable audiobook artifact (Phase A — MP3.ZIP)
      operationId: createBookExport
      description: |
        Packages a finished book's per-chapter MP3 files into a single
        zip archive (PocketBook Reader Android sideloads MP3.ZIP, the
        e-reader's audiobook app on every platform accepts it). The
        zip carries one MP3 per non-excluded chapter, two-digit-prefixed
        and ID3v2.4-tagged (TIT2, TALB, TPE1, TPE2, TRCK) so PocketBook
        sorts and labels them correctly. Chapter audio is copied byte-
        for-byte via `ffmpeg -c:a copy` — no re-encode of the existing
        LAME VBR V2 frames.

        Returns immediately with the freshly-created job; clients poll
        `getBookExport` for progress and follow `downloadUrl` once
        `status === 'done'`. With `destination: 'sync-folder'`, the
        finished archive is also copied to the user's configured
        `exportSyncFolder` via an atomic tmp+rename (same OneDrive-safe
        backoff as state.json). Refuses with `409 export_incomplete`
        when any non-excluded chapter lacks an `.mp3` audio file.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BookExportRequest' }
      responses:
        '201':
          description: Export job created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BookExportJob' }
        '404':
          description: Book not found
        '409':
          description: One or more non-excluded chapters lack a `.mp3` audio file
          content:
            application/json:
              schema:
                type: object
                required: [error, missing]
                properties:
                  error: { type: string, enum: [export_incomplete] }
                  missing:
                    type: array
                    items: { type: string, description: 'Chapter slug or title' }

  /api/books/{bookId}/exports/{exportId}:
    get:
      summary: Poll the status of an in-flight or completed export
      operationId: getBookExport
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
        - { in: path, name: exportId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Current job state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BookExportJob' }
        '404':
          description: Job id unknown
    delete:
      summary: Cancel a running export
      operationId: cancelBookExport
      description: |
        Signals the running build to abort and flips the job to
        `cancelled`. Idempotent on already-terminal jobs (returns 204
        without touching state). Best-effort cleanup of the staging dir
        so partial artifacts don't leak.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
        - { in: path, name: exportId, required: true, schema: { type: string } }
      responses:
        '204':
          description: Cancel accepted (or job already terminal — idempotent)
        '404':
          description: Book or job id unknown

  /api/books/{bookId}/exports/{exportId}/download:
    get:
      summary: Stream the export archive bytes
      operationId: downloadBookExport
      description: |
        Range-aware `application/zip` (Phase A) or `audio/mp4`
        (Phase B M4B) stream. Phone Chrome can hit this URL directly
        over the LAN; the browser saves into Downloads/ and a tap
        opens it with PocketBook Reader.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
        - { in: path, name: exportId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Archive bytes
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '206':
          description: Partial content (Range request)
        '404':
          description: Job id unknown or staging file missing

  /api/companion/apk:
    get:
      summary: Download the packaged Castwright Companion Android APK (interim)
      operationId: downloadCompanionApk
      description: |
        Interim "third distribution method" for the companion app, alongside the
        (not-yet-live) Play Store / App Store buttons. Streams the packaged APK
        as an attachment (`application/vnd.android.package-archive`,
        `Content-Disposition: attachment`) when one has been dropped at the
        server's resolved location (the release zip bundles it at
        `<release>/companion/castwright-companion.apk`; override with
        `COMPANION_APK_PATH`). The Listen-tab "Download .apk" button HEAD-probes
        this route and renders only when it returns 200.
      responses:
        '200':
          description: APK bytes
          content:
            application/vnd.android.package-archive:
              schema: { type: string, format: binary }
        '404':
          description: No APK present at the resolved location

  /api/books/{bookId}/export/portable:
    get:
      summary: Stream the portable book bundle (plan 75)
      operationId: exportPortableBook
      description: |
        Plan 75 — returns a single `.zip` containing every artifact needed
        to re-create the book on another machine: `state.json` +
        manuscript file + every chapter's audio + cover image +
        change-log + a `MANIFEST.json` envelope with schemaVersion +
        hashes. Excludes the private `listen-progress.json` and any
        `.previous.*` rollback files.

        Internal layout:
        ```
        portable-book/
          MANIFEST.json
          state.json
          manuscript.<ext>
          cover.<ext>           (optional)
          change-log.json       (optional)
          audio/
            <slug>.mp3
            <slug>.peaks.json
            <slug>.segments.json
        ```

        Response `Content-Disposition` carries an `attachment` filename
        of `<book-title-slug>.portable.zip`. The bytes are
        byte-deterministic across runs for a fixed input (MANIFEST
        `exportedAt` aside).
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Zip bundle
          headers:
            Content-Disposition:
              schema: { type: string }
              description: 'attachment; filename="<slug>.portable.zip"'
          content:
            application/zip:
              schema: { type: string, format: binary }
        '404':
          description: Book not found
        '500':
          description: Build failed (manuscript missing, etc.)

  /api/import/portable:
    post:
      summary: Import a portable book bundle into the workspace (plan 75)
      operationId: importPortableBook
      description: |
        Accepts a `multipart/form-data` upload with a single `file`
        field carrying a `.zip` bundle produced by
        `GET /api/books/:bookId/export/portable`. The MANIFEST.json
        envelope must declare a `schemaVersion` this server understands
        (currently 1).

        Conflict handling (when a book directory already exists at the
        author/series/title path the bundle's state.json declares):

        - `rename`  (default) — appends ` (imported)` /
                                ` (imported 2)` etc. to the title until
                                the slug-based directory is free; the
                                imported bundle's state.json is rewritten
                                with the new title and bookId so the
                                library scan picks up a distinct entry.
        - `overwrite` — writes into the existing directory, preserving
                        files not in the bundle (e.g. the user's
                        listen-progress.json).
        - `fail`      — returns 409 without touching disk.

        Per-file atomic write: each entry lands in a `.tmp-<pid>-<ts>`
        sibling before being renamed over its final path.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Portable book bundle (.zip)
                onConflict:
                  type: string
                  enum: [rename, overwrite, fail]
                  default: rename
      responses:
        '201':
          description: Bundle imported
          content:
            application/json:
              schema:
                type: object
                required: [bookId, targetPath, importedFiles]
                properties:
                  bookId: { type: string }
                  targetPath: { type: string }
                  importedFiles: { type: integer }
                  conflict:
                    type: object
                    properties:
                      strategy: { type: string, enum: [rename, overwrite, fail] }
                      renamedTo: { type: string }
        '400':
          description: Bundle is malformed or missing required entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, enum: [invalid_bundle, missing_file] }
                  reason: { type: string }
                  message: { type: string }
        '409':
          description: Target directory already exists and onConflict='fail'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, enum: [bundle_conflict] }
                  existingPath: { type: string }
                  message: { type: string }

  /api/books/{bookId}/share:
    post:
      summary: Mint (or look up) a slugged share URL for the book
      operationId: createBookShareLink
      description: |
        Plan 67 — backs the Streaming-link tile on the Listen view.
        Generates a 12-char Crockford-style base32 slug and persists
        the slug → bookId mapping to
        `<workspace>/.audiobook/share-links.json` so restarts don't
        invalidate already-shared URLs. Idempotent: a second POST for
        a book that already has a slug returns the same `{ slug, url }`
        triple. The returned `url` is an absolute URL the caller can
        paste into a chat without rebuilding it on the frontend
        (honours `X-Forwarded-Proto` / `X-Forwarded-Host` when set by
        a reverse proxy).

        Casual share link, not a security token — slug entropy is
        ~60 bits (enough that two simultaneous users won't collide,
        not enough to resist a determined enumerator).
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      responses:
        '201':
          description: Slug minted (or returned from cache)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BookShareLink' }
        '404':
          description: Book not found

  /share/{slug}:
    get:
      summary: Public-facing M4B proxy for a share slug
      operationId: getBookShareDownload
      description: |
        Plan 67 — resolves the slug to the book's most-recent
        successful M4B export and streams the bytes. Mounted at the
        app root (not under `/api`) so the URL reads like a share link
        in a chat paste. Responses:
          - 200: streams `audio/mp4` (the M4B file) with a
            `Content-Disposition: attachment` header so a browser
            saves to Downloads/ on a click.
          - 404 `slug_not_found`: slug doesn't match the persisted
            table, or it doesn't match the strict regex.
          - 404 `book_not_found`: slug resolved but the book has
            been removed from the workspace.
          - 409 `no_m4b_ready`: book is on file but no M4B export
            has finished yet. Surfaces "Build an M4B first" rather
            than a misleading 404.
      parameters:
        - { in: path, name: slug, required: true, schema: { type: string } }
      responses:
        '200':
          description: M4B bytes
          content:
            audio/mp4:
              schema: { type: string, format: binary }
        '404':
          description: Slug or book not found
        '409':
          description: No M4B export ready for this book

  /api/gpu/queue:
    get:
      summary: GPU semaphore state for the top-bar pill
      operationId: getGpuQueueState
      description: |
        Returns the live state of the server's GpuSemaphore — the FIFO
        queue that serialises GPU-heavy operations (Ollama analyzer
        chat completions + sidecar /synthesize) so two parallel Claude
        Code sessions don't fight over VRAM on an 8 GB GPU.

        Polled by `useTtsLifecycle()` on the same 30 s cadence as
        `/api/sidecar/health`. When `depth > 0` the frontend prefixes
        the top-bar pill label with `"GPU busy · N waiting ·"` so the
        waiting session can see why it's not starting.

        `max` is the configured `GPU_CONCURRENCY` ceiling (default 1,
        configurable via server env var). `inFlight` is bounded by
        `max`; `depth` is the number of waiters queued behind. The
        endpoint is cheap (no I/O) and safe to poll.
      responses:
        '200':
          description: GPU queue state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GpuQueueState' }

  /api/generation/telemetry:
    get:
      summary: Per-run resource telemetry for the Admin trend panel (fs-20)
      operationId: getResourceTelemetry
      description: |
        Returns per-chapter resource telemetry — RTF + audio/wall seconds
        alongside the GPU (reserved/total VRAM) and host-RAM figures captured
        right after each chapter rendered — NEWEST-FIRST. Backs the Admin
        console's "Resource trends" panel so the operator can watch resource
        pressure climb across a long run (the slow creep that precedes a VRAM
        spill / host OOM). Best-effort store (workspace JSONL, capped); a read
        failure yields an empty list rather than a 500.
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1 }
          description: Cap the number of (newest-first) records returned.
      responses:
        '200':
          description: Per-run resource telemetry, newest-first
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ResourceTelemetryResponse' }

  /api/diagnostics:
    get:
      summary: One-shot health board for the Admin watch console (fs-18)
      operationId: getDiagnostics
      description: |
        Runs every operational health probe in one shot and returns a
        green/amber/red board: GPU + VRAM headroom, TTS sidecar reachability
        and resident models, analyzer (Ollama or Gemini) connectivity, ffmpeg
        and ffprobe presence, and free disk on the workspace volume.

        Consolidates the ad-hoc probes the operator otherwise runs by hand
        (`/api/sidecar/health`, `/api/ollama/health`, `nvidia-smi`). Powers the
        all-users Admin view (`src/views/admin.tsx`) and the top-bar status dot.
        Each check runs independently — a single failing probe yields a `fail`
        row, never a 500. Safe to poll (~30 s cadence). `overall` is the worst
        severity across the checks.
      responses:
        '200':
          description: Aggregated diagnostics board
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DiagnosticsResponse' }

  /api/export/lan:
    get:
      summary: Enumerate the server's reachable LAN URLs
      operationId: getExportLanUrls
      description: |
        Returns non-loopback IPv4 addresses the Node server is reachable
        on so the export modal can render a sideload URL + QR for the
        user's phone, and so the mobile + tablet support flow (plan 81)
        can render a "use the app on this URL" pill. Loopback (127.x)
        and link-local v6 (fe80::) are filtered out — they're useless
        for sideloading. Order matches `os.networkInterfaces()`
        enumeration; the modal picks the first.

        When LAN_HTTPS=1 is set on the server, the response's `protocol`
        field is `https` and `port` is 8443 (or LAN_HTTPS_PORT override).
        Otherwise `protocol` is `http` and `port` is 8080 (or PORT).
      responses:
        '200':
          description: LAN URL list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExportLanInfo' }

  /api/devices:
    get:
      summary: List paired companion devices (srv-33)
      operationId: listDevices
      description: |
        Per-device access tokens for the Android companion (srv-33), layered on
        srv-20's shared secret. Behind the LAN guard (only an authed or loopback
        caller). Returns device records WITHOUT any token material.
      responses:
        '200':
          description: Paired devices
          content:
            application/json:
              schema:
                type: object
                required: [devices]
                properties:
                  devices:
                    type: array
                    items: { $ref: '#/components/schemas/Device' }
    post:
      summary: Mint a new per-device token (returned once) (srv-33)
      operationId: createDevice
      description: |
        Generates a fresh, individually-revocable device token. The raw token is
        returned ONCE in this response (only its SHA-256 is persisted) — the
        caller must surface it to the user immediately.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                label: { type: string, description: 'Human label, e.g. the phone name.' }
      responses:
        '201':
          description: The created device plus its one-time raw token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Device'
                  - type: object
                    required: [token]
                    properties:
                      token:
                        type: string
                        description: 'Raw access token — shown once; only its hash is stored.'

  /api/devices/{id}:
    delete:
      summary: Revoke a paired device (srv-33)
      operationId: revokeDevice
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200':
          description: Revoked
          content:
            application/json:
              schema:
                type: object
                properties: { ok: { type: boolean } }
        '404': { description: Unknown device }

  /api/books/{bookId}/state:
    get:
      summary: Book-open hydrate composite (state + cast + manuscript meta + revisions + …)
      operationId: getBookState
      description: |
        The single payload the layout reads when a book is opened: `state.json`,
        the on-disk cast, lightweight manuscript meta, pending revisions/drift,
        completed-chapter slugs, per-chapter loudness, and (fe-16) the
        per-character render-time engine-fallback map. The full per-field shape
        is hand-modeled in `src/lib/types.ts:BookStateResponse`; the schema here
        enumerates the top-level keys and references the component schemas that
        exist, keeping `state` (`BookStateJson`) and the loose `Record` maps
        permissive rather than duplicating those large shapes.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Book-open composite
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BookStateResponse' }
        '404':
          description: Book not found

  /api/books/{bookId}/cast/{characterId}/not-linked-to:
    post:
      summary: Mark a cross-book duplicate pair as intentionally separate (plan 101)
      operationId: markNotLinkedTo
      description: |
        "These two cross-book characters look like duplicates to the voices-view
        detector, but they ARE intentionally separate people (e.g. teenage
        Wren vs adult Wren)." Writes a symmetric `notLinkedTo` pair to BOTH
        books' cast.json so the duplicate-candidate predicate stops surfacing
        the pair on either side. Cross-book only (same author + series, neither
        standalone); self-pair and same-book pairs are rejected. Idempotent — an
        already-present pair is a no-op on that side.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
        - { in: path, name: characterId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotLinkedToRequest' }
      responses:
        '200':
          description: The symmetric pair that was written
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotLinkedToResponse' }
        '400':
          description: Missing fields, self-pair, or same-book pair
        '404':
          description: Source/other book or character not found, or not a series-mate
        '409':
          description: Source or other book has no cast on disk yet
    delete:
      summary: Undo a "different on purpose" decision (fs-11)
      operationId: removeNotLinkedTo
      description: |
        Removes the symmetric `notLinkedTo` pair from BOTH books' cast.json so
        the voices-view duplicate detector starts surfacing the pair again. Same
        guards + body shape as the POST (cross-book only, series-mate scope,
        self-pair rejected). Fully idempotent: an absent pair on either side is a
        no-op for that side and the route still 200s.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
        - { in: path, name: characterId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotLinkedToRequest' }
      responses:
        '200':
          description: The symmetric pair that was removed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotLinkedToResponse' }
        '400':
          description: Missing fields, self-pair, or same-book pair
        '404':
          description: Source/other book or character not found, or not a series-mate
        '409':
          description: Source or other book has no cast on disk yet

  /api/books/{bookId}/annotate-emotion:
    post:
      summary: Emotion-only backfill pass (fs-33)
      operationId: annotateEmotion
      description: |
        Runs a lightweight LLM pass over the book's already-attributed sentences
        and streams a per-sentence delivery `emotion` over Server-Sent Events. It
        does NOT re-attribute — `characterId` is never changed. The client applies
        the streamed annotations to the manuscript store (fill-only-empty, so a
        hand-set emotion always wins) and persists them to manuscript-edits.json,
        which is the same path synth reads via rebuildCacheFromEdits. SSE event
        kinds: `phase`, `throttle`, `heartbeat`, `annotation`
        (`{ chapterId, annotations: [{ sentenceId, emotion }] }`), `chapter-failed`,
        `error` (`code: no_attribution | quota_exhausted`), and a terminal
        `result` (`{ done, annotatedChapters, totalAnnotations }`).
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  {
                    type: string,
                    description: 'Optional analyzer model id override (matches the analysis endpoints).',
                  }
      responses:
        '200':
          description: SSE stream of annotation/phase/result events.
          content:
            text/event-stream:
              schema: { type: object }
        '404':
          description: Book not found
        '409':
          description: Book has not been analysed yet

  /api/books/{bookId}/cast/{characterId}/emotion-variant/{emotion}:
    delete:
      summary: Remove a designed emotion variant (fs-34)
      operationId: deleteCharacterEmotionVariant
      description: |
        Drops `overrideTtsVoices.qwen.variants[emotion]` from cast.json and
        deletes the variant's `.pt` + `.json` on disk, leaving the base voice and
        every sibling variant intact. An empty `variants` map is cleaned up so the
        Variants badge clears. Idempotent — removing an absent variant still 200s.
      parameters:
        - { in: path, name: bookId, required: true, schema: { type: string } }
        - { in: path, name: characterId, required: true, schema: { type: string } }
        - in: path
          name: emotion
          required: true
          schema: { type: string, enum: [whisper, angry, excited, sad] }
      responses:
        '200':
          description: Variant removed (or was already absent)
          content:
            application/json:
              schema:
                type: object
                required: [ok, removed]
                properties:
                  ok: { type: boolean }
                  removed: { type: string, enum: [whisper, angry, excited, sad] }
        '400':
          description: emotion is not one of whisper/angry/excited/sad
        '404':
          description: Book or character not found

# ---------------------------------------------------------------------
# Schemas
# ---------------------------------------------------------------------
components:
  schemas:
    # --- User settings ----------------------------------------------
    BackupSnapshot:
      type: object
      description: |
        srv-2 — one auto-backup snapshot of a book's state.json. Returned
        by GET /api/books/{bookId}/backups, newest first.
      required: [file, sizeBytes, createdAt]
      properties:
        file:
          type: string
          description: Snapshot filename (within the book's backup dir).
        sizeBytes:
          type: integer
          description: Size of the snapshot file in bytes.
        createdAt:
          type: string
          format: date-time
          description: ISO timestamp the snapshot was written.

    UserSettings:
      type: object
      required:
        - displayName
        - defaultAnalysisModel
        - defaultTtsEngine
        - defaultTtsModelKey
        - sidecarUrl
        - analysisEngine
        - ollamaUrl
        - minorCastMinLines
        - apiKeyStatus
        - workspaceRoot
        - workspaceSource
      properties:
        displayName:
          type: string
          description: |
            Free-text name shown in the top-bar avatar and used as the
            author of editorial actions in the change log. Seeded to a
            placeholder on first run; user can edit any time.
        defaultAnalysisModel:
          type: string
          description: |
            Analysis model id from src/lib/models.ts MODEL_OPTIONS. Used as
            the initial value of ui.selectedModel when a book has no
            persisted analysis-model choice (seed-only; per-book picks win
            after).
        defaultTtsEngine:
          type: string
          enum: [local, gemini]
          description: |
            Frontend engine group from src/lib/tts-models.ts (TtsEngineId).
            Used to filter the model dropdown's initial state.
        defaultTtsModelKey:
          type: string
          enum: [kokoro-v1, qwen3-tts-0.6b, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
          description: |
            STORED TTS model key from src/lib/tts-models.ts — what the Account
            picker shows and round-trips. Default for new accounts is
            `kokoro-v1`. The EFFECTIVE engine the session seeds from is
            `resolvedTtsModelKey` (Qwen-when-installed) — do NOT seed from this
            field directly.
        defaultTtsModelKeyExplicit:
          type: boolean
          description: |
            True once the user has DELIBERATELY chosen their default TTS model
            (set automatically server-side when a PUT changes
            `defaultTtsModelKey`). When false/undefined the server is free to
            resolve the default to Qwen if it's installed; an explicit choice
            is always honoured verbatim. Optional so legacy settings load
            unchanged.
        resolvedTtsModelKey:
          type: string
          enum: [kokoro-v1, qwen3-tts-0.6b, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
          description: |
            READ-ONLY effective default after the Qwen-when-installed
            resolution: equals `defaultTtsModelKey` when the user made an
            explicit choice, else `qwen3-tts-0.6b` when Qwen is installed, else
            `kokoro-v1`. The frontend seeds `ui.ttsModelKey` from THIS so a box
            with Qwen installed defaults to bespoke voices without mutating the
            stored key.
        sidecarUrl:
          type: string
          description: |
            Overrides the LOCAL_TTS_URL env var. Re-read on every request
            by the sidecar provider + health probe.
        analysisEngine:
          type: string
          enum: [local, gemini]
          description: |
            Analyzer dispatch. `local` routes through OllamaAnalyzer (with
            Gemini as automatic fallback iff GEMINI_API_KEY is set AND the
            local daemon is unreachable). `gemini` always goes direct.
            See server/src/analyzer/index.ts selectAnalyzer.
        ollamaUrl:
          type: string
          description: |
            Base URL of the local Ollama daemon. Falls through to OLLAMA_URL
            env then http://localhost:11434 in the server resolver. Re-read
            on every analysis request, like sidecarUrl. The Ollama *model*
            tag is not stored separately — `defaultAnalysisModel` doubles
            as the Ollama tag when it has Ollama shape (contains ':').
        workspaceDirOverride:
          type: string
          nullable: true
          description: |
            Optional override for the WORKSPACE_DIR env var. Read once at
            server startup — changes require a server restart to apply
            (UI flags this with a "restart required" badge).
        exportSyncFolder:
          type: string
          nullable: true
          description: |
            Optional destination folder the audiobook-export pipeline copies
            finished files into (e.g. a OneDrive or Syncthing watch path
            mirrored to the user's phone). Null disables the "save to sync
            folder" tab in the export modal. The writer mkdirs on demand
            and uses the same OneDrive-safe atomic-rename retry as state.json.
        minorCastMinLines:
          type: integer
          minimum: 0
          maximum: 50
          description: |
            Threshold for the minor-cast fold pass at analysis time. A
            character whose number of attributed sentences (not words —
            each sentence the model assigns to that speaker counts as one
            "line", same as the count shown on the cast roster) is BELOW
            this number gets folded into the generic `Unknown male` /
            `Unknown female` bucket. Set to 0 to disable the line-count
            trigger entirely (only characters whose name begins with
            "Unknown" will still fold). Default 3 — i.e. a speaker who
            says 0, 1, or 2 sentences in the whole book doesn't warrant a
            dedicated voice profile.
        coverPickerDefaultTab:
          type: string
          enum: [search, upload]
          description: |
            Which tab the CoverPicker modal opens on by default. `search`
            (the default) preserves today's behaviour: OpenLibrary
            candidates first. `upload` is for users who routinely bring
            their own cover art and want the file-picker tab front.
            Plan [40](docs/features/archive/40-cover-framing-and-upload.md).
        defaultThemePreference:
          type: string
          enum: [light, dark, system]
          description: |
            First-visit / account-wide default theme. The top-bar quick
            toggle writes a per-device override into the UI slice
            (redux-persist); this field is the fallback when no override
            is set, and what any new device inherits. `system` resolves
            via `prefers-color-scheme` at runtime and re-evaluates if
            the OS scheme flips.
            Plan [41](docs/features/archive/42-dark-mode.md).
        autoStartSidecar:
          type: boolean
          description: |
            When true (default), the Node server spawns the Python TTS
            sidecar as a child process at app.listen time, with
            `PRELOAD_COQUI=1` propagated iff `defaultTtsModelKey` is
            `coqui-xtts-v2`. When false, the user manages the sidecar
            themselves (e.g. `npm run tts:sidecar` in a second terminal)
            and the Node server still serves requests over a red
            /api/sidecar/health until they do.
            Plan [43](docs/features/archive/43-auto-start-sidecar.md).
        analyzerPhase0Model:
          type: string
          nullable: true
          description: |
            Plan 88 phase-2 — optional override for Phase 0 (cast
            detection) analyzer model. When `null`, falls through to the
            `ANALYZER_PHASE0_MODEL` env var, then opts.model, then the
            hardcoded default (`gemma-4-31b-it`). When set, MUST be one
            of the ids from src/lib/models.ts MODEL_OPTIONS. Env var
            still wins so ops can override at the process boundary for
            triage; per-request `opts.model` then wins over user-settings.
            See [docs/features/archive/88-analyzer-per-phase-model.md].
        analyzerPhase1Model:
          type: string
          nullable: true
          description: |
            Plan 88 phase-2 — optional override for Phase 1 (attribution)
            analyzer model. Same precedence as `analyzerPhase0Model`:
            env > opts.model > user-settings > hardcoded default
            (`gemini-3.1-flash-lite`).
        analyzerPhase1MinLagChapters:
          type: integer
          minimum: 0
          maximum: 50
          nullable: true
          description: |
            Plan 88 phase-2 — minimum chapter lag between Phase 0 cast
            detection and Phase 1 attribution. `null` falls through to
            `ANALYZER_PHASE1_MIN_LAG_CHAPTERS` env then the default
            (`10`). `0` releases the lag entirely; `10` anchors
            attribution to the roster-author model's interpretive
            baseline (recommended).
        dualModelEnabled:
          type: boolean
          description: |
            When true, the TTS sidecar is allowed to keep two TTS engines
            (e.g. Kokoro + Qwen) resident in GPU memory simultaneously so a
            book that mixes engines can generate without paying an
            engine-swap cost between chapters. Default false: loading two
            engines at once is a deliberate VRAM commitment (~8 GB
            headroom), so a mixed-engine book still generates with this off,
            it just pays the swap latency. Takes effect on the next
            generation run; no server restart required.
        eagerLoadKokoro:
          type: boolean
          description: |
            When true (default), the Node server spawns the TTS sidecar
            with `PRELOAD_KOKORO=1`, so Kokoro eager-loads at sidecar
            startup (~1 GB VRAM, ~1 s). When false, the sidecar is spawned
            with `PRELOAD_KOKORO=0` and Kokoro warms on demand on the first
            synth that needs it (or via POST /load) — for Qwen-primary
            users who want the ~1 GB VRAM back. Takes effect on the next
            sidecar restart. Only governs the sidecar when Kokoro (or Coqui)
            is the resolved default engine; under a Qwen default Kokoro is
            always the on-demand fallback and `eagerLoadQwen` takes over.
        eagerLoadQwen:
          type: boolean
          description: |
            When true (default), and Qwen3-TTS is the resolved default
            engine, the Node server spawns the TTS sidecar with
            `PRELOAD_QWEN=1`, so Qwen's Base synth model eager-loads at
            sidecar startup. When false, the sidecar is spawned with
            `PRELOAD_QWEN=0` and Qwen warms on demand on the first synth
            that needs it. Only takes effect when Qwen is the default engine
            (otherwise Qwen stays off and Kokoro is the on-demand fallback).
            Takes effect on the next sidecar restart.
        generationWorkers:
          type: integer
          minimum: 1
          maximum: 4
          description: |
            Number of chapters the generation queue synthesises concurrently
            (queue-worker concurrency). Default 1. Pulled from the flat queue
            across books; same-book chapters fan out within one stream via the
            server's bounded pool. This is queue/synthesis concurrency only —
            the process-global GPU semaphore (`GPU_CONCURRENCY`) remains the
            VRAM guard, so raising this never risks an out-of-memory. Resolved
            as `GEN_WORKERS` env > this setting > 1.
        backupEnabled:
          type: boolean
          description: srv-2 — auto-snapshot this book's state.json on the cadence below. Default true.
        backupCadence:
          type: string
          enum: [daily, weekly]
          description: srv-2 — how often an automatic snapshot is taken. Default daily.
        backupRetention:
          type: integer
          minimum: 1
          maximum: 365
          description: srv-2 — number of snapshots to keep; older ones are pruned. Default 14.
        apiKeyStatus:
          type: string
          enum: [set, unset]
          readOnly: true
          description: |
            Whether process.env.GEMINI_API_KEY is non-empty. The key value
            itself is never returned over the wire — the UI uses this flag
            to render a "set in server/.env" pill.
        workspaceRoot:
          type: string
          readOnly: true
          description: Resolved absolute path of the active workspace root.
        workspaceSource:
          type: string
          enum: [env, default, override]
          readOnly: true
          description: |
            Where WORKSPACE_ROOT was resolved from. `override` when
            user-settings.json's workspaceDirOverride was used at boot,
            `env` when WORKSPACE_DIR was, `default` when the built-in
            `../audiobook-workspace` fallback applied.

    UserSettingsPatch:
      type: object
      description: |
        Partial update payload. Read-only fields (apiKeyStatus,
        workspaceRoot, workspaceSource) are ignored. Any `geminiApiKey`-
        shaped field is dropped — the API key only lives in server/.env.
      properties:
        displayName: { type: string }
        defaultAnalysisModel: { type: string }
        defaultTtsEngine: { type: string, enum: [local, gemini] }
        defaultTtsModelKey:
          type: string
          enum: [kokoro-v1, qwen3-tts-0.6b, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
        defaultTtsModelKeyExplicit:
          type: boolean
          description: |
            Set by the Account view to true when the user deliberately picks a
            default TTS model that differs from the resolved (Qwen-when-installed)
            default — pins their choice so the server stops preferring Qwen.
            The server also auto-latches this on any genuine change to
            defaultTtsModelKey.
        sidecarUrl: { type: string }
        analysisEngine: { type: string, enum: [local, gemini] }
        ollamaUrl: { type: string }
        workspaceDirOverride:
          type: string
          nullable: true
        exportSyncFolder:
          type: string
          nullable: true
        minorCastMinLines:
          type: integer
          minimum: 0
          maximum: 50
        coverPickerDefaultTab:
          type: string
          enum: [search, upload]
        defaultThemePreference:
          type: string
          enum: [light, dark, system]
        autoStartSidecar:
          type: boolean
        analyzerPhase0Model:
          type: string
          nullable: true
        analyzerPhase1Model:
          type: string
          nullable: true
        analyzerPhase1MinLagChapters:
          type: integer
          minimum: 0
          maximum: 50
          nullable: true
        dualModelEnabled:
          type: boolean
        eagerLoadKokoro:
          type: boolean
        eagerLoadQwen:
          type: boolean
        generationWorkers:
          type: integer
          minimum: 1
          maximum: 4
        backupEnabled:
          type: boolean
          description: srv-2 — auto-snapshot this book's state.json on the cadence below. Default true.
        backupCadence:
          type: string
          enum: [daily, weekly]
          description: srv-2 — how often an automatic snapshot is taken. Default daily.
        backupRetention:
          type: integer
          minimum: 1
          maximum: 365
          description: srv-2 — number of snapshots to keep; older ones are pruned. Default 14.

    # --- Library ----------------------------------------------------
    LibraryResponse:
      type: object
      required: [authors]
      properties:
        authors:
          type: array
          items: { $ref: '#/components/schemas/LibraryAuthor' }

    LibraryAuthor:
      type: object
      required: [name, series]
      properties:
        name: { type: string }
        series:
          type: array
          items: { $ref: '#/components/schemas/LibrarySeries' }

    LibrarySeries:
      type: object
      required: [name, books]
      properties:
        name: { type: string }
        books:
          type: array
          items: { $ref: '#/components/schemas/LibraryBook' }

    CoverCandidate:
      type: object
      required: [id, source, coverUrl]
      properties:
        id:
          type: string
          description: |
            Composite, source-agnostic identifier carried back to
            POST /api/books/{bookId}/cover as `candidateId`
            (`<source>:<localId>`, e.g. `openlibrary:48006`, `apple:123`,
            `google:vol_AbC`).
        source:
          type: string
          enum: [openlibrary, apple, google]
          description: Which catalogue this candidate came from. Drives the picker source badge.
        coverUrl:
          type: string
          format: uri
          description: Direct cover image URL for this source.
        edition:
          type: string
          description: 'Optional display string — `<publisher> · <year>` (best-effort).'

    SyncManifestIndex:
      type: object
      required: [schemaVersion, books, activeBookIds]
      description: |
        srv-32 (plan 191) — the index level of the companion sync manifest.
        `books` is trimmed by `?since`; `activeBookIds` is ALWAYS the full
        current set so the client can evict local books that no longer exist.
      properties:
        schemaVersion:
          type: integer
          description: Mirrors `schemas.syncManifest` from `GET /api/info` for compat-gating.
        books:
          type: array
          items: { $ref: '#/components/schemas/SyncManifestIndexBook' }
        activeBookIds:
          type: array
          items: { type: string }
          description: Full current set of book ids (never trimmed by `?since`).

    SyncManifestIndexBook:
      type: object
      required: [bookId, updatedAt, title, author, series, seriesPosition, chapterCount]
      properties:
        bookId: { type: string }
        updatedAt:
          type: string
          format: date-time
          description: Max of the book's `state.updatedAt` and every chapter's `audioRenderedAt`.
        title: { type: string }
        author: { type: string }
        series: { type: string }
        seriesPosition: { type: integer, nullable: true }
        chapterCount:
          type: integer
          description: Active (non-excluded) chapter count.
        coverUrl:
          type: string
          description: Server-relative cover URL when a cover image is on disk; absent otherwise.

    SyncManifestBookDetail:
      type: object
      required: [schemaVersion, bookId, updatedAt, chapters, activeChapterUuids]
      description: |
        srv-32 (plan 191) — the per-book detail level. `chapters` lists the
        book's active (non-excluded) chapters keyed by the stable srv-35
        `uuid`; `activeChapterUuids` is the full set the client evicts against.
      properties:
        schemaVersion: { type: integer }
        bookId: { type: string }
        updatedAt: { type: string, format: date-time }
        chapters:
          type: array
          items: { $ref: '#/components/schemas/SyncManifestChapter' }
        activeChapterUuids:
          type: array
          items: { type: string }

    SyncManifestChapter:
      type: object
      required: [uuid, id, title]
      properties:
        uuid:
          type: string
          description: Stable per-chapter identifier (srv-35) — the client keys local audio by this.
        id:
          type: integer
          description: Current positional id; the client builds `audioUrl` from it.
        title: { type: string }
        fingerprint:
          type: string
          description: |
            `audioRenderedAt` + file size. Changes on every audio-mutating path
            (regen / splice / QA re-record / loudnorm). Absent when the chapter
            has no rendered audio.
        urlSuffix:
          type: string
          enum: [audio.mp3, audio.m4a, audio.ogg]
          description: Actual rendered format suffix — the client never hardcodes `.mp3`.
        audioUrl:
          type: string
          description: Server-relative URL to the chapter audio (absent when not yet rendered).
        durationSec:
          type: number
          description: Chapter audio duration in seconds when known (from the QA verdict).
        lufs:
          type: number
          description: Integrated loudness when measured.

    ListenProgress:
      type: object
      required: [chapterId, currentSec, updatedAt]
      description: |
        Per-book resume bookmark. The mini-player writes one of these
        every ~5 s during playback (plus one final flush on chapter
        switch / close), and reads the latest record on chapter mount
        to seek the audio element. Persisted as a sibling
        `listen-progress.json` next to `state.json` so the
        schema-versioning shape from plan 27 stays stable. Plan
        [47](docs/features/archive/47-listen-progress.md); extended by plan
        [53](docs/features/archive/53-mini-player-feature-pack.md) with
        `playbackRate` + `markers`.
      properties:
        chapterId:
          type: integer
          minimum: 0
          description: |
            Chapter that was playing when the record was last stamped. On GET
            this is the chapter's CURRENT positional id, re-derived from
            `chapterUuid` when present (srv-35), so a resume position survives
            a chapter restructure.
        chapterUuid:
          type: string
          description: |
            srv-35 (plan 190) — the stable, restructure-proof uuid of the
            resume chapter. Stamped on PUT (derived from the supplied
            `chapterId`); GET resolves it back to the current `chapterId`.
            Optional / absent on records written before srv-35 and when the
            chapterId didn't map to a chapter.
        currentSec:
          type: number
          minimum: 0
          description: 'Playback position within the chapter, in seconds.'
        updatedAt:
          type: string
          format: date-time
          description: 'Server-stamped ISO timestamp. Clients only read this; PUT body omits it.'
        playbackRate:
          type: number
          minimum: 0.25
          maximum: 4.0
          description: |
            Plan 53 — per-book playback rate
            (`HTMLMediaElement.playbackRate`). Optional / absent on
            pre-plan-53 records; clients default to 1.0.
        markers:
          type: array
          description: |
            Plan 53 — user-placed bookmarks. Optional / absent on
            pre-plan-53 records.
          items: { $ref: '#/components/schemas/ListenMarker' }

    ListenMarker:
      type: object
      required: [id, chapterId, sec, label, kind, createdAt]
      description: |
        Plan 53 — user-placed bookmark inside a book. The listen-view
        sidebar lists these per chapter; click → seek to `sec`.
      properties:
        id:
          type: string
          description: 'Client-minted UUID. Server treats as opaque.'
        chapterId:
          type: integer
          minimum: 0
          description: 'Chapter the marker was dropped in.'
        sec:
          type: number
          minimum: 0
          description: 'Playback position within the chapter, in seconds.'
        label:
          type: string
          description: 'User-editable short label. Empty string is allowed.'
        kind:
          type: string
          enum: [note, rerecord]
          description: |
            `note` = general bookmark; `rerecord` = flag for another voice
            take. Server rejects any other value with 400.
        createdAt:
          type: string
          format: date-time
          description: 'Client-stamped ISO timestamp at marker creation.'

    CoverFraming:
      type: object
      required: [offsetX, offsetY, zoom]
      description: |
        Pan + zoom transform applied to the on-disk cover image at render
        time. Pure metadata — does not re-encode the JPEG. Consumed by
        `computeCoverStyle` (src/lib/cover-framing.ts) which translates
        to CSS `object-position: <offsetX>% <offsetY>%; transform:
        scale(<zoom>)` on the `<img>` element. Server clamps to the
        ranges below; client should too for live preview. Plan
        [40](docs/features/archive/40-cover-framing-and-upload.md).
      properties:
        offsetX:
          type: number
          minimum: -100
          maximum: 100
          description: 'Horizontal pan as `object-position` percentage. 0 = centred.'
        offsetY:
          type: number
          minimum: -100
          maximum: 100
          description: 'Vertical pan as `object-position` percentage. 0 = centred. Negative shifts the image up (showing the top).'
        zoom:
          type: number
          minimum: 1.0
          maximum: 3.0
          description: 'Scale factor. 1.0 = `object-cover` default; up to 3.0× tighter crop.'

    LibraryBook:
      type: object
      required:
        [
          bookId,
          title,
          author,
          series,
          status,
          chapterCount,
          completedChapters,
          characterCount,
          voiceCount,
          lastWorkedOn,
          coverGradient,
          isStandalone,
        ]
      properties:
        bookId: { type: string, description: 'slug(author)__slug(series)__slug(title)' }
        title: { type: string }
        author: { type: string }
        series: { type: string }
        seriesPosition:
          type: number
          nullable: true
          description: 'Series position. Allows decimals for novellas (e.g. 1.5).'
        isStandalone: { type: boolean }
        status:
          type: string
          enum: [not_analysed, analysing, cast_pending, generating, complete, unreadable, orphaned]
        manuscriptId: { type: string }
        chapterCount: { type: integer }
        completedChapters: { type: integer }
        characterCount: { type: integer }
        voiceCount: { type: integer }
        voiceIds:
          type: array
          items: { type: string }
          description: 'Distinct voice ids (voiceId ?? id) behind voiceCount. The library view unions these across books for a library-wide distinct-voices total; summing voiceCount would count a series-reused voice once per book.'
        matchedFromLibrary: { type: integer }
        progress: { type: number, minimum: 0, maximum: 1 }
        runtime: { type: string, description: "human-formatted total runtime, e.g. '4h 38m'" }
        lastWorkedOn:
          { type: string, description: "human-formatted relative time, e.g. '2 min ago'" }
        coverGradient:
          type: array
          minItems: 2
          maxItems: 2
          items: { type: string, description: 'CSS color literal' }
        coverImageUrl:
          type: string
          format: uri-reference
          description: |
            Server-relative URL for the cached cover image bytes (always
            `/api/books/{bookId}/cover`). Present only when the book has
            a cover cached on disk (`.audiobook/cover.jpg`). When
            absent, the UI falls back to `coverGradient`.
        coverFraming:
          allOf:
            - $ref: '#/components/schemas/CoverFraming'
          description: |
            Optional pan + zoom for the cover. Absent → renderers fall
            back to bare `object-cover` (the default before plan 40
            shipped). Always paired with `coverImageUrl` — framing on a
            book without a cover is meaningless.
        pinned: { type: boolean }
        tags:
          type: array
          items: { type: string }
          description: |
            Free-form user-editable tag strings persisted to
            `BookStateJson.tags` in `<bookDir>/.audiobook/state.json`. Drives
            the library view's tag-chip filter row (plan 73). Defaults to
            `[]` when missing from disk — books written before the field
            landed continue to load and render the empty chip set.
        language:
          type: string
          description: |
            fs-2 — BCP-47 manuscript language (e.g. `en`, `ru`). Defaults to
            `en` for books written before the field landed. Drives
            same-language narration (a non-`en` book routes every character,
            incl. the narrator, to a designed Qwen voice and never falls back
            to English Kokoro) and the library language badge + filter pill.

    # --- Import + confirm-metadata ---------------------------------
    ImportCandidate:
      type: object
      required: [format, title, sourceText, wordCount, byteSize, chapters]
      properties:
        format: { type: string, enum: [markdown, plaintext, epub, pdf, mobi] }
        title: { type: string }
        author: { type: string, nullable: true }
        series: { type: string, nullable: true }
        seriesPosition:
          type: number
          nullable: true
          description: 'Series position. Allows decimals for novellas (e.g. 1.5).'
        seriesFromTitle:
          type: boolean
          description: |
            True when series/seriesPosition were extracted from a parenthetical
            in the title rather than authoritative metadata (Calibre OPF tags or
            filename pattern). UI surfaces this as a small "auto-extracted from
            title — verify" chip near the series field so the user knows the
            value is a guess and can override.
        language:
          type: string
          description: |
            fs-2 — BCP-47 language auto-detected from the manuscript text
            (≥30% Cyrillic letters → `ru`, else `en`). Seeds the confirm-view
            language selector; the user can override before confirming.
        sourceText: { type: string }
        wordCount: { type: integer }
        byteSize: { type: integer }
        chapters:
          type: array
          items:
            type: object
            required: [id, title]
            properties:
              id: { type: integer }
              title: { type: string }
              wordCount:
                {
                  type: integer,
                  description: 'Words in this chapter body. Lets the confirm view auto-suggest front/back-matter exclusion.',
                }

    ImportResponse:
      type: object
      required: [tempId, candidate]
      properties:
        tempId: { type: string, example: 'imp_abc123' }
        candidate: { $ref: '#/components/schemas/ImportCandidate' }

    ConfirmBookRequest:
      type: object
      required: [tempId, author, title, isStandalone]
      properties:
        tempId: { type: string }
        author: { type: string }
        series: { type: string }
        seriesPosition:
          type: number
          nullable: true
          description: 'Series position. Allows decimals for novellas (e.g. 1.5).'
        title: { type: string }
        isStandalone: { type: boolean }
        language:
          type: string
          description: |
            fs-2 — BCP-47 manuscript language chosen at confirm (auto-detected,
            user-overridable). Persisted to `BookStateJson.language`. Defaults
            to `en` when absent.
        excludedSlugs:
          type: array
          items: { type: string }
          description: 'Chapter slugs to seed as excluded=true in state.json. Built client-side from the candidate.chapters[].id + title; the server re-derives the slug to match.'

    ConfirmBookResponse:
      allOf:
        - $ref: '#/components/schemas/UploadResponse'
        - type: object
          required: [bookId, author, series, isStandalone, paths]
          properties:
            bookId: { type: string }
            author: { type: string }
            series: { type: string }
            seriesPosition:
              type: number
              nullable: true
              description: 'Series position. Allows decimals for novellas (e.g. 1.5).'
            isStandalone: { type: boolean }
            paths:
              type: object
              required: [bookDir, manuscript, dotAudiobook]
              properties:
                bookDir: { type: string }
                manuscript: { type: string }
                dotAudiobook: { type: string }

    # --- Upload -----------------------------------------------------
    UploadResponse:
      type: object
      required: [manuscriptId, format, title, wordCount, byteSize, uploadedAt, sourceText]
      properties:
        manuscriptId: { type: string, example: 'mns_abc123' }
        format: { type: string, enum: [markdown, plaintext, epub, pdf, mobi] }
        title: { type: string }
        wordCount: { type: integer }
        byteSize: { type: integer }
        uploadedAt: { type: string, format: date-time }
        sourceText: { type: string, description: 'Normalised plain-text body.' }

    # --- Analyse ----------------------------------------------------
    AnalysePhaseEvent:
      type: object
      required: [phaseId, progress]
      properties:
        phaseId: { type: integer, minimum: 0 }
        progress: { type: number, minimum: 0, maximum: 1 }
        label: { type: string }

    AnalyseResponse:
      type: object
      required: [bookId, manuscriptId, title, phaseTimings, characters, chapters, sentences]
      properties:
        bookId: { type: string, example: 'ns' }
        manuscriptId: { type: string }
        title: { type: string }
        phaseTimings:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              label: { type: string }
              duration: { type: integer, description: 'milliseconds' }
        characters: { type: array, items: { $ref: '#/components/schemas/Character' } }
        chapters: { type: array, items: { $ref: '#/components/schemas/Chapter' } }
        sentences: { type: array, items: { $ref: '#/components/schemas/Sentence' } }
        libraryMatches:
          type: array
          description: Hints from a pre-pass against the user's voice library.
          items:
            type: object
            properties:
              characterId: { type: string }
              voiceId: { type: string }
              confidence: { type: number }

    # --- Voice match ------------------------------------------------
    CharacterMatchInput:
      type: object
      required: [id, name, attributes]
      properties:
        id: { type: string }
        name: { type: string }
        aliases:
          type: array
          items: { type: string }
          description: |
            Alternate forms accumulated when the user merged duplicate roster
            entries (mirrors Character.aliases). The matcher scores against
            name OR any alias on either side, so book N+1 can recognise a
            character last met under a different form.
        gender:
          type: string
          enum: [male, female, neutral]
          description: Optional tie-breaker signal (set by analysis).
        ageRange:
          type: string
          enum: [child, teen, adult, elderly]
          description: Optional tie-breaker signal (set by analysis).
        attributes: { type: array, items: { type: string } }
        tone:
          type: object
          properties:
            warmth: { type: integer }
            pace: { type: integer }
            authority: { type: integer }
            emotion: { type: integer }
        evidenceQuotes:
          type: array
          items: { type: string }

    VoiceMatchResponse:
      type: object
      required: [bookId, matches]
      properties:
        bookId: { type: string }
        matches:
          type: array
          items:
            type: object
            required: [characterId, candidates]
            properties:
              characterId: { type: string }
              candidates:
                type: array
                items:
                  type: object
                  required: [voiceId, score]
                  properties:
                    voiceId: { type: string }
                    fromBookId:
                      {
                        type: string,
                        description: 'Library book whose confirmed cast holds this voice. Lets the client target the exact library record for the override endpoint.',
                      }
                    fromBookTitle: { type: string }
                    fromCharacterId:
                      {
                        type: string,
                        description: "Character id within fromBookId's cast.json. Stable handle for library-cast override.",
                      }
                    score: { type: number, minimum: 0, maximum: 1 }
                    factors:
                      type: array
                      items: { $ref: '#/components/schemas/MatchFactor' }

    MatchFactor:
      type: object
      required: [id, label, score]
      properties:
        id: { type: string, example: 'register' }
        label: { type: string, example: 'Vocabulary register' }
        score: { type: number, minimum: 0, maximum: 1 }
        detail: { type: string }

    # --- Generation -------------------------------------------------
    GenerationTick:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [progress, chapter_assembling, chapter_verifying, chapter_recovering, chapter_complete, chapter_failed, idle, resume_from, warning, chapter_awaiting_fallback_confirm]
          description: |
            `chapter_assembling` is emitted between the last per-group synthesis
            tick and `chapter_complete`, while the server concatenates the PCM,
            writes the MP3 + segments JSON, and updates state.json. Surfaces
            the disk-write phase so the UI doesn't look stalled at 99 %.
            `chapter_verifying` is emitted while the ASR content-QA pass (srv-31)
            transcribes a chapter's sentences after synthesis and before
            assembly; it carries the same counters as `chapter_assembling` and
            surfaces a "Verifying speech…" phase so the row doesn't look frozen
            on "Synthesising …".
            `chapter_recovering` is emitted (Wave 3, C2) while a worker rides out
            a mid-render sidecar recycle/respawn on the readiness gate (up to
            ~210 s). It carries the same counters as `chapter_assembling`, fires
            on a 10 s heartbeat so the client's 30 s stall detector stays fed, and
            surfaces a "Recovering …" phase so the row reads as healthy recovery
            rather than a silent stall.
            `resume_from` is emitted as the FIRST event on every new subscriber
            (cold connect AND reconnect after `tsx watch` restart or server
            bounce) and carries a snapshot of completed chapter ids for the
            active queue entry so the reconnect doesn't replay completed work.
            `warning` is a non-fatal advisory emitted at run setup (e.g. a
            Qwen→Kokoro engine downgrade, or dual-model-off with a mixed cast) —
            the run still proceeds; the frontend surfaces `message` as a toast.
            `chapter_awaiting_fallback_confirm` is emitted when a chapter would
            silently render an undesigned Qwen voice in Kokoro: the chapter is
            PARKED (queue entry → `awaiting_confirm`) and this tick names the
            affected characters in `fallbackCharacters` so the frontend can
            prompt the user to confirm or skip. The worker frees its slot; other
            chapters keep flowing. See plan `docs/features/archive/102-global-queue-modal.md`.
        chapterId: { type: integer }
        characterId:
          type: string
          nullable: true
          description: null = chapter-wide tick (not character-specific).
        progress: { type: number, minimum: 0, maximum: 1 }
        currentLine: { type: integer }
        totalLines: { type: integer }
        completedSentenceIds:
          type: array
          items: { type: integer }
          description: |
            fs-13 — only on a `progress` tick fired at a GROUP COMPLETION: the
            manuscript sentence ids of the just-finished same-speaker group
            (the tick's `characterId` is that group's character). The frontend
            unions these into a per-chapter completed-id SET so each character's
            mini-bar reads its EXACT done count under out-of-order completion
            (poolWidth > 1 + Qwen batching), rather than approximating from the
            chapter-wide `currentLine` count. Absent on the onGroupStart
            heartbeat tick and on older servers — the frontend then falls back
            to the `currentLine`-derived approximation. The chapter-level
            `currentLine`/`progress` are unchanged (still the monotonic group
            count).
        runDone:
          type: integer
          description: |
            Aggregate run progress — number of non-excluded chapters in
            this book that are currently "done" (audio on disk). Sourced
            from server state, NOT computed from the slice, so the global
            header pill keeps an accurate readout when the user has
            navigated to a different book (the slice no longer carries
            this book's chapter rows, but the SSE keeps streaming).
            Optional for backward compat — older servers don't emit it
            and the frontend falls back to the last-snapshot value.
        runTotal:
          type: integer
          description: |
            Total non-excluded chapters in this book. Stable for the run.
        runInProgress:
          type: integer
          description: |
            Number of chapters currently between first synthesise tick
            and chapter_complete / chapter_failed in this run.
        totalGroups:
          type: integer
          description: Only on `chapter_assembling` — number of synthesised same-speaker groups about to land on disk.
        durationSec:
          type: number
          description: |
            Measured audio length in seconds. Carried on `chapter_assembling`
            (primary, fires as the PCM is being concatenated → MP3) AND on
            `chapter_complete` (redundant, fires after the MP3 lands on
            disk). The double-carry guards against the assembling tick
            being dropped by the cross-book guard, plan-87 parallel-chapter
            interleave, or a hidden tab — without it the chapter row in
            the Listen view sits at the analysis-seeded `'00:00'` until
            the next page reload.
        audioModelKey:
          type: string
          enum: [kokoro-v1, qwen3-tts-0.6b, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
          description: |
            Only on `chapter_complete` — the TTS model key that produced
            this chapter's audio. Carries the engine forward so the
            frontend can update `chapter.audioModelKey` without waiting
            for a state.json reload (which would otherwise let an
            engine-drift badge appear only after page navigation). With
            per-character engine routing (plan 108) this is the engine the
            audio ACTUALLY rendered in, not necessarily the request default.
            See `docs/features/archive/35-engine-drift-detection.md`.
        audioEngines:
          type: object
          additionalProperties: { type: integer }
          description: |
            Only on `chapter_complete` — distinct speaking characters per TTS
            engine they actually rendered in (e.g. `{ "kokoro": 1, "qwen": 6 }`).
            Carries the mixed-engine breakdown forward so the frontend can show
            the per-engine voice-count caption without a state.json reload.
        audioQa:
          allOf:
            - $ref: '#/components/schemas/ChapterQaVerdict'
          description: |
            srv-27 — Only on `chapter_complete` — the advisory post-synthesis
            QA verdict, so the frontend can stamp a "Suspect" badge the moment
            the Done pill flips without a state.json reload.
        errorReason: { type: string, nullable: true }
        errorCode:
          allOf:
            - $ref: '#/components/schemas/FailureCode'
          description: |
            Only on `chapter_failed` — fs-19 stable machine code for the failure
            class. Lets the frontend render the matching remediation + persist
            it without parsing `errorReason`.
        remediation:
          type: string
          description: |
            Only on `chapter_failed` — fs-19 concrete "what to do about it" copy
            for the failure, surfaced under the error reason.
        code:
          type: string
          description: |
            Only on `warning` — a stable machine-readable warning code
            (e.g. `qwen_unavailable_kokoro_fallback`,
            `dual_model_off_multi_engine`). Lets the frontend dedupe and
            route warnings without parsing `message`.
        message:
          type: string
          description: |
            Only on `warning` — the human-readable advisory text the
            frontend surfaces as a toast.
        queueEntryId:
          type: string
          description: |
            On `progress`, `chapter_assembling`, `chapter_complete`,
            `chapter_failed`, and `resume_from` — the workspace queue entry
            this tick belongs to. Lets the frontend map ticks to the right
            queue row even when entries from different books interleave.
            Optional for backward compat — older servers (pre-plan-102) omit
            it and the frontend falls back to (bookId, chapterId) matching.
        resumeFromCompletedChapterIds:
          type: array
          items: { type: integer }
          description: |
            Only on `resume_from` — list of chapter ids already complete on
            disk for the active queue entry's containing run, so the frontend
            can skip replaying `chapter_complete` ticks for them when the
            server catches a new subscriber up.
        fallbackCharacters:
          type: array
          description: |
            Only on `chapter_awaiting_fallback_confirm` — the characters in this
            chapter that would render in Kokoro (Qwen route, no designed voice).
            The frontend lists them in the confirm/skip prompt.
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }

    # --- Generation queue ------------------------------------------

    QueueEntry:
      type: object
      required: [id, bookId, chapterId, scope, addedAt, status, order]
      properties:
        id:
          type: string
          description: Stable unique entry id. Frontend-minted at enqueue time.
        bookId: { type: string }
        chapterId: { type: integer }
        scope:
          type: string
          enum: [this, character]
          description: |
            `this` = (re)generate the named chapter. `character` = regenerate
            the named character's lines in this chapter only. `forward` scope
            (regenerate chapter N + all subsequent) is expanded by the
            frontend at enqueue time into one `this` entry per affected
            chapter — the slice never carries `forward` as a single row, so
            every queue entry maps 1:1 to a chapter and the user can reorder
            each chapter in a forward range individually.
        characterId:
          type: string
          nullable: true
          description: Required when scope === 'character'; null otherwise.
        addedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp the entry was enqueued. Drives FIFO ordering when ties on `order` occur during concurrent enqueues.
        status:
          type: string
          enum: [queued, in_progress, paused, done, failed, awaiting_confirm]
          description: |
            `queued` = waiting. `in_progress` = currently synthesising
            (pinned; non-draggable in the modal). `paused` = queue-global
            pause flipped; still ordered, drains on resume. `done` = audio
            on disk for this entry's chapter. `failed` = synthesis errored;
            surfaces in the modal with a retry affordance. `awaiting_confirm` =
            the chapter would silently render an undesigned Qwen voice in Kokoro;
            parked until the user confirms (render anyway) or skips. The
            affected characters are listed in `fallbackCharacters`.
        fallbackCharacters:
          type: array
          description: |
            Loud-fallback gate — the characters in this chapter that resolve to
            Qwen but have no designed voice, so would render in Kokoro. Present
            only on an `awaiting_confirm` entry.
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
        fallbackConfirmed:
          type: boolean
          description: |
            Loud-fallback gate — true once the user confirmed this entry's
            Qwen→Kokoro fallback, so the worker renders it straight through on
            re-dispatch instead of re-parking it.
        order:
          type: integer
          description: Cross-book ordinal within the workspace queue. 0 = first to drain. Renumbered on every reorder.
        progress:
          type: number
          minimum: 0
          maximum: 1
          description: Per-entry render progress (0..1), mirrored from the active GenerationTick.
        errorReason:
          type: string
          nullable: true
          description: Populated when status === 'failed'.

    QueueListResponse:
      type: object
      required: [entries, paused, recycling]
      properties:
        entries:
          type: array
          items: { $ref: '#/components/schemas/QueueEntry' }
          description: All workspace queue entries, sorted by `order` ascending.
        paused:
          type: boolean
          description: Queue-global pause flag. When true, the dispatcher waits at the next chapter boundary.
        recycling:
          type: boolean
          description: >
            True when the active sidecar supervisor has no live child process (the sidecar is dead
            or respawning). The dispatcher holds new claims while this is true; in-flight streams
            run to completion via the server-side readiness gate. False when there is no managed
            sidecar (autoStart off).

    QueueEnqueueRequest:
      type: object
      required: [bookId, chapterIds]
      properties:
        bookId: { type: string }
        chapterIds:
          type: array
          items: { type: integer }
          description: One or more chapter ids to enqueue. The frontend pre-expands `forward` scope into per-chapter ids before posting.
        scope:
          type: string
          enum: [this, character]
          default: this
        characterId:
          type: string
          description: Required when scope === 'character'.

    QueueReorderRequest:
      type: object
      required: [order]
      properties:
        order:
          type: array
          items: { type: string }
          description: Full list of entry ids in the desired final order. Server validates the list matches the current queue minus the in-flight pinned entry; mismatch returns 409 (concurrent enqueue happened; client refetches and retries).

    # --- Voice samples ---------------------------------------------
    VoiceSampleRequest:
      type: object
      required: [modelKey]
      properties:
        modelKey:
          type: string
          enum: [kokoro-v1, qwen3-tts-0.6b, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
          description: UI-stable TTS model key. The engine prefix (kokoro-, coqui-, gemini-) drives provider selection server-side.
        voice:
          type: object
          description: Frontend Voice payload (attributes drive the prebuilt-voice picker).
          properties:
            id: { type: string }
            character: { type: string }
            attributes: { type: array, items: { type: string } }
        characterHint:
          type: object
          description: |
            Extra signals the server uses to pick a sensible prebuilt Gemini
            voice when the library `attributes` only carry personality traits
            (e.g. "sarcastic", "patient") rather than vocal descriptors. The
            description is scanned for he/she pronouns; gender + ageRange take
            precedence when present; tone is used as a tiebreaker. Evidence
            quotes (real manuscript lines) drive the sample script when
            present so every voice actually sounds like that character.
          properties:
            description: { type: string }
            role: { type: string }
            gender: { type: string, enum: [male, female, neutral] }
            ageRange: { type: string, enum: [child, teen, adult, elderly] }
            evidence:
              type: array
              items: { type: string }
              description: Manuscript lines spoken by or about this character.
            tone:
              type: object
              properties:
                warmth: { type: integer }
                pace: { type: integer }
                authority: { type: integer }
                emotion: { type: integer }
        text:
          type: string
          description: Optional override script. Capped to ~30 words server-side to stay near 12 s.
        rawEngine:
          type: string
          enum: [coqui, gemini, piper, kokoro, qwen]
          description: |
            When set together with `rawSpeaker`, the server skips the
            attribute-driven prebuilt-voice picker and synthesises with the
            named base voice directly. Used by the Voices view's "Base voices"
            tab and family-header Play buttons.
        rawSpeaker:
          type: string
          description: |
            Base-voice name from `GET /api/voices/base` (e.g. "Asya Anara",
            "Charon"). Ignored unless `rawEngine` is also set.

    VoiceSample:
      type: object
      required: [url, cached, modelKey]
      properties:
        url:
          type: string
          description: Path under the server's static /audio mount; play directly with <audio>.
        durationSec:
          type: number
          nullable: true
          description: Computed from the synthesised PCM length. Null when the response was served from cache.
        cached: { type: boolean }
        modelKey:
          type: string
          enum: [kokoro-v1, qwen3-tts-0.6b, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]

    # --- Voice library ---------------------------------------------
    TtsVoiceAssignment:
      type: object
      required: [provider, name, description]
      description: |
        The TTS provider voice this Voice resolves to. Computed server-side by
        the same picker that synthesises samples and chapters, so the value
        previewed in the UI matches what the user actually hears.
      properties:
        provider: { type: string, enum: [coqui, gemini, piper, kokoro, qwen] }
        name:
          {
            type: string,
            description: "Engine-specific prebuilt voice name, e.g. 'Charon' (Gemini) or 'Claribel Dervla' (Coqui XTTS v2). For Qwen this is a designed-voice id.",
          }
        description:
          {
            type: string,
            description: "Short label for the picked voice — engine-specific. Empty/placeholder when the engine doesn't publish descriptors.",
          }

    BaseVoice:
      type: object
      required: [engine, name]
      description: |
        One unmodified speaker exposed by a TTS engine. The pair (engine, name)
        is the stable identity — the engine routes the request to the right
        provider, the name is the engine-specific speaker handle (XTTS speaker
        name, Gemini prebuilt voice id, Piper short name, etc.). Used by the
        Voices view's "Base voices" tab and the Profile Drawer override picker.
      properties:
        engine: { type: string, enum: [coqui, gemini, piper, kokoro, qwen] }
        name:
          {
            type: string,
            description: "Engine-specific speaker handle, e.g. 'Asya Anara' (Coqui XTTS) or 'Charon' (Gemini). For Qwen this is a designed-voice id (no fixed catalog).",
          }
        language:
          {
            type: string,
            description: "Optional ISO 639-1 / BCP-47 hint; absent when the engine doesn't tag languages.",
          }
        gender:
          type: string
          enum: [male, female, neutral]
          description: "Engine-supplied gender hint; absent when the engine doesn't publish one (XTTS speakers don't)."

    BaseVoiceCatalog:
      type: object
      required: [voices]
      properties:
        voices:
          type: array
          items: { $ref: '#/components/schemas/BaseVoice' }

    Voice:
      type: object
      required: [id, character, bookTitle, bookId, attributes, gradient, usedIn, source, ttsVoice]
      properties:
        id:
          {
            type: string,
            description: 'Stable id used to hash a TTS prebuilt voice. Defaults to character.voiceId or character.id.',
          }
        character: { type: string }
        bookTitle: { type: string }
        bookId: { type: string }
        attributes:
          type: array
          items: { type: string }
        gradient:
          type: array
          minItems: 2
          maxItems: 2
          items: { type: string, description: 'CSS color literal' }
        usedIn:
          {
            type: integer,
            minimum: 0,
            description: 'Number of distinct books that contain this voiceId.',
          }
        source:
          type: string
          enum: [current, library]
          description: "'current' when the voice belongs to the currently-open book; 'library' otherwise."
        inCurrentSeries:
          type: boolean
          description: >-
            True when this voice belongs to a book in the currently-open book's
            (author, series) — including the open book itself. Absent/false when
            no book is open or the open book is a standalone (a standalone has no
            series continuity). The cast view's "Series" tab scopes to
            `source === 'library' && inCurrentSeries`, so it shows only this
            series' siblings rather than every other book in the workspace.
        reusable:
          {
            type: boolean,
            description: 'Marker for narrator-like voices that span an entire book.',
          }
        pinned:
          {
            type: boolean,
            description: 'Workspace-level pin flag from audiobook-workspace/voices.json.',
          }
        generated:
          type: boolean
          description: >-
            True when this voiceId has rendered chapter audio at least once.
            Populated only for bespoke Qwen voices (the server scans rendered
            segments for the resolved voiceId when the engine query is 'qwen');
            preset voices omit it. Drives the Voices view's "Designed" vs
            "Generated" split and the cast Status column. Cross-book: true if
            rendered in any book carrying this voiceId. Absent ⇒ not generated
            / not applicable.
        sampled:
          type: boolean
          description: >-
            True when a 12s audition has been synthesised for this voiceId —
            the lifecycle tier between "Designed" and "Generated". Populated
            only for bespoke Qwen voices (the server checks the voice-sample
            cache for a `<scope>-qwen3-tts-0.6b-*.mp3` file when the engine
            query is 'qwen'); preset voices omit it. Drives the new "Sampled"
            cast Status pill / Voices badge. Cross-book like `generated`; a
            `generated` voice outranks it. Absent ⇒ not sampled / not applicable.
        ttsVoice: { $ref: '#/components/schemas/TtsVoiceAssignment' }
        overrideTtsVoices:
          type: object
          nullable: true
          description: |
            User-set TTS voice overrides per engine. Each entry pins a
            specific speaker for that engine; the active synth engine
            reads its own slot at render time and falls back to attribute
            inference when absent. Engine switches preserve cast
            assignments across engines (no need to re-cast every
            character when toggling Coqui ↔ Kokoro).

            Keyed by `TtsEngine` (`coqui`, `gemini`, `piper`, `kokoro`);
            OpenAPI 3.0 can't constrain map keys to an enum, but the
            server normalises unknown keys away at read time.
          additionalProperties:
            type: object
            required: [name]
            properties:
              name:
                type: string
                description: "Engine-specific speaker handle for this engine's slot."
              variants:
                type: object
                description: |
                  fs-25 — per-emotion voice variants (Qwen only). Keyed by the
                  non-neutral `Emotion` values (`whisper`/`angry`/`excited`/`sad`);
                  each entry is an independently designed voiceId. `name` above
                  stays the neutral base. Absent → every emotion falls back to
                  the base voice. Variants travel with the base across reuse
                  links (plan 177 Wave 6a).
                additionalProperties:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                      description: 'Designed variant voiceId for this emotion.'
          example:
            coqui: { name: 'Asya Anara' }
            kokoro: { name: 'am_onyx' }
            qwen:
              name: 'qwen-Wren'
              variants:
                angry: { name: 'qwen-Wren__angry' }
        overrideTtsVoice:
          deprecated: true
          allOf:
            - $ref: '#/components/schemas/BaseVoice'
          nullable: true
          description: |
            DEPRECATED: superseded by `overrideTtsVoices` (plural) for
            multi-engine support. Server-side reads still accept this
            singular form for backwards compatibility with cast.json files
            written by older clients — they get normalised into the
            plural map at load time. Writes always emit `overrideTtsVoices`
            and may omit this field. Will be removed once all in-flight
            casts have been touched at least once.
        bookSeries:
          type: string
          nullable: true
          description: |
            Series name from the book directory (`books/<Author>/<Series>/<Book>`),
            or null/empty for standalones. Lets the voice-family-grouped Voices
            view nest cast members under their book series before the book.
        aliases:
          type: array
          items: { type: string }
          description: |
            The underlying character's alternate names (copied from its
            cast.json entry). Carried on the Voice so the voices-view
            cross-book duplicate detector can apply its "already-linked"
            suppression filter WITHOUT hydrating every foreign book's cast
            — on the global `#/voices` tab no casts are loaded, so without
            this an already-aliased pair re-surfaces on every reload
            (plan 101 bug fix 2026-05-26). First-seen character wins when a
            voiceId spans multiple books.
        notLinkedTo:
          type: array
          items:
            type: object
            required: [bookId, characterId]
            properties:
              bookId: { type: string }
              characterId: { type: string }
          description: |
            The underlying character's `notLinkedTo` pairs (copied from its
            cast.json entry). Same rationale as `aliases`: lets the
            duplicate detector suppress intentional-variant pairs on the
            global tab without a cast hydrate.

    VoiceLibraryResponse:
      type: object
      required: [voices]
      properties:
        voices:
          type: array
          items: { $ref: '#/components/schemas/Voice' }

    # --- Audio ------------------------------------------------------
    ChapterAudio:
      type: object
      required: [durationSec, peaks]
      properties:
        url:
          type: string
          nullable: true
          description: Signed MP3/Opus URL; null while still rendering.
        durationSec: { type: number }
        peaks:
          type: array
          items: { type: number, minimum: 0, maximum: 1 }
          description: Pre-computed waveform envelope, typically 240 samples.
        sampleRate: { type: integer, example: 44100 }
        segments:
          type: array
          items:
            type: object
            properties:
              start: { type: number, description: 'seconds' }
              end: { type: number, description: 'seconds' }
              characterId: { type: string }
              sentenceId: { type: integer }
        lufs:
          $ref: '#/components/schemas/ChapterLoudness'
          nullable: true
          description: |
            EBU R128 loudness measurement persisted next to the chapter
            audio as `<slug>.lufs.json` (plan 71). Null when no loudnorm
            pass landed — legacy chapter, `AUDIO_LOUDNORM_ENABLED=false`,
            or silent-source fallthrough. Consumers MUST gate any
            drift-vs-ground-truth comparison on `twoPass === true`;
            single-pass values are nominal target values, not real
            post-filter measurements. Plan 77 (LUFS report card UI)
            reads this back to surface per-chapter drift badges and a
            book-level loudness summary card on the Listen view.

    ChapterLoudness:
      type: object
      required: [i, lra, tp, target, twoPass, measuredAt]
      description: |
        Per-chapter loudness payload written by the encoder's `loudnorm`
        filter. Mirrors `LoudnormSidecarJson` in
        `server/src/tts/loudnorm.ts`; field names are stable contract
        with the on-disk sidecar JSON (do not rename without bumping the
        sidecar schema). See `docs/features/archive/71-audio-loudness-normalization.md`.
      properties:
        i:
          type: number
          description: |
            Measured integrated loudness (LUFS). In two-pass mode this is
            the FIRST-pass measurement of the source PCM; in single-pass
            mode it is the nominal target (no re-measurement is done).
        lra:
          type: number
          description: |
            Measured loudness range (LU). Same single-pass caveat as `i`.
        tp:
          type: number
          description: |
            Measured true peak (dBTP). Same single-pass caveat as `i`.
        target:
          type: number
          description: |
            Target integrated loudness (LUFS) the chapter was normalised
            to. Matches `LoudnormOptions.target`. Default is `-16` (ACX
            audiobook submission target).
        twoPass:
          type: boolean
          description: |
            `true` when the measure-then-apply flow ran (±0.5 LU vs target);
            `false` for single-pass streaming normalisation. UI consumers
            MUST gate drift comparisons on this — single-pass `i`/`lra`/`tp`
            are NOT post-filter measurements.
        measuredAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp the measurement was taken (encode time).

    # --- Workspace change log ---------------------------------------
    ChangeLogEvent:
      type: object
      required: [id, ts, date, type, title, note, actor]
      properties:
        id: { type: integer, description: 'Monotonic id, usually now.getTime() at write time.' }
        at:
          {
            type: string,
            format: date-time,
            description: 'ISO timestamp; absent on hand-authored fixture entries.',
          }
        ts:
          {
            type: string,
            description: 'Human-readable relative time ("Just now", "2 min ago"). Recomputed on render.',
          }
        date: { type: string, enum: [today, yesterday, earlier] }
        type:
          {
            type: string,
            enum:
              [
                regenerate,
                voice_tune,
                voice_reuse,
                voice_lock,
                boundary_move,
                chapter_complete,
                generation_run_complete,
                chapter_failed,
                generation_started,
                cast_confirm,
                name_change,
                analysis_complete,
                import,
                library_add,
                reparse,
              ],
          }
        title: { type: string }
        note: { type: string }
        actor: { type: string, enum: [you, system] }
        chapterId:
          {
            type: integer,
            description: 'Bound to chapter scope when applicable. Reparse drops every event that carries this field.',
          }
        revertible: { type: boolean }
    WorkspaceChangeLogEvent:
      allOf:
        - $ref: '#/components/schemas/ChangeLogEvent'
        - type: object
          description: |
            Returned by GET /api/workspace/changelog. The aggregator tags each
            per-book event with the originating book's identifying metadata so
            the workspace view can render cross-book context.
          required: [bookId, bookTitle, author]
          properties:
            bookId: { type: string }
            bookTitle: { type: string }
            author: { type: string }

    # --- Revisions + drift -----------------------------------------
    RevisionsResponse:
      type: object
      properties:
        pending: { type: array, items: { $ref: '#/components/schemas/Revision' } }
        drift: { type: array, items: { $ref: '#/components/schemas/DriftEvent' } }
        timeline:
          description: >-
            Per-chapter chronological log of accept / reject / rollback events
            written by the frontend at user-action time. Read-back by the
            Revision History view (plan 55). Keyed by chapterId; each chapter's
            value is an append-only list in insertion order (oldest first).
            Optional — older books without timeline entries omit it.
          type: object
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/TimelineEntry' }

    TimelineEntry:
      type: object
      required: [id, chapterId, eventKind, timestamp, status]
      properties:
        id:
          type: string
          description: Stable unique id (the revision id for accept/reject; a
            generated id for rollback events).
        chapterId: { type: integer }
        characterId:
          type: string
          description: Optional — set on accept/reject (the character whose
            revision was processed); absent on rollback events.
        eventKind:
          type: string
          enum: [accepted, rejected, rolled-back]
          description: >-
            `accepted` / `rejected` mark the moment the user committed to or
            discarded a pending revision. `rolled-back` marks a rollback action
            that promoted a prior chapter render back to live.
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp the event was recorded.
        revisionId:
          type: string
          description: For rollback entries — the timeline entry id being
            rolled back to/from. Absent on accept/reject.
        status:
          type: string
          enum: [active, rolled-back-from]
          description: >-
            `active` for the entry that represents the current chapter state
            on disk. `rolled-back-from` for entries whose effects were undone
            by a subsequent rollback (the entry is preserved for history but
            no longer represents live state).
        reversible:
          type: boolean
          description: >-
            True when this entry's prior audio is still on disk (i.e. plan
            20's `.previous.<slug>.mp3` exists for the chapter and this is
            the most recent reversible accept/reject). The frontend only
            enables the Rollback button when this is true. Multi-step rollback
            (snapshot-per-entry) is parked for v1.4.0.

    Revision:
      type: object
      required: [id, chapterId, characterId, segments]
      properties:
        id: { type: string }
        chapterId: { type: integer }
        characterId: { type: string }
        triggeredBy: { type: string }
        triggeredAgo: { type: string }
        oldDuration: { type: string }
        newDuration: { type: string }
        confidence: { type: number, minimum: 0, maximum: 1 }
        playable:
          type: boolean
          description: >-
            False while the proposed (B) audio is still rendering. The a/b
            player disables the B controls until this flips true. Set true
            once chapter_complete fires for the chapter; the
            generation-stream middleware flips it without waiting for the
            30s revisions poll cycle.
        hasPreviousAudio:
          type: boolean
          description: >-
            False for legacy chapters that pre-date the rollback feature
            (no .previous.* pair was preserved). The a/b player renders
            "Original audio not preserved — review by metadata only" on
            the A card when this is false.
        segments:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              text: { type: string }
              oldDuration: { type: string }
              newDuration: { type: string }
              changed: { type: boolean }
              narratorOnly: { type: boolean }

    DriftEvent:
      type: object
      required: [id, bookId, characterId, chapterId, severity, factor, chapterTitle]
      properties:
        id: { type: string }
        bookId:
          type: string
          description: >-
            Book the event belongs to. Server stamps this at emit time
            from the request path; included in the event id for global
            uniqueness across concurrently-active books. Lets the Drift
            Report group events by book in a single modal even when the
            user has multiple books generating in parallel.
        characterId: { type: string }
        chapterId: { type: integer }
        chapterTitle:
          type: string
          description: >-
            Title of the chapter whose render produced this drift event,
            embedded server-side at emit time so the Drift Report modal
            can label each row without depending on the live chapters
            slice (which is single-book-scoped, but drift may span
            books). Falls back to the chapter-scan title and finally to
            "Chapter N" when no title is available.
        severity: { type: string, enum: [mild, moderate, severe] }
        factor: { type: string, example: 'register' }
        factorLabel: { type: string }
        description: { type: string }
        autoQueueable:
          type: boolean
          description: >-
            True when the drift signal is strong enough that the user
            almost always wants to regenerate immediately (today:
            severity === 'severe'). The Drift Report surfaces these
            with a one-click "Auto-regen now" button that bypasses the
            regen-modal confirmation. Moderate / mild events leave this
            unset; the manual regen flow still applies.
        metrics:
          type: object
          properties:
            current: { type: number }
            expected: { type: number }
            unit: { type: string }
        snapshot:
          type: object
          description: >-
            The character profile as captured at chapter render time.
            Diffed against `current` by the modal to render a
            side-by-side "When rendered / Now" comparison so the user
            can judge whether the drift actually matters. Mirrors the
            on-disk CharacterSnapshot in <slug>.segments.json.
          properties:
            voiceId: { type: string }
            voiceEngine: { type: string }
            gender: { type: string, enum: [male, female, neutral] }
            ageRange: { type: string, enum: [child, teen, adult, elderly] }
            tone:
              type: object
              properties:
                warmth: { type: integer }
                pace: { type: integer }
                authority: { type: integer }
                emotion: { type: integer }
            attributes:
              type: array
              items: { type: string }
        current:
          type: object
          description: >-
            The live cast profile for this character at poll time.
            Embedded alongside `snapshot` so the comparison card is
            data-self-sufficient even when the event belongs to a
            non-active book whose cast isn't in the frontend's chapters
            / cast slice.
          properties:
            name: { type: string }
            voiceId: { type: string }
            gender: { type: string, enum: [male, female, neutral] }
            ageRange: { type: string, enum: [child, teen, adult, elderly] }
            tone:
              type: object
              properties:
                warmth: { type: integer }
                pace: { type: integer }
                authority: { type: integer }
                emotion: { type: integer }
            attributes:
              type: array
              items: { type: string }
        detected: { type: string }
        suggestedAction: { type: string, example: 'regenerate_chapter' }

    # --- Domain core -----------------------------------------------
    Character:
      type: object
      required: [id, name, role, color]
      properties:
        id: { type: string }
        name: { type: string }
        role: { type: string }
        color: { type: string }
        lines: { type: integer }
        scenes: { type: integer }
        attributes: { type: array, items: { type: string } }
        aliases:
          type: array
          items: { type: string }
          description: |
            Alternate names this character is known by. Populated when the
            user merges a duplicate roster entry (e.g. "Wren" merged into
            "Wren Sparrow" adds "Wren" here). Surfaced to the voice
            matcher so the same person can be recognised when later books
            in a series detect the character under a different form.
        notLinkedTo:
          type: array
          items:
            type: object
            required: [bookId, characterId]
            properties:
              bookId: { type: string }
              characterId: { type: string }
          description: |
            Cross-book pairs this character has been explicitly marked as
            NOT the same person — e.g. teenage Wren vs adult Wren in
            the same series, both routed to the same base TTS voice but
            intentionally separate cast members. Written symmetrically by
            the `POST /api/books/:bookId/cast/:characterId/not-linked-to`
            route (both books' cast.json carry the matching entry). Used
            by the voices-view duplicate-candidate detection to suppress
            future "same character?" suggestions for the pair. Plan 101.
        tone:
          type: object
          properties:
            warmth: { type: integer }
            pace: { type: integer }
            authority: { type: integer }
            emotion: { type: integer }
        voiceId: { type: string }
        voiceState: { type: string, enum: [generated, tuned, reused, locked] }
        gender:
          type: string
          enum: [male, female, neutral]
          description: |
            Voice gender inferred during analysis. Drives the prebuilt-voice
            picker so e.g. a young boy gets a male voice instead of a neutral
            default. Optional — older cached analyses won't have it.
        ageRange:
          type: string
          enum: [child, teen, adult, elderly]
          description: Coarse age bucket used as a register hint for TTS.
        description: { type: string }
        voiceStyle:
          type: string
          description: |
            Natural-language voice-design persona (plan 108) — a short
            instruct like "a bright, confident teenage girl, warm and a
            little playful, mid-paced, with a hint of anxiety". Generated
            per-character by Gemini from the character's full profile +
            dialogue evidence, then editable by the user. Seeds the Qwen
            sidecar's bespoke voice-design flow
            (`POST /qwen/design-voice {voiceId, instruct, …}`). Optional —
            absent until a persona has been generated.
        ttsEngine:
          type: string
          enum: [coqui, gemini, piper, kokoro, qwen]
          nullable: true
          description: |
            Per-character TTS engine override (plan 108). When set, this
            character is synthesised with this engine instead of the
            project default — e.g. a speaking character moved to bespoke
            Qwen while the narrator stays on a Kokoro preset. Absent means
            "use the project default engine" (back-compat: pre-108 cast.json
            files have no signal here). Resolved server-side by
            `resolveCharacterEngine`.
        overrideTtsVoices:
          type: object
          nullable: true
          description: |
            Per-engine user-set voice overrides for THIS character, keyed
            by `TtsEngine`. Mirrors the same field on `Voice`: each slot
            pins a specific speaker for that engine; the active synth
            engine reads its own slot and falls back to attribute
            inference when absent. For Qwen the slot's `name` is a designed
            voiceId (the bespoke-voice cache key). Engine switches preserve
            assignments so toggling Coqui ↔ Kokoro ↔ Qwen needs no re-cast.
          additionalProperties:
            type: object
            required: [name]
            properties:
              name:
                type: string
                description: "Engine-specific speaker handle (designed voiceId for Qwen)."
              variants:
                type: object
                description: |
                  fs-25 — per-emotion Qwen voice variants (keyed by non-neutral
                  `Emotion`); each is an independently designed voiceId. Absent →
                  emotions fall back to the base `name`. Travels with the base
                  across reuse links (plan 177 Wave 6a).
                additionalProperties:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                      description: 'Designed variant voiceId for this emotion.'
        evidence:
          type: array
          items:
            type: object
            properties:
              quote: { type: string }
              note: { type: string }
        matchedFrom:
          type: object
          nullable: true
          properties:
            bookId:
              {
                type: string,
                description: 'Library book whose confirmed cast holds the matched voice. Required for the library-cast override flow.',
              }
            characterId:
              {
                type: string,
                description: "Character id within bookId's cast.json. Required for the library-cast override flow.",
              }
            bookTitle: { type: string }
            confidence: { type: number, minimum: 0, maximum: 1 }

    FailureCode:
      type: string
      description: |
        fs-19 — stable machine-readable class for a synthesis (or analysis)
        failure. Maps a recurring failure mode to a friendly message +
        remediation server-side (server/src/routes/failure-taxonomy.ts); the
        frontend switches on it for per-class styling. `unknown` is the
        catch-all for an unmapped error (the raw message is surfaced verbatim).
      enum:
        - vram-spill
        - sidecar-unreachable
        - analyzer-rate-limit
        - oom
        - disk-full
        - model-not-loaded
        - synth-timeout
        - xtts-speaker-desync
        - cuda-poisoned
        - auth
        - unknown

    ChapterQaVerdict:
      type: object
      description: |
        srv-27 — advisory post-synthesis audio QA verdict for a rendered
        chapter. ADVISORY only: a `suspect` status drives a badge but never
        gates completion (the chapter still flips to done). Stamped at render
        time and surfaced on the Chapter shape + the `chapter_complete` tick.
      required: [status, reasons, measuredLufs, truePeakDb, durationSec, expectedSec, checkedAt]
      properties:
        status: { type: string, enum: [ok, suspect] }
        reasons:
          type: array
          items: { type: string }
          description: Human-readable reasons behind a `suspect` verdict; empty when ok.
        measuredLufs:
          type: number
          nullable: true
          description: Integrated loudness (LUFS) checked, or null when loudnorm was disabled.
        truePeakDb:
          type: number
          nullable: true
          description: True peak (dBTP) checked, or null when not measured.
        durationSec: { type: number }
        expectedSec:
          type: number
          nullable: true
          description: Text-derived expected length (s), or null when no estimate was available.
        checkedAt: { type: string, format: date-time }

    Chapter:
      type: object
      required: [id, title, duration, state, progress, characters]
      properties:
        id: { type: integer }
        title: { type: string }
        duration: { type: string, example: '12:48' }
        state: { type: string, enum: [queued, in_progress, done, failed] }
        progress: { type: number, minimum: 0, maximum: 1 }
        currentLine: { type: integer }
        totalLines: { type: integer }
        characters:
          type: object
          additionalProperties:
            type: string
            enum: [queued, in_progress, done, skipped, failed]
        errorReason: { type: string, nullable: true }
        generationErrorCode:
          allOf:
            - $ref: '#/components/schemas/FailureCode'
          nullable: true
          description: |
            fs-19 — stable machine code for the last synthesis FAILURE's class
            (e.g. `vram-spill`, `disk-full`, `cuda-poisoned`). Drives the
            frontend's remediation rendering. Absent on never-failed chapters;
            cleared on a successful render.
        generationRemediation:
          type: string
          nullable: true
          description: |
            fs-19 — concrete "what to do about it" copy for the last synthesis
            failure. Surfaced under the error reason on the failed chapter row.
            Absent on never-failed chapters; cleared on a successful render.
        audioQa:
          allOf:
            - $ref: '#/components/schemas/ChapterQaVerdict'
          nullable: true
          description: |
            srv-27 — advisory post-synthesis QA verdict for this chapter's
            audio. Stamped on a successful render; drives the "Suspect" badge.
            Absent on never-rendered / legacy chapters.
        excluded:
          {
            type: boolean,
            description: 'When true, this chapter is skipped by both analysis (Phase 0a + Phase 1) and audio generation. Typically front- or back-matter like Dedication, Copyright, About the Author.',
          }
        held:
          {
            type: boolean,
            description: 'When true, the user explicitly removed this un-rendered chapter from the generation queue ("Not queued"). Unlike `excluded`, a held chapter stays part of the book and keeps any audio — it is simply not on the work queue and the auto-work resume must not re-enqueue it. Cleared when the user re-queues the chapter. Persisted so the choice survives reload.',
          }
        audioModelKey:
          type: string
          enum: [kokoro-v1, qwen3-tts-0.6b, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
          description: |
            TTS model key that produced this chapter's existing audio
            file. Stamped at render time and backfilled from the
            segments file for legacy chapters. Absent on never-rendered
            chapters. The frontend compares against the project's
            current `ui.ttsModelKey` to surface engine-drift badges (see
            `docs/features/archive/35-engine-drift-detection.md`). With
            per-character engine routing (plan 108) this reflects the engine
            the audio actually rendered in (a uniform chapter), not the
            request default.
        audioEngines:
          type: object
          additionalProperties: { type: integer }
          description: |
            Distinct speaking characters per TTS engine they actually rendered
            in, e.g. `{ "kokoro": 1, "qwen": 6 }`. For a uniform chapter it has
            one key matching `audioModelKey`'s engine; a chapter that mixes
            engines (narrator on Kokoro + dialogue on Qwen) carries the full
            breakdown, which the Generation view shows as a per-engine
            voice-count caption instead of a drift badge. Stamped at render
            time, backfilled from the segments file for legacy chapters.
        audioRenderedAt:
          type: string
          format: date-time
          description: |
            ISO timestamp from when the audio was synthesised. Mirrors
            the segments file's `synthesizedAt`. Surfaces alongside the
            drift badge so the user can see how stale the rendered audio
            is.
        titleOverridden:
          type: boolean
          description: |
            When true, the user has manually renamed this chapter and
            the heuristic title-refresh passes (`refreshChapterTitles`
            on book-state GET, and the explicit POST
            `/chapters/refresh-titles`) MUST leave the title alone.
            Set by `renameChapter` and by merge/split when a caller
            supplies an explicit `mergedTitle` / `newTitle`. Absent or
            false on parser-derived titles so heuristic improvements can
            still land.

    Sentence:
      type: object
      required: [id, chapterId, text, characterId]
      properties:
        id: { type: integer }
        chapterId: { type: integer }
        text: { type: string }
        characterId: { type: string }
        startMs: { type: integer }
        endMs: { type: integer }
        emotion:
          $ref: '#/components/schemas/Emotion'

    Emotion:
      type: string
      enum: [neutral, whisper, angry, excited, sad]
      description: |
        fs-25 — per-quote delivery emotion. Absent or `neutral` renders exactly
        as today on every engine. The four expressive values each select a
        pre-designed Qwen voice variant at synth time (`Character.overrideTtsVoices.qwen.variants`);
        on Kokoro/XTTS the tag is a documented no-op. Source per quote from the
        analyzer (Phase-1 inline or the emotion-annotation pass) or a hand-set
        manuscript edit (manual wins). See `docs/features/177-fs25-per-quote-emotion.md`.

    ChapterRestructureResponse:
      type: object
      required: [chapters, sentenceRemap]
      description: |
        Response envelope shared by `mergeChapters`, `splitChapter`, and
        `reorderChapters`. `chapters` is the new state.json chapter list
        (ids re-issued 1..N); `sentenceRemap` is the translation table
        the frontend applies to its sentence cache so it can rewrite
        `chapterId` + per-chapter `id` without re-fetching the full
        sentence list. See `docs/features/archive/51-restructure-chapters.md`.
      properties:
        chapters:
          type: array
          items:
            type: object
            required: [id, title, slug]
            properties:
              id: { type: integer }
              title: { type: string }
              slug: { type: string }
              duration: { type: string }
              excluded: { type: boolean }
              audioModelKey:
                type: string
                enum: [kokoro-v1, qwen3-tts-0.6b, coqui-xtts-v2, gemini-2.5-flash, gemini-3.1-flash]
              audioRenderedAt: { type: string, format: date-time }
              titleOverridden: { type: boolean }
        sentenceRemap:
          type: array
          description: |
            Per-sentence translation entries. Entries whose `oldChapterId`
            doesn't appear in this list are unchanged (mostly chapters
            before the affected range).
          items:
            type: object
            required: [oldChapterId, oldSentenceId, newChapterId, newSentenceId]
            properties:
              oldChapterId: { type: integer }
              oldSentenceId: { type: integer }
              newChapterId: { type: integer }
              newSentenceId: { type: integer }

    # --- Audiobook export ------------------------------------------
    BookExportRequest:
      type: object
      required: [format, destination]
      properties:
        format:
          type: string
          enum: [mp3-zip, m4b, mp3-folder, aac-m4a-zip, opus-ogg-zip]
          description: |
            Container format. `mp3-zip` packages per-chapter MP3s into
            a zip — universal compatibility, no re-encode (the LAME
            VBR V2 frames round-trip byte-identical). `m4b` produces
            a single AAC-LC file at 96 kbps mono 44.1 kHz with
            QuickTime chapter atoms; PocketBook surfaces it under
            Audiobooks with chapter UI + resume position. M4B
            re-encodes from MP3 → AAC. `mp3-folder` writes the per-
            chapter MP3s into a sub-folder named after the book
            (each tagged with the same ID3v2 + optional APIC cover
            as the zip variant) — the folder-scanning audiobook apps
            (Smart AudioBook Player, Audiobookshelf, BookPlayer via
            Files import) pick up a folder per book. `mp3-folder` is
            only valid with `destination: sync-folder` since the
            download endpoint serves single files.
            `aac-m4a-zip` and `opus-ogg-zip` (plan 72) are the codec-
            zip companions of `mp3-zip` — they package the per-chapter
            `.m4a` (AAC-LC ≈ 128 kbps in MP4/M4A) or `.ogg` (Opus ≈
            96 kbps VBR) files into a zip without re-tagging. Requires
            the book's `audioFormat` to match the export codec; books
            generated as mp3 can't be exported as `aac-m4a-zip`
            without re-running generation under the new format.
        destination:
          type: string
          enum: [download, sync-folder]
          description: |
            `download` stages the file under the book's `.audiobook/exports/`
            for the user to pull via `downloadBookExport`. `sync-folder`
            additionally copies the finished archive into the user's
            configured `exportSyncFolder` (e.g. a OneDrive watch path) so
            it lands on their phone via sync. Requires `exportSyncFolder`
            to be set; the request 400s otherwise. `mp3-folder` requires
            this to be `sync-folder` (the download endpoint serves single
            files, not directory trees).

    BookExportJob:
      type: object
      required: [id, bookId, format, destination, status, filename, createdAt]
      properties:
        id: { type: string, description: 'Server-generated export id' }
        bookId: { type: string }
        format: { type: string, enum: [mp3-zip, m4b, mp3-folder, aac-m4a-zip, opus-ogg-zip] }
        destination: { type: string, enum: [download, sync-folder] }
        status:
          type: string
          enum: [queued, in_progress, done, failed, cancelled]
        filename: { type: string, description: "e.g. 'The Northern Star.zip'" }
        sizeBytes:
          { type: integer, nullable: true, description: "Final size once status === 'done'." }
        progress:
          {
            type: number,
            minimum: 0,
            maximum: 1,
            nullable: true,
            description: '0..1 while in_progress; null otherwise.',
          }
        downloadUrl:
          {
            type: string,
            nullable: true,
            description: "Set once status === 'done' AND destination === 'download'.",
          }
        syncPath:
          {
            type: string,
            nullable: true,
            description: "Absolute path the archive was copied to when destination === 'sync-folder'.",
          }
        errorReason:
          {
            type: string,
            nullable: true,
            description: "Human-readable failure reason; populated when status === 'failed'.",
          }
        createdAt: { type: string, description: 'ISO timestamp' }
        completedAt:
          {
            type: string,
            nullable: true,
            description: 'ISO timestamp once status leaves in_progress.',
          }
        warning:
          type: string
          description: |
            srv-28 — non-fatal disk-space advisory, present only on the POST
            201 response body when the pre-flight disk guard is in `warn` mode
            and free space is tight. The build still proceeds; the export modal
            surfaces this next to the queued job. Absent when the guard was ok /
            off, and never present on a poll (GET) response.

    BookShareLink:
      type: object
      required: [slug, url]
      properties:
        slug:
          type: string
          description: |
            12-char Crockford-style base32 slug (no vowels, no easily-
            confused glyphs). Stable per book: a second POST returns
            the same slug.
        url:
          type: string
          description: |
            Absolute URL the caller can paste into a chat. Resolves via
            GET /share/{slug} to the book's most-recent M4B export.
        expiresAt:
          type: string
          nullable: true
          description: |
            ISO timestamp at which the slug becomes a 404. Optional —
            v1 mints non-expiring slugs (omitted from the response).

    ExportLanInfo:
      type: object
      required: [urls, port, protocol]
      properties:
        port:
          type: integer
          description: "The Node server's listening port. 8080 in HTTP mode (default), 8443 in HTTPS mode (LAN_HTTPS=1, plan 81 mobile + tablet support)."
        protocol:
          type: string
          enum: [http, https]
          description: "Scheme of the URLs in `urls`. `https` when LAN_HTTPS=1 is set (mkcert-backed TLS for mobile/tablet LAN access), `http` otherwise."
        urls:
          type: array
          items: { type: string, description: "Reachable URL, e.g. 'http://192.168.1.42:8080' or 'https://192.168.1.42:8443'" }
        token:
          type: string
          description: "srv-20 — the shared-secret LAN token, present only when LAN_AUTH_TOKEN is configured. The companion pairing QR carries it so a device can authenticate to the otherwise-guarded /api surface."
        caFingerprint:
          type: string
          description: "srv-20 — the LAN CA's SHA-256 (X.509 fingerprint256), present only when the mkcert root CA is resolvable. A pairing client fetches /cert/root.crt, computes the same fingerprint, and pins only if it matches."

    Device:
      type: object
      required: [id, label, createdAt, revoked]
      description: "srv-33 — a paired companion device. Never carries token material (only the SHA-256 is persisted server-side)."
      properties:
        id: { type: string, description: "Stable device id (used to revoke)." }
        label: { type: string, description: "Human label, e.g. the phone name." }
        createdAt: { type: string, format: date-time }
        lastSeenAt: { type: string, format: date-time, description: "Optional; last time this device's token was accepted." }
        revoked: { type: boolean, description: "True once revoked — the guard then rejects its token." }

    GpuQueueState:
      type: object
      required: [depth, inFlight, max]
      properties:
        depth:
          type: integer
          minimum: 0
          description: "Number of acquires waiting in the FIFO queue behind the in-flight ops. The frontend pill renders 'GPU busy · N waiting ·' when this is > 0."
        inFlight:
          type: integer
          minimum: 0
          description: "Number of GPU ops currently holding a slot (analyzer + sidecar combined). Capped at `max`."
        max:
          type: integer
          minimum: 1
          description: "Configured concurrency ceiling — the GPU_CONCURRENCY env var (default 1). Bump only after measuring VRAM headroom on the target GPU."

    # --- Per-run resource telemetry (fs-20) ---------------------------
    ResourceTelemetryRecord:
      type: object
      required:
        [at, bookId, bookTitle, chapterId, title, modelKey, rtf, audioSec, wallSec, vramReservedMb, vramTotalMb, committedHostMb]
      description: |
        One per-chapter telemetry sample captured right after a chapter
        rendered: throughput (RTF, audio/wall seconds) + GPU and host-RAM
        figures from a best-effort sidecar /health probe (null when the probe
        timed out / the sidecar was down).
      properties:
        at: { type: string, format: date-time }
        bookId: { type: string, nullable: true }
        bookTitle: { type: string, nullable: true, description: 'Human-readable book title at render time (state.json title); null for legacy records written before this field or when the book title was unknown.' }
        chapterId:
          oneOf:
            - type: integer
            - type: string
        title: { type: string, nullable: true }
        modelKey: { type: string, nullable: true }
        rtf: { type: number, nullable: true, description: 'synth wall ÷ audio (< 1 = faster than realtime).' }
        audioSec: { type: number }
        wallSec: { type: number }
        vramReservedMb: { type: number, nullable: true }
        vramTotalMb: { type: number, nullable: true }
        committedHostMb: { type: number, nullable: true }

    ResourceTelemetryResponse:
      type: object
      required: [records]
      properties:
        records:
          type: array
          items: { $ref: '#/components/schemas/ResourceTelemetryRecord' }

    # --- Admin diagnostics board (fs-18) ------------------------------
    DiagnosticsCheck:
      type: object
      required: [id, label, status, detail]
      properties:
        id:
          type: string
          enum: [gpu, sidecar, asr, analyzer, gemini, ffmpeg, disk]
          description: Stable identifier for the check (drives the UI row key). `sidecar` is the Voice engine; `asr` is the Whisper content-QA engine.
        label:
          type: string
          description: Friendly display label, e.g. "GPU / VRAM".
        status:
          type: string
          enum: [ok, warn, fail]
          description: Per-check severity.
        detail:
          type: string
          description: Human-readable technical line, e.g. "cuda · 1.2 / 8.0 GB reserved".
        value:
          nullable: true
          description: Optional compact machine value the UI can render (GB free, model name, etc.).
          oneOf:
            - type: string
            - type: number
    DiagnosticsResponse:
      type: object
      required: [ts, overall, checks]
      properties:
        ts:
          type: string
          format: date-time
          description: ISO timestamp the board was produced.
        overall:
          type: string
          enum: [ok, warn, fail]
          description: Worst severity across all checks — drives the top-bar status dot.
        checks:
          type: array
          items: { $ref: '#/components/schemas/DiagnosticsCheck' }

    # --- Cross-book duplicate "not linked to" (plan 101 + fs-11) -----
    NotLinkedToRequest:
      type: object
      required: [otherBookId, otherCharacterId]
      description: |
        The OTHER side of a cross-book pair. The source side comes from the
        path (`bookId` + `characterId`).
      properties:
        otherBookId: { type: string }
        otherCharacterId: { type: string }
    CastCharacterRef:
      type: object
      required: [bookId, characterId]
      properties:
        bookId: { type: string }
        characterId: { type: string }
    NotLinkedToResponse:
      type: object
      required: [pair]
      description: The symmetric pair written to (or removed from) both books.
      properties:
        pair:
          type: object
          required: [a, b]
          properties:
            a: { $ref: '#/components/schemas/CastCharacterRef' }
            b: { $ref: '#/components/schemas/CastCharacterRef' }

    # --- Book-open hydrate composite (GET /api/books/{bookId}/state) --
    BookStateResponse:
      type: object
      description: |
        Book-open hydrate composite. Canonical per-field shape is hand-modeled
        in `src/lib/types.ts:BookStateResponse`; this schema enumerates the
        top-level keys and references the component schemas that exist, keeping
        `state` (`BookStateJson`) and the loose `Record` maps permissive rather
        than duplicating those large shapes here.
      required: [state, cast, manuscript, manuscriptEdits, revisions, completedSlugs, changeLog]
      properties:
        state:
          type: object
          additionalProperties: true
          description: |
            `BookStateJson` from `<bookDir>/.audiobook/state.json` (title,
            author, series, castConfirmed, tags, language, …). Hand-modeled in
            `src/lib/types.ts`; kept permissive here rather than duplicated.
        cast:
          type: object
          nullable: true
          required: [characters]
          properties:
            characters:
              type: array
              items: { $ref: '#/components/schemas/Character' }
        manuscript:
          type: object
          nullable: true
          required: [wordCount, format]
          description: Lightweight manuscript meta pulled from the in-memory ManuscriptRecord.
          properties:
            wordCount: { type: integer }
            format: { type: string }
        manuscriptEdits:
          type: object
          nullable: true
          properties:
            sentences:
              type: array
              items: { $ref: '#/components/schemas/Sentence' }
        revisions:
          type: object
          nullable: true
          properties:
            pending:
              type: array
              items: { $ref: '#/components/schemas/Revision' }
            drift:
              type: array
              items: { $ref: '#/components/schemas/DriftEvent' }
            dismissed:
              type: array
              items: { type: string }
            acceptedSelections:
              type: object
              additionalProperties: true
              description: revisionId → { segmentIndex → 'A' | 'B' } captured at accept time.
        completedSlugs:
          type: array
          items: { type: string }
          description: Slugs of chapters that already have an audio file on disk.
        chapterLufs:
          type: object
          additionalProperties: true
          description: |
            chapterId → EBU R128 loudness sidecar payload (a `ChapterLoudness`,
            or null when the sidecar is missing). Permissive map; the value
            shape is `ChapterLoudness`.
        chapterCharacters:
          type: object
          description: chapterId → analysed speaker ids that actually speak in the chapter.
          additionalProperties:
            type: array
            items: { type: string }
        renderedFallbackByCharacter:
          type: object
          description: |
            fe-16 — characterId → the engine the character ACTUALLY rendered in
            when it differs from its configured engine (`kokoro` when a Qwen
            character fell back across any rendered chapter). Threaded into
            `resolveVoiceStatus` so the cast Status pill reads
            "Fallback (Kokoro)". Empty/absent when nothing fell back.
          additionalProperties: { type: string }
        changeLog:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/ChangeLogEvent' }
          description: Editorial activity trail; null when no change-log.json exists yet.
        analysis:
          type: object
          description: Persistent analysis state for the analysing view's per-chapter Retry buttons.
          properties:
            failedChapterIds:
              type: array
              items: { type: integer }
