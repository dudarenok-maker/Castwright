name: app

# Flutter companion app (apps/android/) CI lane — analyze + test + debug APK on
# every change, plus the unsigned iOS compile that keeps the codebase iOS-ready
# (plan 188, app-1 / D7). Path-filtered so non-app changes never trigger it, and
# the heavy frontend/server/e2e `verify` battery is irrelevant to app-only PRs.
on:
  push:
    branches: [main]
    paths:
      - 'apps/android/**'
      - '.github/workflows/app.yml'
  pull_request:
    paths:
      - 'apps/android/**'
      - '.github/workflows/app.yml'

defaults:
  run:
    working-directory: apps/android

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --debug
      # app-11: also build the release APK (debug-signed fallback unless signing
      # secrets are wired) and publish it as an installable alpha sideload artifact.
      - run: flutter build apk --release
      # Guard the 16 KB page-size fix (mobile_scanner 7 / secure_storage 10 /
      # NDK r28): every bundled arm64 native lib must have ≥16 KB-aligned LOAD
      # segments or it warns / runs in compat-mode on 16 KB-page devices.
      - name: Verify 16 KB ELF alignment (arm64)
        run: |
          set -euo pipefail
          apk="build/app/outputs/flutter-apk/app-release.apk"
          work="$(mktemp -d)"
          unzip -o -q "$apk" 'lib/arm64-v8a/*.so' -d "$work"
          fail=0
          for so in "$work"/lib/arm64-v8a/*.so; do
            bad=$(readelf -lW "$so" | awk '/LOAD/{a=strtonum($NF); if(a<16384) print a}')
            if [ -n "$bad" ]; then
              echo "::error::$(basename "$so") is NOT 16 KB-aligned"; fail=1
            else
              echo "ok: $(basename "$so")"
            fi
          done
          exit $fail
      - uses: actions/upload-artifact@v4
        with:
          name: castwright-release-apk
          path: apps/android/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
      # Build-health for the Google Play channel: keep `bundleRelease` green so
      # the AAB target can't rot. Debug-signed here (no keystore secret in CI) —
      # NOT a Play upload artifact; the real Play AAB is built locally with the
      # upload keystore (`android/key.properties`). See apps/android/README.md.
      - run: flutter build appbundle --release
      # ops-17 / #790 — Trip B. The KGP escape-hatch flags must stay present:
      # deleting them silently re-breaks the build under AGP 9 (the unmigrated
      # audio_session / flutter_foreground_task / mobile_scanner plugins).
      - name: Guard KGP escape-hatch flags (ops-17 / #790)
        run: |
          set -euo pipefail
          props=android/gradle.properties
          for flag in 'android.builtInKotlin=false' 'android.newDsl=false'; do
            grep -qF "$flag" "$props" || {
              echo "::error::missing '$flag' in $props — KGP escape hatch (ops-17/#790)"; exit 1; }
          done
          echo "ok: KGP escape-hatch flags present"
      # ops-17 / #790 — Trip B. The whole "escape-hatch removal can't surprise
      # us" guarantee rests on the Flutter pin holding. Assert EVERY flutter-version
      # in app.yml (it pins two jobs: android + ios-compile) AND app-deps-watch.yml
      # is the SAME version, so neither drifts silently.
      - name: Guard Flutter-pin lockstep (ops-17 / #790)
        working-directory: ${{ github.workspace }}
        run: |
          set -uo pipefail
          # `sort -u` over ALL pins from both files; `head` is LAST in each pipe
          # so nothing writes to a closed pipe (avoids a SIGPIPE false-red under
          # pipefail). One unique value across both files == lockstep.
          pins=$(grep -hE 'flutter-version:' \
                   .github/workflows/app.yml \
                   .github/workflows/app-deps-watch.yml \
                 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | sort -u)
          count=$(printf '%s\n' "$pins" | grep -c .)
          if [ "$count" -ne 1 ]; then
            echo "::error::Flutter pin drift across app.yml / app-deps-watch.yml (ops-17/#790):"
            printf '%s\n' "$pins"
            exit 1
          fi
          echo "ok: Flutter pin lockstep at $pins"

  ios-compile:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true
      - run: flutter pub get
      - run: flutter build ios --no-codesign
