name: Release

# Plan 49 — tag-triggered release pipeline.
# Push a `vX.Y.Z` tag (scripts/bump-version.mjs creates it) to fire this.
# Builds the platform-independent release zip, attaches the tag annotation
# as the release body, publishes to GitHub Releases.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # Sanity-net: confirm the tagged commit builds + tests on Ubuntu before
  # publish. If verify fails, the publish job is skipped and the release does
  # NOT land.
  #
  # Plan 103 — the per-release cross-OS matrix (macOS + Windows) was retired
  # from this workflow: macOS bills at a 10× multiplier on a <4-min job, so
  # each release tag was paying ~46 billed minutes for cross-OS smoke that
  # scales with release cadence. The macOS + Windows verify smoke now lives
  # in cross-os.yml (workflow_dispatch + weekly cron on main). Fire that
  # workflow MANUALLY before announcing any release that ships a zip to
  # alpha testers — the deployer spread is still Windows + macOS + Linux.
  # See docs/features/103-ci-cost-reduction.md.
  verify:
    name: Verify (ubuntu-latest)
    runs-on: ubuntu-latest
    # Explicit cap (default is 360 min). (CI cost round 2.)
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          # Bumped 20 → 24 alongside plan 81 / wave 1 (see verify.yml).
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install server deps
        run: npm --prefix server ci

      # The server pretest hook (`scripts/preflight-ffmpeg.cjs`) refuses to
      # run when ffmpeg isn't on PATH — the MP3 encoder in
      # `server/src/tts/mp3.ts` shells out to it. `SKIP_FFMPEG_PREFLIGHT=1`
      # exists as an escape hatch but it makes `mp3.test.ts` silently skip —
      # we want the gate.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # fe-37 — a hand-cut tag must not publish empty/placeholder user-facing
      # notes. The committed RELEASE_NOTES.md top section must lead with the tag
      # version (bump-version.mjs enforces the same gate at tag-creation time).
      - name: Guard — committed release notes are real
        run: node scripts/release-notes-gate.mjs "${{ github.ref_name }}"

      # `verify:quick` is `test:all` (hooks + frontend + server + scripts +
      # sidecar). Sidecar tests skip with a banner if the venv isn't
      # bootstrapped (which it won't be on a fresh runner — that's fine,
      # we don't ship a sidecar test gate for the release pipeline).
      - name: Verify
        run: npm run verify:quick

      - name: Build
        run: npm run build

  # Build the companion artifacts ONCE (versioned in lockstep via
  # bump-version.mjs → pubspec) and hand them to `publish` as a workflow
  # artifact. Two parallel channels from one signed build:
  #   - the sideload APK, which `publish` bundles INTO the server zip (so the
  #     in-app "Download .apk" button works straight from the install) AND
  #     attaches as a standalone release asset;
  #   - the Google Play AAB, attached as a standalone release asset for the
  #     Play internal/closed testing track.
  # Building here (not inside publish) keeps the Flutter toolchain off the zip
  # job and lets the build run in parallel with verify.
  companion-apk-build:
    name: Build companion APK + AAB
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/android
    # Expose whether the build was signed with the real upload key so `publish`
    # only attaches the AAB when it's an actual Play-uploadable artifact (a
    # debug-signed AAB is useless — Play rejects it).
    outputs:
      signed: ${{ steps.signing.outputs.signed }}
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true
      # app-11 release signing in CI: materialise the git-ignored upload keystore
      # + key.properties from repo secrets so the released APK + AAB are signed
      # with the STABLE upload key (Play App Signing). Without the secret (forks,
      # or before the maintainer adds it) the release build falls back to debug
      # signing exactly as before — the AAB is then NOT attached (see `signed`).
      # Required secrets: ANDROID_UPLOAD_KEYSTORE_BASE64 (base64 of
      # upload-keystore.jks), ANDROID_UPLOAD_KEYSTORE_PASSWORD,
      # ANDROID_UPLOAD_KEY_PASSWORD, ANDROID_UPLOAD_KEY_ALIAS.
      - name: Wire upload keystore (release signing)
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::No ANDROID_UPLOAD_KEYSTORE_BASE64 secret — release APK/AAB will be DEBUG-signed and the AAB will NOT be attached (Play rejects debug-signed bundles). Add the upload-keystore secrets to ship a Play artifact."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Strip stray CR before use: a secret set via a PowerShell pipe can
          # carry a trailing \r\n, which corrupts the base64 decode (GNU base64
          # chokes on \r) and turns values like the key alias into "upload\r"
          # (breaking the gradle keyAlias lookup). Belt-and-suspenders even
          # though the secrets are currently set cleanly via `gh secret set --body`.
          KEYSTORE_BASE64=${KEYSTORE_BASE64//$'\r'/}
          KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD//$'\r'/}
          KEY_PASSWORD=${KEY_PASSWORD//$'\r'/}
          KEY_ALIAS=${KEY_ALIAS//$'\r'/}
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          {
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "storeFile=upload-keystore.jks"
          } > android/key.properties
          echo "Wired upload keystore — release APK + AAB are upload-key-signed."
          echo "signed=true" >> "$GITHUB_OUTPUT"
      - run: flutter pub get
      - run: flutter build apk --release
      - run: flutter build appbundle --release
      - name: Stage + checksum
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "castwright-${{ github.ref_name }}.apk"
          cp build/app/outputs/bundle/release/app-release.aab \
            "castwright-${{ github.ref_name }}.aab"
          shasum -a 256 "castwright-${{ github.ref_name }}.apk" \
            > "castwright-${{ github.ref_name }}.apk.sha256"
          shasum -a 256 "castwright-${{ github.ref_name }}.aab" \
            > "castwright-${{ github.ref_name }}.aab.sha256"
          cat "castwright-${{ github.ref_name }}.apk.sha256" \
            "castwright-${{ github.ref_name }}.aab.sha256"
      - name: Upload companion artifacts
        uses: actions/upload-artifact@v4
        with:
          name: companion-apk
          path: |
            apps/android/castwright-${{ github.ref_name }}.apk
            apps/android/castwright-${{ github.ref_name }}.apk.sha256
            apps/android/castwright-${{ github.ref_name }}.aab
            apps/android/castwright-${{ github.ref_name }}.aab.sha256
          retention-days: 1

  # Publish: builds the zip + SHA-256 on Ubuntu (the zip is platform-
  # independent, no need to build it three times) and uploads them to the
  # GitHub Release. Gated on verify AND the APK build so the zip can bundle it.
  publish:
    name: Publish release zip
    needs: [verify, companion-apk-build]
    runs-on: ubuntu-latest
    # Explicit cap (default is 360 min). (CI cost round 2.)
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # `fetch-depth: 0` alone fetches all commits but actions/checkout
          # leaves `fetch-tags: false` by default, so the tag *object* (with
          # its annotation) is never pulled. With `fetch-tags: true` the FIRST
          # fetch pulls the annotated tag — but actions/checkout then runs a
          # second `git fetch --no-tags origin +<SHA>:refs/tags/<tag>` that
          # silently overwrites it with a lightweight tag pointing at the same
          # commit. From that point on `git tag -l --format='%(contents)'`
          # returns the commit subject and the GitHub Release body ends up as
          # just "chore: bump version to X.Y.Z". v1.2.2 and v1.3.0 both shipped
          # with empty bodies for exactly this reason; the explicit re-fetch
          # below restores the annotated tag object.
          fetch-depth: 0
          fetch-tags: true

      - name: Restore annotated tag (actions/checkout strips the annotation)
        run: |
          git tag -d "${{ github.ref_name }}" || true
          git fetch --tags --force origin \
            "refs/tags/${{ github.ref_name }}:refs/tags/${{ github.ref_name }}"
          # Sanity-check: cat-file should now report `tag` (annotated), not
          # `commit` (lightweight). Fail loudly if the restore didn't take.
          type="$(git cat-file -t "refs/tags/${{ github.ref_name }}")"
          if [ "$type" != "tag" ]; then
            echo "::error::Expected annotated tag, got $type. Release body will be wrong."
            exit 1
          fi
          echo "tag type: $type — annotation restored"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          # Bumped 20 → 24 alongside plan 81 / wave 1 (see verify.yml).
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install server deps
        run: npm --prefix server ci

      - name: Build (frontend + server)
        run: npm run build

      - name: Download companion APK
        uses: actions/download-artifact@v4
        with:
          name: companion-apk
          path: companion-apk

      - name: Build release zip
        # COMPANION_APK_SRC points the zip builder at the APK we just downloaded,
        # so it lands at <release>/companion/castwright-companion.apk where the
        # server's GET /api/companion/apk serves it from.
        env:
          COMPANION_APK_SRC: companion-apk/castwright-${{ github.ref_name }}.apk
        run: node scripts/build-release-zip.mjs --version "${{ github.ref_name }}"

      - name: SHA-256
        run: |
          cd release
          shasum -a 256 "castwright-${{ github.ref_name }}.zip" \
            > "castwright-${{ github.ref_name }}.zip.sha256"
          cat "castwright-${{ github.ref_name }}.zip.sha256"

      - name: Read tag annotation for release body
        # `--format='%(contents)'` returns the annotated tag message verbatim.
        # If the bumper used the placeholder annotation (no --notes-file), the
        # body will be brief — that's expected and the maintainer is reminded
        # at bump time to use --notes-file for real releases.
        run: |
          git tag -l --format='%(contents)' "${{ github.ref_name }}" \
            > release/tag-notes.md
          cat release/tag-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "release/castwright-${{ github.ref_name }}.zip" \
            "release/castwright-${{ github.ref_name }}.zip.sha256" \
            --title "Castwright ${{ github.ref_name }}" \
            --notes-file release/tag-notes.md

      - name: Attach companion APK to release
        # Same APK that's bundled inside the zip, also offered as a standalone
        # download asset (with its checksum) for manual sideloads.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "companion-apk/castwright-${{ github.ref_name }}.apk" \
            "companion-apk/castwright-${{ github.ref_name }}.apk.sha256" --clobber

      - name: Attach companion AAB to release (Google Play)
        # The Play App Bundle for the internal/closed testing track. Attached only
        # when the build was signed with the real upload key (see the build job's
        # `signed` output) — a debug-signed AAB is not Play-uploadable. NOT bundled
        # into the server zip: the zip serves the APK; the AAB is a Play artifact.
        if: needs.companion-apk-build.outputs.signed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "companion-apk/castwright-${{ github.ref_name }}.aab" \
            "companion-apk/castwright-${{ github.ref_name }}.aab.sha256" --clobber

  # plan 188 / app-12 prep — build the companion for iOS UNSIGNED so the release
  # pathway exists + the iOS build is gated each release. An installable .ipa
  # needs Apple signing certs (app-12); until then we attach the unsigned
  # archive so it can be signed + exported later.
  companion-ios:
    name: Companion iOS (unsigned, app-12 prep)
    needs: publish
    runs-on: macos-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true
      - run: flutter pub get
      - run: flutter build ipa --no-codesign
      - name: Package unsigned artifact
        run: |
          set -e
          out="castwright-${{ github.ref_name }}-ios-unsigned"
          if ls build/ios/ipa/*.ipa >/dev/null 2>&1; then
            cp build/ios/ipa/*.ipa "$out.ipa"
            echo "ASSET=apps/android/$out.ipa" >> "$GITHUB_ENV"
          else
            # --no-codesign can't export a distributable .ipa; ship the archive.
            ditto -c -k --sequesterRsrc --keepParent \
              build/ios/archive/Runner.xcarchive "$out.xcarchive.zip"
            echo "ASSET=apps/android/$out.xcarchive.zip" >> "$GITHUB_ENV"
          fi
      - name: Attach to release
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "$ASSET" --clobber
