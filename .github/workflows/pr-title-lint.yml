name: PR title lint

on:
  pull_request:
    # `edited` dropped (plan 103): title typo-fixes re-fired the lint for no
    # gain. `opened` + `reopened` catch the title at PR creation; a malformed
    # title surfaced then persists in the statusCheckRollup until a real push
    # (`synchronize`) re-runs the check. Saves the per-edit re-fires.
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  lint:
    name: Validate PR title against commit convention
    runs-on: ubuntu-latest
    # Tiny validator; cap explicitly so a hung run can't bill the 360-min
    # default. (CI cost round 2 — docs/features/118-ci-cost-round-2.md.)
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Aligned with verify.yml / release.yml (Node 24) — keeps CI Node
          # consistent across all three workflows.
          node-version: '24'

      - name: Write PR title to a temp file
        # Use the GITHUB_ENV / file-passing pattern so the title can't be
        # interpreted as a shell expression. The validator reads from a file.
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf '%s\n' "$PR_TITLE" > "$RUNNER_TEMP/pr-title.txt"

      - name: Validate PR title
        # Reuses the exact same validator the local commit-msg hook calls.
        # Adding a new type/scope in scripts/validate-commit-msg.mjs auto-
        # propagates here with no workflow edit.
        run: node scripts/validate-commit-msg.mjs "$RUNNER_TEMP/pr-title.txt"
