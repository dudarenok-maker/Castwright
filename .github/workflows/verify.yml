name: Verify

# Plan 60 — CI verify-on-PR. Plan 103 — per-PR cost reduction.
#
# Runs the verify battery on every PR targeting main so red tests block
# merge, but only the LEGS whose scope actually changed. A single job does
# setup once, detects which scopes the PR touched (git diff against the PR
# base), then gates each expensive leg (server tests, e2e, build, …) behind
# an `if:` on that scope. A PR that touches only `src/**` skips the server
# tests; a server-only PR skips the frontend unit suite + Playwright e2e;
# etc. The local pre-push hook still runs the FULL `npm run verify` battery,
# so CI only trusts the path-filter for the scoped subset — nothing is
# permanently un-covered. See docs/features/103-ci-cost-reduction.md.
#
# Why one job with conditional steps (not a job-per-leg matrix): GitHub bills
# each job's wall-clock separately, summed, rounded UP to the minute per job.
# Parallel jobs would duplicate `npm ci` + pay a 1-min floor each, which
# INCREASES billed minutes for multi-scope PRs. One job → setup paid once,
# skipped legs cost ~0.
#
# Plan 101 — doc-only PR fast-path. The `paths-ignore` block below skips the
# whole workflow when EVERY changed file matches a doc glob. The scope
# detector below is the second tier for non-doc PRs.
# See docs/features/archive/101-docs-only-ci-skip.md.

on:
  pull_request:
    # `ready_for_review` is REQUIRED alongside the draft-skip `if:` on the
    # job: a job skipped by `if:` reports no status, so a draft PR's required
    # `verify` check would be absent and block merge. Firing on
    # `ready_for_review` re-triggers the run the moment a draft is promoted,
    # so the gate appears exactly when the PR becomes mergeable.
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/*.md'

permissions:
  contents: read

# Cancel an in-flight run when the PR is updated; the new commit's run
# supersedes any prior one for the same PR.
concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # NOTE: keep this `name:` value EXACTLY "npm run verify" — it is the
    # branch-protection required status-check name. The job no longer runs
    # the literal `npm run verify` command (it runs the scoped subset of
    # legs), but renaming it would silently drop the required check and let
    # un-verified PRs merge. Do not rename without flipping branch protection.
    name: npm run verify
    runs-on: ubuntu-latest
    # Skip drafts — they re-fire every check on `ready_for_review` (see the
    # trigger note above), so running on every draft push is pure waste.
    if: github.event.pull_request.draft == false
    # 20 (not 15): a run that dies AT the cap bills the full cap for nothing and
    # forces a re-run = double charge. Full-scope runs sit ~13-15 min, so 15 rode
    # the edge. Headroom is bounded by the cancel-in-progress concurrency above.
    # See docs/features/118-ci-cost-round-2.md.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the scope detector can diff the PR head against
          # its base commit. A shallow clone wouldn't have the base reachable.
          fetch-depth: 0

      # Detect which scopes the PR touched by diffing the merge base against
      # the PR head. Each output is a literal 'true'/'false' string consumed
      # by the `if:` on every leg below. Pure bash + git — no third-party
      # action, matching this repo's all-first-party (actions/*) convention.
      - name: Detect changed scopes
        id: changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          FILES="$(git diff --name-only "$BASE" "$HEAD")"
          echo "Changed files in this PR:"
          echo "$FILES"
          echo "---"
          match() { echo "$FILES" | grep -qE "$1"; }
          frontend=false; server=false; sidecar=false
          e2e=false; scripts=false; hooks=false; shared=false
          match '^(src/|index\.html$|vite\.config\.ts$|tailwind\.config\.ts$|tsconfig\.json$|tsconfig\.node\.json$|postcss\.config\.js$|eslint\.config\.(js|mjs)$)' && frontend=true
          match '^(server/src/|server/package(-lock)?\.json$|server/tsconfig\.json$|server/vitest\.config(\.slow)?\.ts$|openapi\.yaml$)' && server=true
          match '^server/tts-sidecar/' && sidecar=true
          match '^(e2e/|playwright\.config\.ts$)' && e2e=true
          match '^scripts/' && scripts=true
          match '^(\.husky/|scripts/run-hooks-tests\.mjs$|scripts/validate-commit-msg\.mjs$)' && hooks=true
          # `shared` = a ROOT dependency manifest changed → treat as global
          # (a dep/lockfile bump can affect every leg), so run everything.
          match '^(package\.json|package-lock\.json)$' && shared=true
          for k in frontend server sidecar e2e scripts hooks shared; do
            echo "$k=${!k}" >> "$GITHUB_OUTPUT"
            echo "scope $k=${!k}"
          done

      # Node 24 (matches the dev box, plan 81 / wave 1) + npm download cache +
      # node_modules cache + conditional `npm ci`. Extracted to a composite so
      # a Node-major bump is a one-file edit shared with cross-os.yml (plan
      # 106). MUST run after Checkout — the action file only exists post-clone.
      - name: Setup Node + deps
        uses: ./.github/actions/setup

      - name: Lint
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.server == 'true' || steps.changes.outputs.scripts == 'true' || steps.changes.outputs.shared == 'true'
        run: npm run lint

      - name: Typecheck
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.server == 'true' || steps.changes.outputs.shared == 'true'
        run: npm run typecheck

      - name: Hooks tests
        if: steps.changes.outputs.hooks == 'true' || steps.changes.outputs.scripts == 'true' || steps.changes.outputs.shared == 'true'
        run: npm run test:hooks

      - name: PowerShell-helper tests (Pester)
        # No-ops with a banner on a runner without Pester 5 (the GitHub
        # ubuntu image ships pwsh but not Pester 5), exactly as the old
        # `npm run verify` leg did. Kept gated on `scripts` so it provides
        # real coverage if/when Pester 5 is bootstrapped on the runner.
        if: steps.changes.outputs.scripts == 'true'
        run: npm run test:scripts

      # `--changed <base>` narrows the frontend vitest run to only the tests
      # whose module graph touches this PR's diff (CI cost round 2). Reliable
      # here because tests are colocated and statically import their unit. A
      # change to src/test/setup.ts (runner-injected, NOT import-reachable)
      # forces a full run via forceRerunTriggers in vitest.config.ts; a root
      # dep/config bump (the `shared` scope) forces a full run via vitest's
      # default triggers. test:a11y stays always-on as a cheap core-view gate.
      # See docs/features/118-ci-cost-round-2.md.
      - name: Frontend tests + a11y
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.e2e == 'true' || steps.changes.outputs.shared == 'true'
        run: npx vitest run --changed "${{ github.event.pull_request.base.sha }}" && npm run test:a11y

      # ffmpeg is needed by the server MP3 encoder (server/src/tts/mp3.ts
      # shells out to it) and by the e2e suite's audio paths. Install it only
      # when a leg that needs it will run.
      - name: Install ffmpeg
        if: steps.changes.outputs.server == 'true' || steps.changes.outputs.sidecar == 'true' || steps.changes.outputs.e2e == 'true' || steps.changes.outputs.shared == 'true'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # `--changed <base>` narrows both server configs to diff-affected tests
      # (CI cost round 2). The slow config still serial-runs ONLY the hot files
      # the diff actually touched. Run from server/ so the per-dir vitest
      # config loads. A sidecar-only PR touches no server TS graph → 0 tests
      # run here, which is correct (server tests mock the Python sidecar).
      # See docs/features/118-ci-cost-round-2.md.
      - name: Server tests (fast + slow)
        if: steps.changes.outputs.server == 'true' || steps.changes.outputs.sidecar == 'true' || steps.changes.outputs.shared == 'true'
        run: |
          cd server
          npx vitest run --changed "${{ github.event.pull_request.base.sha }}"
          npx vitest run --config vitest.config.slow.ts --changed "${{ github.event.pull_request.base.sha }}"

      - name: Cache Playwright browsers
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.e2e == 'true' || steps.changes.outputs.shared == 'true'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright chromium
        if: (steps.changes.outputs.frontend == 'true' || steps.changes.outputs.e2e == 'true' || steps.changes.outputs.shared == 'true') && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: E2E (chromium)
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.e2e == 'true' || steps.changes.outputs.shared == 'true'
        run: npm run test:e2e

      - name: Build
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.server == 'true' || steps.changes.outputs.shared == 'true'
        run: npm run build
