name: Cross-OS Verify

# Plan 103 — consolidated cross-OS + mobile-viewport smoke.
#
# Why this workflow exists: GitHub Actions cost reduction. The per-release
# cross-OS matrix in release.yml billed ~46 minutes per release tag (macOS
# bills at a 10× multiplier on a <4-min job), scaling with release cadence;
# the per-PR E2E Mobile workflow billed ~2 min on EVERY PR push while being
# non-blocking (continue-on-error). Both are now folded here and fired on a
# WEEKLY cron + on-demand via workflow_dispatch instead of per-release /
# per-PR. The deployer spread is still Windows + macOS + Linux, so fire this
# MANUALLY (Actions tab → Cross-OS Verify → Run workflow) before announcing
# any release that ships a zip to alpha testers.
# See docs/features/103-ci-cost-reduction.md.

on:
  workflow_dispatch:
  schedule:
    # Sunday 02:00 UTC — well clear of weekday PR contention. Weekly pulse so
    # cross-OS / mobile regressions on main surface within a week even when
    # nobody fires the manual button.
    - cron: '0 2 * * 0'

permissions:
  contents: read

# A manual fire while a cron run is in flight supersedes it (and vice versa).
concurrency:
  group: cross-os-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # macOS + Windows verify smoke. Ubuntu is intentionally omitted — it runs
  # on every PR via verify.yml, so re-running it here would just burn minutes.
  cross-os-verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 24 — matches verify.yml / release.yml.
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install server deps
        run: npm --prefix server ci

      # ffmpeg gates the server MP3-encoder tests (server/src/tts/mp3.ts
      # shells out to it). GitHub runners don't ship it pre-installed.
      - name: Install ffmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ffmpeg -y --no-progress

      # `verify:quick` is `test:all` (hooks + frontend + server + scripts +
      # sidecar). Sidecar tests skip with a banner when the venv isn't
      # bootstrapped (it won't be on a fresh runner — that's fine).
      - name: Verify
        run: npm run verify:quick

      - name: Build
        run: npm run build

  # Mobile + tablet viewport e2e (Pixel 7 / iPad Pro 11), formerly the
  # per-PR e2e-mobile.yml. Ubuntu-only; chromium engine covers both viewport
  # presets per playwright.config.ts.
  mobile-e2e:
    name: npm run test:e2e:mobile
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install root deps
        run: npm ci

      - name: Install server deps
        run: npm --prefix server ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # No `continue-on-error` here (unlike the old per-PR e2e-mobile.yml):
      # this workflow fires on a weekly cron + on demand, so when it runs a
      # red mobile signal SHOULD fail loudly rather than being ignored.
      - name: E2E Mobile
        run: npm run test:e2e:mobile

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mobile
          path: playwright-report/
          retention-days: 7
