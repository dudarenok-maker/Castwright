name: Cross-OS Verify

# Plan 103 — consolidated cross-OS + mobile-viewport smoke.
#
# Why this workflow exists: GitHub Actions cost reduction. The per-release
# cross-OS matrix in release.yml billed ~46 minutes per release tag (macOS
# bills at a 10× multiplier on a <4-min job), scaling with release cadence;
# the per-PR E2E Mobile workflow billed ~2 min on EVERY PR push while being
# non-blocking (continue-on-error). Both are now folded here and fired on a
# WEEKLY cron + on-demand via workflow_dispatch instead of per-release /
# per-PR.
#
# Plan 215 — release tags now run their OWN complete cross-OS + mobile battery
# in release.yml (publish is gated on macOS + Windows + Ubuntu-full + mobile
# e2e), so cross-OS coverage for a release is automatic. This workflow is no
# longer the pre-release manual step; it's the between-releases pulse — a weekly
# cron catches cross-OS / mobile regressions on `main`, and the manual dispatch
# stays for ad-hoc / high-risk checks off a release boundary.
# See docs/features/103-ci-cost-reduction.md and 215-ci-label-gated-verify.md.

on:
  workflow_dispatch:
  schedule:
    # Sunday 02:00 UTC — well clear of weekday PR contention. Weekly pulse so
    # cross-OS / mobile regressions on main surface within a week even when
    # nobody fires the manual button.
    - cron: '0 2 * * 0'

permissions:
  contents: read

# A manual fire while a cron run is in flight supersedes it (and vice versa).
concurrency:
  group: cross-os-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # macOS + Windows verify smoke. Ubuntu is intentionally omitted — it runs
  # on every PR via verify.yml, so re-running it here would just burn minutes.
  cross-os-verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Node 24 + npm/node_modules caches + `npm ci` (root + server). Shared
      # composite with verify.yml (plan 106) — this matrix job gains the
      # node_modules cache as a bonus over the prior two bare `npm ci` calls.
      - name: Setup Node + deps
        uses: ./.github/actions/setup

      # ffmpeg gates the server MP3-encoder tests (server/src/tts/mp3.ts
      # shells out to it). GitHub runners don't ship it pre-installed.
      - name: Install ffmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install ffmpeg -y --no-progress

      # `verify:quick` is `test:all` (hooks + frontend + server + scripts +
      # sidecar). Sidecar tests skip with a banner when the venv isn't
      # bootstrapped (it won't be on a fresh runner — that's fine).
      - name: Verify
        run: npm run verify:quick

      - name: Build
        run: npm run build

  # Cheap (~seconds) probe gating mobile-e2e on the weekly cron (plan 106,
  # BACKLOG #39). Lists files changed on origin/main in the prior 7 days and
  # greps for the frontend/e2e path vocabulary (mirrors verify.yml's frontend +
  # e2e scopes plus the shared root package files). On a manual dispatch this
  # job still runs but mobile-e2e's `if:` short-circuits on the event name, so
  # a dispatch ALWAYS runs the mobile suite regardless of this output.
  changes:
    name: Detect frontend/e2e change window
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      frontend_e2e: ${{ steps.probe.outputs.frontend_e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so `git log --since` can reach commits up to 7 days
          # back; a shallow clone would miss most of the window.
          fetch-depth: 0

      - name: Probe origin/main for frontend/e2e changes (last 7 days)
        id: probe
        run: |
          if git log --since='7 days ago' --name-only --pretty=format: origin/main \
            | sort -u \
            | grep -qE '^(src/|e2e/|index\.html$|vite\.config\.ts$|tailwind\.config\.ts$|playwright\.config\.ts$|package(-lock)?\.json$)'; then
            echo "frontend_e2e=true" >> "$GITHUB_OUTPUT"
            echo "frontend/e2e change detected on origin/main in the last 7 days → mobile-e2e WILL run"
          else
            echo "frontend_e2e=false" >> "$GITHUB_OUTPUT"
            echo "no frontend/e2e change on origin/main in the last 7 days → mobile-e2e will be skipped (unless manually dispatched)"
          fi

  # Mobile + tablet viewport e2e (Pixel 7 / iPad Pro 11), formerly the
  # per-PR e2e-mobile.yml. Ubuntu-only; chromium engine covers both viewport
  # presets per playwright.config.ts.
  #
  # Gated (plan 106 / #39): a manual workflow_dispatch ALWAYS runs it; the
  # weekly cron runs it only when `changes` saw a frontend/e2e change on
  # origin/main in the prior 7 days. cross-os-verify above is NOT gated — the
  # cross-OS smoke runs every cron/dispatch regardless of scope.
  mobile-e2e:
    name: npm run test:e2e:mobile
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend_e2e == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Shared composite with verify.yml (plan 106): Node 24 + caches + ci.
      - name: Setup Node + deps
        uses: ./.github/actions/setup

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # No `continue-on-error` here (unlike the old per-PR e2e-mobile.yml):
      # this workflow fires on a weekly cron + on demand, so when it runs a
      # red mobile signal SHOULD fail loudly rather than being ignored.
      - name: E2E Mobile
        run: npm run test:e2e:mobile

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-mobile
          path: playwright-report/
          retention-days: 7
